              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set integration_entry_id = state_attr(shared_admin_helper_eid, 'integration_entry_id') if shared_admin_helper_eid not in ['', None, 'None'] else '' -%}
                {%- set ui_control_key_root = pref_chore_management_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set selected_user_ui_root = namespace(current=ui_root.selected_user if ui_root.selected_user is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if selected_user_ui_root.current is mapping -%}
                    {%- set selected_user_ui_root.current = selected_user_ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set selected_user_ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = selected_user_ui_root.current is mapping and 'header-collapse' in selected_user_ui_root.current -%}
                {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
                {%- set selected_core_sensors = state_attr(selected_dashboard_helper, 'core_sensors') or {} if has_selected_dashboard_helper else {} -%}
                {%- set chore_select_entity = selected_dashboard_helpers.get('chore_select_eid') if has_selected_dashboard_helper else '' -%}
                {%- set dashboard_date_helper = selected_dashboard_helpers.get('date_helper_eid') if has_selected_dashboard_helper else '' -%}
                {%- set points_sensor = selected_core_sensors.get('points_eid') if has_selected_dashboard_helper else '' -%}
                {%- set selected_chore_name = (states(chore_select_entity) | default('')) if chore_select_entity not in ['', None, 'None'] else '' -%}
                {%- set has_chore_selector = chore_select_entity not in ['', None, 'None'] -%}
                {%- set has_selected_chore = has_selected_dashboard_helper and has_chore_selector and selected_chore_name not in ['None', 'none', '', 'unknown', 'unavailable'] -%}
                {%- set selected_chore_display = selected_chore_name if has_selected_chore else '' -%}
                {%- set helper_chore_items = state_attr(selected_dashboard_helper, 'chores') | default([], true) if has_selected_dashboard_helper else [] -%}
                {%- set overdue_chore_items = helper_chore_items | selectattr('state', 'eq', 'overdue') | list if has_selected_dashboard_helper else [] -%}
                {%- set overdue_chore_count = overdue_chore_items | count -%}
                {%- set selected_chore_lookup_name = selected_chore_name | string | trim if has_selected_chore else '' -%}
                {%- set selected_chore_sensor_ns = namespace(entity_id='') -%}
                {%- if has_selected_chore -%}
                  {%- for helper_chore in helper_chore_items -%}
                    {%- set helper_chore_name = helper_chore.name | default('', true) | string | trim -%}
                    {%- if selected_chore_sensor_ns.entity_id == '' and helper_chore_name == selected_chore_lookup_name -%}
                      {%- set selected_chore_sensor_ns.entity_id = helper_chore.eid | default('', true) -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endif -%}
                {%- set selected_chore_sensor = selected_chore_sensor_ns.entity_id -%}
                {%- set has_selected_chore_sensor = selected_chore_sensor not in ['', None, 'None'] and states(selected_chore_sensor) not in ['unknown', 'unavailable'] -%}
                {%- set has_resolved_selected_chore = has_selected_chore and has_selected_chore_sensor -%}
                {%- set header_collapsed = selected_user_ui_root.current['header-collapse'] if has_header_collapsed_override else pref_chore_management_default_header_collapsed -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set management_label = ui.get('viewing_selected_chore', 'err-viewing_selected_chore') if has_selected_chore else ui.get('choose_chore_for_admin_actions', 'err-choose_chore_for_admin_actions') if has_chore_selector else ui.get('chore_selector_unavailable', 'err-chore_selector_unavailable') if has_selected_dashboard_helper else ui.get('select_user_to_manage_chores_first', 'err-select_user_to_manage_chores_first') -%}
                {%- set management_label_html = (
                  "<span style='color:var(--secondary-text-color);'>" ~ management_label ~ ":</span> <span style='font-weight:700;color:var(--primary-text-color);'>" ~ (selected_user_name | e) ~ "</span>"
                  if has_selected_user
                  else management_label
                ) -%}
                {#-- 5. Build Display --#}

                {%- set management_summary_card = {
                  'type': 'custom:button-card',
                  'entity': chore_select_entity if chore_select_entity not in ['', None, 'None'] else summary_helper,
                  'show_name': True,
                  'show_label': False,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:clipboard-search-outline',
                  'name': ui.get('chores', 'err-chores'),
                  'label': management_label,
                  'tap_action': ({
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': selected_user_id,
                      'ui_control_target': 'user',
                      'ui_control_action': 'update',
                      'key': ui_control_key_header_collapsed,
                      'value': false
                    }
                  } if header_collapsed and integration_entry_id not in ['', none] and selected_user_id not in ['', none] else {
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': selected_user_id,
                      'ui_control_target': 'user',
                      'ui_control_action': 'remove',
                      'key': ui_control_key_header_collapsed
                    }
                  } if integration_entry_id not in ['', none] and selected_user_id not in ['', none] else {
                    'action': 'none'
                  }),
                  'hold_action': {'action': 'more-info'} if chore_select_entity not in ['', None, 'None'] else {'action': 'none'},
                  'custom_fields': {
                    'subtitle': management_label_html,
                    'target': ("<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;max-width:240px;overflow:hidden;'><span style='display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:16px;font-weight:700;color:var(--primary-text-color);'>" ~ selected_chore_display ~ "</span><span style='display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--primary-color);'>" ~ ui.get('active', 'err-active') ~ "</span></div>") if has_selected_chore else '',
                    'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                  },
                  'styles': {
                    'card': [
                      {'padding': '8px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': 'none' if has_selected_chore and not header_collapsed else ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_chore_management_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if header_collapsed and pref_chore_management_show_header_thin_border else 'none' if header_collapsed else '1px solid var(--divider-color)'},
                      {'background-color': 'transparent' if has_selected_chore and not header_collapsed else ('color-mix(in srgb, var(--primary-color) ' ~ pref_chore_management_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed and pref_chore_management_show_header_background else 'transparent'},
                      {'margin-top': '12px' if header_collapsed else '20px'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n target toggle" "i subtitle target toggle"' if has_selected_chore else '"i n toggle" "i subtitle toggle"'},
                      {'grid-template-columns': '32px minmax(150px, 1fr) minmax(0, auto) min-content' if has_selected_chore else '32px minmax(0, 1fr) min-content'},
                      {'grid-template-rows': 'min-content min-content'},
                      {'column-gap': '14px'},
                      {'row-gap': '2px'},
                      {'align-items': 'center'}
                    ],
                    'icon': [
                      {'width': '24px'},
                      {'height': '24px'},
                      {'align-self': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'min-width': '0'},
                      {'width': '100%'},
                      {'text-align': 'left'},
                      {'font-size': '14px'},
                      {'font-weight': '700'},
                      {'line-height': '1.2'},
                      {'text-transform': 'uppercase'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'min-width': '0'},
                      {'width': '100%'},
                      {'text-align': 'left'},
                      {'font-size': '12px'},
                      {'line-height': '1.35'},
                      {'color': 'var(--secondary-text-color)'},
                      {'white-space': 'normal'}
                    ],
                    'custom_fields': {
                      'subtitle': [
                        {'justify-self': 'start'},
                        {'min-width': '0'},
                        {'width': '100%'},
                        {'text-align': 'left'},
                        {'font-size': '12px'},
                        {'line-height': '1.35'},
                        {'color': 'var(--secondary-text-color)'},
                        {'white-space': 'normal'}
                      ],
                      'target': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'},
                        {'min-width': '0'},
                        {'max-width': '240px'},
                        {'text-align': 'right'},
                        {'display': 'block' if has_selected_chore else 'none'}
                      ],
                      'toggle': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'}
                      ]
                    }
                  }
                } -%}

                {%- set select_profile_card = {
                  'type': 'custom:button-card',
                  'entity': admin_selector_eid,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:account-arrow-up-outline',
                  'name': ui.get('select_user_first', 'err-select_user_first'),
                  'label': ui.get('select_user_to_manage_chores_first', 'err-select_user_to_manage_chores_first'),
                  'tap_action': {'action': 'more-info'},
                  'styles': {
                    'card': [
                      {'padding': '14px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': '1px solid var(--divider-color)'},
                      {'background-color': 'var(--card-background-color)'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n" "i l"'},
                      {'grid-template-columns': '32px minmax(0, 1fr)'},
                      {'column-gap': '12px'},
                      {'row-gap': '4px'},
                      {'align-items': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'font-size': '16px'},
                      {'font-weight': '700'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'text-align': 'left'},
                      {'font-size': '13px'},
                      {'line-height': '1.35'},
                      {'white-space': 'normal'},
                      {'color': 'var(--secondary-text-color)'}
                    ],
                    'icon': [
                      {'width': '22px'},
                      {'height': '22px'},
                      {'color': 'var(--primary-color)'}
                    ]
                  }
                } -%}

                {%- set select_chore_card = {
                  'type': 'custom:button-card',
                  'entity': chore_select_entity if chore_select_entity not in ['', None, 'None'] else selected_dashboard_helper,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:clipboard-text-search-outline',
                  'name': ui.get('select_chore_to_manage', 'err-select_chore_to_manage'),
                  'label': ui.get('choose_chore_for_admin_actions', 'err-choose_chore_for_admin_actions'),
                  'tap_action': {'action': 'more-info'} if chore_select_entity not in ['', None, 'None'] else {'action': 'none'},
                  'styles': {
                    'card': [
                      {'padding': '14px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': '1px solid var(--divider-color)'},
                      {'background-color': 'var(--card-background-color)'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n" "i l"'},
                      {'grid-template-columns': '32px minmax(0, 1fr)'},
                      {'column-gap': '12px'},
                      {'row-gap': '4px'},
                      {'align-items': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'font-size': '16px'},
                      {'font-weight': '700'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'text-align': 'left'},
                      {'font-size': '13px'},
                      {'line-height': '1.35'},
                      {'white-space': 'normal'},
                      {'color': 'var(--secondary-text-color)'}
                    ],
                    'icon': [
                      {'width': '22px'},
                      {'height': '22px'},
                      {'color': 'var(--primary-color)'}
                    ]
                  }
                } -%}

                {%- set chore_selector_error_card = {
                  'type': 'markdown',
                  'content': "⚠️ **Dashboard configuration error**\n\nThe selected profile does not expose a chore selector helper for this per-user admin view.\n\nReopen the profile from the Management section or verify the ChoreOps dashboard helper entities are available for that user."
                } -%}
                {%- set selected_chore_resolution_error_card = {
                  'type': 'markdown',
                  'content': "⚠️ **Dashboard configuration error**\n\nThe selected chore could not be resolved for this per-user admin view.\n\nClear the chore selection and choose it again. If the problem persists, reopen the profile from the Management section and verify the ChoreOps chore helper entities are available for that user."
                } -%}
                {%- set chore_select_card = {
                  'type': 'entities',
                  'show_header_toggle': false,
                  'state_color': false,
                  'entities': [
                    {
                      'entity': chore_select_entity,
                      'name': ui.get('select_chore_to_manage', 'err-select_chore_to_manage')
                    }
                  ]
                } if has_chore_selector else none -%}
                {%- set status_map = {
                  'pending': ui.get('pending', 'err-pending'),
                  'due': ui.get('due', 'err-due'),
                  'claimed': ui.get('claimed', 'err-claimed'),
                  'claimed_in_part': ui.get('claimed_in_part', 'err-claimed_in_part'),
                  'completed': ui.get('completed', 'err-completed'),
                  'completed_in_part': ui.get('completed_in_part', 'err-completed_in_part'),
                  'overdue': ui.get('overdue', 'err-overdue'),
                  'waiting': ui.get('waiting', 'err-waiting'),
                  'missed': ui.get('missed', 'err-missed'),
                  'completed_by_other': ui.get('completed_by_other', 'err-completed_by_other'),
                  'not_my_turn': ui.get('not_my_turn', 'err-not_my_turn'),
                  'already_approved': ui.get('completed', 'err-completed'),
                  'pending_claim': ui.get('claimed', 'err-claimed'),
                  'missed_locked': ui.get('missed_locked', 'err-missed_locked'),
                  'blocked_completed_by_other': ui.get('completed_by_other', 'err-completed_by_other'),
                  'blocked_already_approved': ui.get('completed', 'err-completed'),
                  'blocked_pending_claim': ui.get('claimed', 'err-claimed'),
                  'blocked_waiting_window': ui.get('waiting', 'err-waiting'),
                  'blocked_not_my_turn': ui.get('not_my_turn', 'err-not_my_turn'),
                  'blocked_missed_locked': ui.get('missed_locked', 'err-missed_locked'),
                  'steal_available': ui.get('steal_available', 'err-steal_available')
                } -%}
                {%- set recurrence_map = {
                  'none': ui.get('none', 'err-none'),
                  'daily': ui.get('daily', 'err-daily'),
                  'daily_multi': ui.get('daily_multi', 'err-daily_multi'),
                  'weekly': ui.get('weekly', 'err-weekly'),
                  'biweekly': ui.get('biweekly', 'err-biweekly'),
                  'monthly': ui.get('monthly', 'err-monthly'),
                  'quarterly': ui.get('quarterly', 'err-quarterly'),
                  'yearly': ui.get('yearly', 'err-yearly'),
                  'custom': ui.get('custom', 'err-custom'),
                  'custom_from_complete': ui.get('custom_from_complete', 'err-custom_from_complete'),
                  'custom_1_week': ui.get('custom_1_week', 'err-custom_1_week'),
                  'custom_1_month': ui.get('custom_1_month', 'err-custom_1_month'),
                  'custom_1_quarter': ui.get('custom_1_quarter', 'err-custom_1_quarter'),
                  'custom_1_year': ui.get('custom_1_year', 'err-custom_1_year'),
                  'week_end': ui.get('week_end', 'err-week_end'),
                  'month_end': ui.get('month_end', 'err-month_end'),
                  'quarter_end': ui.get('quarter_end', 'err-quarter_end'),
                  'year_end': ui.get('year_end', 'err-year_end')
                } -%}
                {%- set approval_reset_map = {
                  'at_midnight_once': ui.get('at_midnight_once', 'err-at_midnight_once'),
                  'at_midnight_multi': ui.get('at_midnight_multi', 'err-at_midnight_multi'),
                  'at_due_date_once': ui.get('at_due_date_once', 'err-at_due_date_once'),
                  'at_due_date_multi': ui.get('at_due_date_multi', 'err-at_due_date_multi'),
                  'upon_completion': ui.get('upon_completion', 'err-upon_completion')
                } -%}
                {%- set status_color_map = {
                  'pending': 'var(--primary-text-color)',
                  'due': 'var(--warning-color)',
                  'claimed': pref_claim_accent,
                  'claimed_in_part': pref_claim_accent,
                  'pending_claim': pref_claim_accent,
                  'blocked_pending_claim': pref_claim_accent,
                  'completed': 'var(--success-color)',
                  'completed_in_part': 'var(--success-color)',
                  'overdue': 'var(--error-color)',
                  'missed': 'var(--error-color)',
                  'missed_locked': 'var(--error-color)',
                  'waiting': 'var(--disabled-text-color)',
                  'not_my_turn': 'var(--disabled-text-color)',
                  'completed_by_other': 'var(--disabled-text-color)',
                  'blocked_completed_by_other': 'var(--disabled-text-color)',
                  'blocked_already_approved': 'var(--disabled-text-color)',
                  'blocked_waiting_window': 'var(--disabled-text-color)',
                  'blocked_not_my_turn': 'var(--disabled-text-color)',
                  'blocked_missed_locked': 'var(--error-color)',
                  'steal_available': 'var(--warning-color)'
                } -%}
                {%- set chore_overview_card = none -%}
                {%- if has_selected_chore_sensor -%}
                  {%- set chore_attrs = states[selected_chore_sensor].attributes | default({}, true) -%}
                  {%- set raw_chore_state = states(selected_chore_sensor) | default('unknown', true) -%}
                  {%- set current_status_key = 'completed' if raw_chore_state in ['approved', 'already_approved'] else 'completed_in_part' if raw_chore_state == 'approved_in_part' else raw_chore_state -%}
                  {%- set claim_mode = chore_attrs.get('claim_mode') -%}
                  {%- set can_claim = chore_attrs.get('can_claim') -%}
                  {%- if claim_mode == 'steal_available' -%}
                    {%- set current_status_key = 'steal_available' -%}
                  {%- elif can_claim == false and claim_mode not in [None, 'None', ''] and current_status_key not in ['completed', 'completed_in_part'] -%}
                    {%- set current_status_key = claim_mode -%}
                  {%- endif -%}
                  {%- set raw_global_state = chore_attrs.get('global_state', raw_chore_state) -%}
                  {%- set global_status_key = 'completed' if raw_global_state in ['approved', 'already_approved'] else 'completed_in_part' if raw_global_state == 'approved_in_part' else raw_global_state -%}
                  {%- set current_status_display = status_map.get(current_status_key, current_status_key | title) -%}
                  {%- set global_status_display = status_map.get(global_status_key, global_status_key | title) -%}
                  {%- set current_status_color = status_color_map.get(current_status_key, 'var(--primary-text-color)') -%}
                  {%- set global_status_color = status_color_map.get(global_status_key, 'var(--primary-text-color)') -%}
                  {%- set completion_type_key = chore_attrs.get('completion_criteria', 'independent') -%}
                  {%- set completion_type_display = ui.get(completion_type_key, completion_type_key | title) -%}
                  {%- set chore_icon = chore_attrs.get('icon', 'mdi:broom') -%}
                  {%- set chore_value_value = chore_attrs.get('default_points', 0) | float(default=0) -%}
                  {%- set chore_value_value = chore_value_value | round(2) -%}
                  {%- if pref_points_precision == 'adaptive' -%}
                    {%- set chore_value = (chore_value_value | int) | string if chore_value_value == (chore_value_value | int) else ('%.1f' | format(chore_value_value) if chore_value_value == (chore_value_value | round(1)) else '%.2f' | format(chore_value_value)) -%}
                  {%- elif pref_points_precision == 'fixed_1' -%}
                    {%- set chore_value = '%.1f' | format(chore_value_value) -%}
                  {%- elif pref_points_precision == 'fixed_2' -%}
                    {%- set chore_value = '%.2f' | format(chore_value_value) -%}
                  {%- else -%}
                    {%- set chore_value = (chore_value_value | round(0) | int) | string -%}
                  {%- endif -%}
                  {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if points_sensor not in ['', None, 'None'] else None) or 'Points' -%}
                  {%- set recurrence_key = chore_attrs.get('recurring_frequency', 'none') -%}
                  {%- set recurrence_display = recurrence_map.get(recurrence_key, recurrence_key | title) -%}
                  {%- set approval_reset_display = approval_reset_map.get(chore_attrs.get('approval_reset_type', 'at_midnight_once'), chore_attrs.get('approval_reset_type', ui.get('unknown', 'err-unknown'))) -%}
                  {%- set pending_claim_action_map = {
                    'hold_pending': ui.get('hold_pending', 'Hold pending'),
                    'clear_pending': ui.get('clear_pending', 'Clear pending'),
                    'auto_approve_pending': ui.get('auto_approve_pending', 'Auto-approve pending')
                  } -%}
                  {%- set overdue_handling_map = {
                    'never_overdue': ui.get('never_overdue', 'Never overdue'),
                    'at_due_date': ui.get('at_due_date', 'At due date'),
                    'at_due_date_clear_immediate_on_late': ui.get('at_due_date_clear_immediate_on_late', 'Clear immediately when late'),
                    'at_due_date_clear_at_approval_reset': ui.get('at_due_date_clear_at_approval_reset', 'Clear at reset'),
                    'at_due_date_clear_and_mark_missed': ui.get('at_due_date_clear_and_mark_missed', 'Clear and mark missed'),
                    'at_due_date_mark_missed_and_lock': ui.get('at_due_date_mark_missed_and_lock', 'Mark missed and lock'),
                    'at_due_date_allow_steal': ui.get('at_due_date_allow_steal', 'Allow steal')
                  } -%}
                  {%- set due_dt_raw = chore_attrs.get('due_date') or chore_attrs.get('due_window_start') or chore_attrs.get('available_at') -%}
                  {%- set due_dt = as_datetime(due_dt_raw) if due_dt_raw not in [None, 'None', '', 'unknown', 'unavailable'] else none -%}
                  {%- set due_label = ui.get('available', 'err-available') if chore_attrs.get('available_at') not in [None, 'None', '', 'unknown', 'unavailable'] and chore_attrs.get('due_date') in [None, 'None', '', 'unknown', 'unavailable'] and chore_attrs.get('due_window_start') in [None, 'None', '', 'unknown', 'unavailable'] else ui.get('due_date', 'err-due_date') -%}
                  {%- set due_display = as_timestamp(due_dt) | timestamp_custom('%A, %b %d • %I:%M %p', true) if due_dt else ui.get('none', 'err-none') -%}
                  {%- set assigned_users = chore_attrs.get('assigned_user_names', []) | default([], true) -%}
                  {%- set claimed_by = chore_attrs.get('claimed_by', []) | default([], true) -%}
                  {%- set completed_by = chore_attrs.get('completed_by', []) | default([], true) -%}
                  {%- set progressed_users = (claimed_by + completed_by) | unique | list -%}
                  {%- set overdue_missed_ns = namespace(users=[]) -%}
                  {%- for assigned_user in assigned_users -%}
                    {%- if assigned_user not in progressed_users -%}
                      {%- set overdue_missed_ns.users = overdue_missed_ns.users + [assigned_user] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set overdue_missed_users = overdue_missed_ns.users -%}
                  {%- set turn_user_name = chore_attrs.get('turn_user_name') -%}
                  {%- set applicable_days = chore_attrs.get('applicable_days', []) | default([], true) -%}
                  {%- set day_name_map = {
                    '0': ui.get('mon_short', 'Mon'),
                    '1': ui.get('tue_short', 'Tue'),
                    '2': ui.get('wed_short', 'Wed'),
                    '3': ui.get('thu_short', 'Thu'),
                    '4': ui.get('fri_short', 'Fri'),
                    '5': ui.get('sat_short', 'Sat'),
                    '6': ui.get('sun_short', 'Sun'),
                    'mon': ui.get('mon_short', 'Mon'),
                    'tue': ui.get('tue_short', 'Tue'),
                    'wed': ui.get('wed_short', 'Wed'),
                    'thu': ui.get('thu_short', 'Thu'),
                    'fri': ui.get('fri_short', 'Fri'),
                    'sat': ui.get('sat_short', 'Sat'),
                    'sun': ui.get('sun_short', 'Sun'),
                    'monday': ui.get('mon_short', 'Mon'),
                    'tuesday': ui.get('tue_short', 'Tue'),
                    'wednesday': ui.get('wed_short', 'Wed'),
                    'thursday': ui.get('thu_short', 'Thu'),
                    'friday': ui.get('fri_short', 'Fri'),
                    'saturday': ui.get('sat_short', 'Sat'),
                    'sunday': ui.get('sun_short', 'Sun')
                  } -%}
                  {%- set days_ns = namespace(display='') -%}
                  {%- if applicable_days | count >= 7 -%}
                    {%- set applicable_days_display = ui.get('daily', 'Daily') -%}
                  {%- else -%}
                    {%- for raw_day in applicable_days -%}
                      {%- set day_key = (raw_day ~ '') | lower -%}
                      {%- set days_ns.display = days_ns.display ~ (', ' if days_ns.display != '' else '') ~ day_name_map.get(day_key, raw_day) -%}
                    {%- endfor -%}
                    {%- set applicable_days_display = days_ns.display -%}
                  {%- endif -%}
                  {%- set context_label = '' -%}
                  {%- set context_value = '' -%}
                  {%- set overdue_missed_state = raw_chore_state if raw_chore_state in ['overdue', 'missed'] else (raw_global_state if raw_global_state in ['overdue', 'missed'] else '') -%}
                  {%- set is_rotation_type = 'rotation' in completion_type_key -%}
                  {%- set is_shared_type = completion_type_key in ['shared_all', 'shared_first'] or is_rotation_type -%}
                  {%- if overdue_missed_state != '' -%}
                    {%- set context_label = ui.get(overdue_missed_state, 'err-' ~ overdue_missed_state) -%}
                    {%- if is_rotation_type and turn_user_name not in [None, 'None', '', 'unknown', 'unavailable'] -%}
                      {%- set context_value = turn_user_name -%}
                    {%- elif is_shared_type and overdue_missed_users | count > 0 -%}
                      {%- set context_value = overdue_missed_users | join(', ') -%}
                    {%- elif is_shared_type and assigned_users | count > 0 -%}
                      {%- set context_value = assigned_users | join(', ') -%}
                    {%- endif -%}
                  {%- elif completion_type_key == 'shared_all' and assigned_users | count > 0 -%}
                    {%- set context_label = ui.get('progress', 'err-progress') -%}
                    {%- set context_value = completed_by | count ~ '/' ~ assigned_users | count ~ ' ' ~ ui.get('done', 'err-done') -%}
                  {%- elif completion_type_key == 'shared_first' -%}
                    {%- if completed_by | count > 0 -%}
                      {%- set context_label = ui.get('completed_by', 'err-completed_by') -%}
                      {%- set context_value = completed_by | join(', ') -%}
                    {%- elif claimed_by | count > 0 -%}
                      {%- set context_label = ui.get('claimed', 'err-claimed') -%}
                      {%- set context_value = claimed_by | join(', ') -%}
                    {%- elif assigned_users | count > 0 -%}
                      {%- set context_label = ui.get('assigned_to', 'err-assigned_to') -%}
                      {%- set context_value = assigned_users | join(', ') -%}
                    {%- endif -%}
                  {%- elif assigned_users | count > 1 -%}
                    {%- set context_label = ui.get('assigned_to', 'err-assigned_to') -%}
                    {%- set context_value = assigned_users | join(', ') -%}
                  {%- endif -%}
                  {%- set chore_description = chore_attrs.get('description', '') | default('', true) -%}
                  {%- set chore_description = chore_description | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                  {%- set last_completed_raw = chore_attrs.get('last_completed') -%}
                  {%- set last_completed_dt = as_datetime(last_completed_raw) if last_completed_raw not in [None, 'None', '', 'unknown', 'unavailable'] else none -%}
                  {%- set last_completed_display = as_timestamp(last_completed_dt) | timestamp_custom('%b %d, %Y', true) if last_completed_dt else ui.get('never', 'err-never') -%}
                  {%- set streak_count = chore_attrs.get('chore_current_streak', 0) | int(default=0) -%}
                  {%- set completion_count = chore_attrs.get('chore_completed_count', 0) | int(default=0) -%}
                  {%- set claims_count = chore_attrs.get('chore_claims_count', 0) | int(default=0) -%}
                  {%- set last_claimed_raw = chore_attrs.get('last_claimed') -%}
                  {%- set last_claimed_dt = as_datetime(last_claimed_raw) if last_claimed_raw not in [None, 'None', '', 'unknown', 'unavailable'] else none -%}
                  {%- set last_activity_display = as_timestamp(last_claimed_dt) | timestamp_custom('%b %d', true) if last_claimed_dt else last_completed_display -%}
                  {%- set pending_claim_action_key = chore_attrs.get('approval_reset_pending_claim_action', 'hold_pending') -%}
                  {%- set pending_claim_action_display = pending_claim_action_map.get(pending_claim_action_key, pending_claim_action_key | replace('_', ' ') | title) -%}
                  {%- set overdue_handling_key = chore_attrs.get('overdue_handling_type', 'at_due_date') -%}
                  {%- set overdue_handling_display = overdue_handling_map.get(overdue_handling_key, overdue_handling_key | replace('_', ' ') | title) -%}
                  {%- set auto_approve_display = ui.get('true', 'True') if chore_attrs.get('auto_approve', false) else ui.get('false', 'False') -%}
                  {%- set due_window_offset = chore_attrs.get('chore_due_window_offset') -%}
                  {%- set due_window_display = due_window_offset if due_window_offset not in [None, 'None', '', 'unknown', 'unavailable'] else ui.get('none', 'err-none') -%}
                  {%- set claim_lock_display = ui.get('true', 'True') if chore_attrs.get('chore_claim_lock_until_window', false) else ui.get('false', 'False') -%}
                  {%- set user_name_for_service = selected_user_name if completion_type_key == 'independent' else '' -%}
                  {%- set selected_date_display = as_timestamp(states(dashboard_date_helper)) | timestamp_custom('%a, %b %d • %I:%M %p', true) if dashboard_date_helper not in ['', None, 'None'] and states(dashboard_date_helper) not in ['unknown', 'unavailable', 'None', ''] else ui.get('no_date_set', 'err-no_date_set') -%}
                  {%- set show_selected_overdue_reset = raw_chore_state in ['overdue', 'missed'] and selected_user_name not in ['', 'None', 'none', 'unknown', 'unavailable'] and integration_entry_id not in ['', None, 'None'] -%}
                  {%- set status_pills = "<div style='display:flex;flex-direction:column;align-items:flex-end;gap:6px;'>" -%}
                  {%- set status_pills = status_pills ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid color-mix(in srgb, " ~ current_status_color ~ " 18%, var(--divider-color));background:color-mix(in srgb, " ~ current_status_color ~ " 8%, var(--card-background-color));font-size:11px;font-weight:600;line-height:1;color:" ~ current_status_color ~ ";'>" ~ current_status_display ~ "</span>" -%}
                  {%- if global_status_display != current_status_display and completion_type_key != 'independent' -%}
                    {%- set status_pills = status_pills ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid color-mix(in srgb, " ~ global_status_color ~ " 18%, var(--divider-color));background:color-mix(in srgb, " ~ global_status_color ~ " 8%, var(--card-background-color));font-size:11px;font-weight:600;line-height:1;color:" ~ global_status_color ~ ";'>" ~ global_status_display ~ "</span>" -%}
                  {%- endif -%}
                  {%- set status_pills = status_pills ~ "</div>" -%}
                  {%- set detail_grid = "<div style='display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px;'>" -%}
                  {%- set detail_grid = detail_grid ~ "<div><div style='font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('completion_criteria', 'err-completion_criteria') ~ "</div><div style='margin-top:2px;font-size:13px;font-weight:600;line-height:1.3;'>" ~ completion_type_display ~ "</div></div>" -%}
                  {%- set detail_grid = detail_grid ~ "<div><div style='font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('value', 'err-value') ~ "</div><div style='margin-top:2px;font-size:13px;font-weight:600;line-height:1.3;'>" ~ chore_value ~ " " ~ points_label ~ "</div></div>" -%}
                  {%- set detail_grid = detail_grid ~ "<div><div style='font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('approval_reset_type', 'err-approval_reset_type') ~ "</div><div style='margin-top:2px;font-size:13px;font-weight:600;line-height:1.3;'>" ~ approval_reset_display ~ "</div></div>" -%}
                  {%- set detail_grid = detail_grid ~ "<div><div style='font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('recurrence', 'err-recurrence') ~ "</div><div style='margin-top:2px;font-size:13px;font-weight:600;line-height:1.3;'>" ~ recurrence_display ~ "</div></div>" -%}
