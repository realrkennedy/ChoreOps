<#-- ============================================= --#>
<#-- ChoreOps Dashboard Template - ADMIN Style --#>
<#-- Template Schema Version: 1                --#>
<#-- Integration: 1.0.0 (Schema 100)           --#>
<#-- ============================================= --#>
<#--                                             --#>
<#-- Per-user admin dashboard with approval,       --#>
<#-- management, chores, economy, and system     --#>
<#-- administration sections                     --#>
<#-- OUTPUT: Full dashboard document with root keys --#>
<#--                                             --#>
<#-- Build-time user injection via dashboard context                         --#>
<#--                                             --#>
<#-- All HA Jinja2 {{ }} syntax is preserved as-is --#>
<#-- ============================================= --#>

views:
- title: << user.name >> OpsCenter
  path: admin-<< user.slug >>
  sections:
    - type: grid
      cards:
        - type: custom:auto-entities
          show_empty: false
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== APPROVAL BOARD ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_ui_control_key_root = 'admin-peruser/approval-center' -%}

              {%- set pref_default_header_collapsed = false -%}

              {%- set pref_primary_tint_mix_pct = 14 -%}

              {%- set pref_show_header_background = true -%}

              {%- set pref_show_header_thin_border = true -%}

              {%- set pref_claim_accent = '#a957fa' -%}

              {#-- 2. Dynamic Lookups & Validations --#}

              {# shared_admin_translation_sensor_eid comes from the admin setup snippet #}

              << template_snippets.admin_setup_peruser >>

              << template_snippets.admin_validation_missing_selector >>

              << template_snippets.admin_validation_invalid_selection >>

              {%- set selected_dashboard_helper = admin_selector_eid if admin_selector_eid not in ['', None, 'None'] else '' -%}
              {%- set has_selected_dashboard_helper = selected_dashboard_helper not in ['', None, 'None'] and states(selected_dashboard_helper) not in ['unknown', 'unavailable'] -%}
              {%- set selected_user_name = name if has_selected_dashboard_helper else '' -%}
              {%- set has_selected_user = has_selected_dashboard_helper -%}
              {%- set selected_user_id = state_attr(selected_dashboard_helper, 'user_id') if has_selected_dashboard_helper else '' -%}
              {%- set selected_user_ui_control = state_attr(selected_dashboard_helper, 'ui_control') | default({}, true) if has_selected_dashboard_helper else {} -%}
              {%- set ui_root = namespace(
                shared_admin=shared_admin_ui_control if shared_admin_ui_control is mapping else {},
                selected_user=selected_user_ui_control if selected_user_ui_control is mapping else {}
              ) -%}
              {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
              {%- set helper_sensor_entities = [selected_dashboard_helper] | expand if has_selected_dashboard_helper else [] -%}
              {%- set summary_helper = selected_dashboard_helper if has_selected_dashboard_helper else '' -%}

              {%- set pref_ui_control_key_root = (pref_ui_control_key_root | default('admin-peruser/approval-center') | string) -%}
              {%- set pref_ui_control_key_root_segments = pref_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_ui_control_key_root_segments = ['admin-peruser', 'approval-center'] -%}
              {%- endif -%}
              {%- set pref_ui_control_key_root = pref_ui_control_key_root_segments | join('/') -%}
              {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
              {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- if pref_primary_tint_mix_pct < 0 -%}
                {%- set pref_primary_tint_mix_pct = 0 -%}
              {%- elif pref_primary_tint_mix_pct > 100 -%}
                {%- set pref_primary_tint_mix_pct = 100 -%}
              {%- endif -%}
              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set ns = namespace(
                  lanes=[],
                  total_chore_pending=0,
                  total_reward_pending=0,
                  pending_user_count=0,
                  summary_helper=summary_helper
                ) -%}
                {%- if ns.summary_helper in ['', None, 'None'] -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard configuration error**\n\nCannot find any dashboard helper entities for this per-user admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set ui = shared_admin_ui -%}
                {%- set integration_entry_id = state_attr(shared_admin_helper_eid, 'integration_entry_id') if shared_admin_helper_eid not in ['', None, 'None'] else '' -%}
                {%- set ui_control_key_root = pref_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set shared_admin_ui_root = namespace(current=ui_root.selected_user if ui_root.selected_user is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if shared_admin_ui_root.current is mapping -%}
                    {%- set shared_admin_ui_root.current = shared_admin_ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set shared_admin_ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = shared_admin_ui_root.current is mapping and 'header-collapse' in shared_admin_ui_root.current -%}

                {#-- 5. Build Display --#}

                {%- for helper_state in helper_sensor_entities -%}
                {%- set helper_entity_id = helper_state.entity_id -%}
                {%- set helper_attrs = helper_state.attributes -%}
                {%- set helper_name = helper_attrs.user_name | default(helper_state.name, true) -%}
                {%- set dashboard_helpers = helper_attrs.dashboard_helpers | default({}, true) -%}
                {%- set pending_approvals = helper_attrs.pending_approvals | default({}, true) -%}
                {%- set pending_chore_data = pending_approvals.get('chores', []) | default([], true) -%}
                {%- set pending_reward_data = pending_approvals.get('rewards', []) | default([], true) -%}
                {%- set helper_chore_items = helper_attrs.chores | default([], true) -%}
                {%- set helper_reward_items = helper_attrs.rewards | default([], true) -%}
                {%- set chore_count = pending_chore_data | count -%}
                {%- set reward_count = pending_reward_data | count -%}
                {%- set total_count = chore_count + reward_count -%}
                {%- if total_count > 0 -%}
                  {%- set ns.total_chore_pending = ns.total_chore_pending + chore_count -%}
                  {%- set ns.total_reward_pending = ns.total_reward_pending + reward_count -%}
                  {%- set ns.pending_user_count = ns.pending_user_count + 1 -%}
                  {%- set combined_summary = "<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;'><span style='font-size:16px;font-weight:700;'>" ~ total_count ~ "</span><span style='margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('approvals', 'err-approvals') ~ "</span></div>" -%}
                  {%- set header_card = {
                    'type': 'custom:button-card',
                    'entity': helper_entity_id,
                    'show_name': True,
                    'show_label': False,
                    'show_state': False,
                    'show_icon': True,
                    'icon': 'mdi:account-circle',
                    'icon_color': pref_claim_accent,
                    'name': helper_name,
                    'tap_action': {'action': 'none'},
                    'hold_action': {'action': 'more-info'},
                    'custom_fields': {
                      'approval_count': combined_summary
                    },
                    'styles': {
                      'card': [
                        {'padding': '10px 2px 2px 2px'},
                        {'border-radius': '0'},
                        {'box-shadow': 'none'},
                        {'border': 'none'},
                        {'background': 'transparent'},
                        {'margin-top': '14px'},
                        {'margin-bottom': '4px'}
                      ],
                      'grid': [
                        {'grid-template-areas': '"i n approval_count" "i n approval_count"'},
                        {'grid-template-columns': '30px minmax(0, 1fr) auto'},
                        {'grid-template-rows': 'min-content min-content'},
                        {'column-gap': '12px'},
                        {'row-gap': '2px'},
                        {'align-items': 'center'}
                      ],
                      'name': [
                        {'justify-self': 'start'},
                        {'align-self': 'center'},
                        {'font-size': '22px'},
                        {'font-weight': '800'},
                        {'line-height': '1.2'}
                      ],
                      'icon': [
                        {'width': '20px'},
                        {'height': '20px'},
                        {'color': 'var(--primary-text-color)'},
                        {'align-self': 'center'}
                      ],
                      'custom_fields': {
                        'approval_count': [
                          {'justify-self': 'end'},
                          {'text-align': 'right'},
                          {'line-height': '1'},
                          {'white-space': 'nowrap'},
                          {'padding': '4px 0 0 0'}
                        ]
                      }
                    }
                  } -%}
                  {%- set row_ns = namespace(cards=[]) -%}
                  {%- for entry in pending_chore_data -%}
                    {%- set approve_eid = (entry.approve_button_eid if entry.approve_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set return_eid = (entry.disapprove_button_eid if entry.disapprove_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set chore_match = helper_chore_items | selectattr('name', 'eq', entry.chore_name) | list -%}
                    {%- set chore_eid = chore_match[0].eid if chore_match | count > 0 else '' -%}
                    {%- set item_icon = (state_attr(chore_eid, 'icon') if chore_eid not in ['', None, 'None'] else None) or 'mdi:broom' -%}
                    {%- set claimed_at_iso = state_attr(chore_eid, 'last_claimed') if chore_eid not in ['', None, 'None'] else None -%}
                    {%- set last_completed_iso = state_attr(chore_eid, 'last_completed') if chore_eid not in ['', None, 'None'] else None -%}
                    {%- set claimed_at_display = (as_timestamp(claimed_at_iso) | timestamp_custom('%Y-%m-%d %-I:%M%p', true)) if claimed_at_iso not in ['', None, 'None'] else '' -%}
                    {%- set last_completed_display = (as_timestamp(last_completed_iso) | timestamp_custom('%Y-%m-%d', true)) if last_completed_iso not in ['', None, 'None'] else '' -%}
                    {%- set meta_text = ui.get('chore_claimed', 'err-chore_claimed') ~ ': ' ~ claimed_at_display if claimed_at_display != '' else ui.get('chore', 'err-chore') -%}
                    {%- if last_completed_display != '' -%}
                      {%- set meta_text = meta_text ~ ' • ' ~ ui.get('last', 'err-last') ~ ': ' ~ last_completed_display -%}
                    {%- endif -%}
                    {%- if approve_eid != '' or return_eid != '' -%}
                      {%- set row_ns.cards = row_ns.cards + [{
                        'type': 'custom:button-card',
                        'entity': approve_eid if approve_eid != '' else return_eid,
                        'show_name': False,
                        'show_icon': False,
                        'show_label': False,
                        'show_state': False,
                        'tap_action': {'action': 'none'},
                        'hold_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '9px 12px'},
                            {'border-radius': '14px'},
                            {'box-shadow': 'none'},
                            {'border': '1px solid color-mix(in srgb, ' ~ pref_claim_accent ~ ' 14%, var(--divider-color))'},
                            {'background-color': 'var(--card-background-color)'},
                            {'border-left': '3px solid ' ~ pref_claim_accent}
                          ],
                          'grid': [
                            {'grid-template-areas': '"kind title btn_return btn_approve" "kind meta btn_return btn_approve"'},
                            {'grid-template-columns': '36px minmax(0, 1fr) 42px 42px'},
                            {'grid-template-rows': 'min-content min-content'},
                            {'column-gap': '10px'},
                            {'row-gap': '2px'},
                            {'align-items': 'center'}
                          ],
                          'custom_fields': {
                            'kind': [
                              {'align-self': 'center'},
                              {'justify-self': 'center'}
                            ],
                            'title': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'line-height': '1.25'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'meta': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '11px'},
                              {'color': 'var(--secondary-text-color)'},
                              {'line-height': '1.2'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'btn_return': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ],
                            'btn_approve': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ]
                          }
                        },
                        'custom_fields': {
                          'kind': "<div style='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb, " ~ pref_claim_accent ~ " 8%, transparent);border:1px solid color-mix(in srgb, " ~ pref_claim_accent ~ " 24%, transparent);'><ha-icon icon='" ~ item_icon ~ "' style='width:18px;height:18px;color:" ~ pref_claim_accent ~ ";transform:translateY(-3px);'></ha-icon></div>",
                          'title': entry.chore_name | default('', true),
                          'meta': meta_text,
                          'btn_return': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': return_eid if return_eid != '' else approve_eid,
                              'icon': 'mdi:undo-variant',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': return_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(244, 67, 54, 0.08)'},
                                  {'border': '1px solid rgba(244, 67, 54, 0.28)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if return_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--error-color)'}
                                ]
                              }
                            }
                          },
                          'btn_approve': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': approve_eid if approve_eid != '' else return_eid,
                              'icon': 'mdi:check-bold',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': approve_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(76, 175, 80, 0.10)'},
                                  {'border': '1px solid rgba(76, 175, 80, 0.30)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if approve_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--success-color)'}
                                ]
                              }
                            }
                          }
                        }
                      }] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- for entry in pending_reward_data -%}
                    {%- set approve_eid = (entry.approve_button_eid if entry.approve_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set return_eid = (entry.disapprove_button_eid if entry.disapprove_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set reward_match = helper_reward_items | selectattr('name', 'eq', entry.reward_name) | list -%}
                    {%- set reward_eid = reward_match[0].eid if reward_match | count > 0 else '' -%}
                    {%- set item_icon = (state_attr(reward_eid, 'icon') if reward_eid not in ['', None, 'None'] else None) or 'mdi:gift-outline' -%}
                    {%- set requested_at_iso = state_attr(reward_eid, 'last_claimed') if reward_eid not in ['', None, 'None'] else None -%}
                    {%- set last_approved_iso = state_attr(reward_eid, 'last_approved') if reward_eid not in ['', None, 'None'] else None -%}
                    {%- set requested_at_display = (as_timestamp(requested_at_iso) | timestamp_custom('%Y-%m-%d %-I:%M%p', true)) if requested_at_iso not in ['', None, 'None'] else '' -%}
                    {%- set last_approved_display = (as_timestamp(last_approved_iso) | timestamp_custom('%Y-%m-%d', true)) if last_approved_iso not in ['', None, 'None'] else '' -%}
                    {%- set meta_text = ui.get('reward_requested', 'err-reward_requested') ~ ': ' ~ requested_at_display if requested_at_display != '' else ui.get('reward', 'err-reward') -%}
                    {%- if last_approved_display != '' -%}
                      {%- set meta_text = meta_text ~ ' • ' ~ ui.get('last', 'err-last') ~ ': ' ~ last_approved_display -%}
                    {%- endif -%}
                    {%- if approve_eid != '' or return_eid != '' -%}
                      {%- set row_ns.cards = row_ns.cards + [{
                        'type': 'custom:button-card',
                        'entity': approve_eid if approve_eid != '' else return_eid,
                        'show_name': False,
                        'show_icon': False,
                        'show_label': False,
                        'show_state': False,
                        'tap_action': {'action': 'none'},
                        'hold_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '9px 12px'},
                            {'border-radius': '14px'},
                            {'box-shadow': 'none'},
                            {'border': '1px solid color-mix(in srgb, ' ~ pref_claim_accent ~ ' 14%, var(--divider-color))'},
                            {'background-color': 'var(--card-background-color)'},
                            {'border-left': '3px solid ' ~ pref_claim_accent}
                          ],
                          'grid': [
                            {'grid-template-areas': '"kind title btn_return btn_approve" "kind meta btn_return btn_approve"'},
                            {'grid-template-columns': '36px minmax(0, 1fr) 42px 42px'},
                            {'grid-template-rows': 'min-content min-content'},
                            {'column-gap': '10px'},
                            {'row-gap': '2px'},
                            {'align-items': 'center'}
                          ],
                          'custom_fields': {
                            'kind': [
                              {'align-self': 'center'},
                              {'justify-self': 'center'}
                            ],
                            'title': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'line-height': '1.25'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'meta': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '11px'},
                              {'color': 'var(--secondary-text-color)'},
                              {'line-height': '1.2'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'btn_return': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ],
                            'btn_approve': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ]
                          }
                        },
                        'custom_fields': {
                          'kind': "<div style='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb, " ~ pref_claim_accent ~ " 8%, transparent);border:1px solid color-mix(in srgb, " ~ pref_claim_accent ~ " 24%, transparent);'><ha-icon icon='" ~ item_icon ~ "' style='width:18px;height:18px;color:" ~ pref_claim_accent ~ ";transform:translateY(-3px);'></ha-icon></div>",
                          'title': entry.reward_name | default('', true),
                          'meta': meta_text,
                          'btn_return': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': return_eid if return_eid != '' else approve_eid,
                              'icon': 'mdi:undo-variant',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': return_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(244, 67, 54, 0.08)'},
                                  {'border': '1px solid rgba(244, 67, 54, 0.28)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if return_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--error-color)'}
                                ]
                              }
                            }
                          },
                          'btn_approve': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': approve_eid if approve_eid != '' else return_eid,
                              'icon': 'mdi:check-bold',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': approve_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(76, 175, 80, 0.10)'},
                                  {'border': '1px solid rgba(76, 175, 80, 0.30)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if approve_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--success-color)'}
                                ]
                              }
                            }
                          }
                        }
                      }] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set lane_card = {
                    'type': 'vertical-stack',
                    'cards': [
                      header_card,
                      {
                        'type': 'grid',
                        'columns': 1,
                        'square': False,
                        'cards': row_ns.cards
                      }
                    ]
                  } -%}
