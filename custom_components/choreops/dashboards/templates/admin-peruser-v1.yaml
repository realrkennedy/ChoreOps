        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== SYSTEM ADMINISTRATION ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>


              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_peruser >>

              << template_snippets.admin_validation_missing_selector >>

              << template_snippets.admin_validation_invalid_selection >>

              {%- set selected_dashboard_helper = admin_selector_eid if admin_selector_eid not in ['', None, 'None'] else '' -%}
              {%- set has_selected_dashboard_helper = selected_dashboard_helper not in ['', None, 'None'] and states(selected_dashboard_helper) not in ['unknown', 'unavailable'] -%}
              {%- set selected_user_name = name if has_selected_dashboard_helper else '' -%}
              {%- set has_selected_user = has_selected_dashboard_helper -%}
              {%- set selected_user_id = state_attr(selected_dashboard_helper, 'user_id') if has_selected_dashboard_helper else '' -%}
              {%- set selected_user_ui_control = state_attr(selected_dashboard_helper, 'ui_control') | default({}, true) if has_selected_dashboard_helper else {} -%}
              {%- set ui_root = namespace(
                shared_admin=shared_admin_ui_control if shared_admin_ui_control is mapping else {},
                selected_user=selected_user_ui_control if selected_user_ui_control is mapping else {}
              ) -%}
              {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
              {%- set helper_sensor_entities = [selected_dashboard_helper] | expand if has_selected_dashboard_helper else [] -%}
              {%- set summary_helper = selected_dashboard_helper if has_selected_dashboard_helper else '' -%}

              << template_shared.admin_system_administration_links_v1 >>
