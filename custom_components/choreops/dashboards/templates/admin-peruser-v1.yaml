        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== ECONOMY MANAGEMENT ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_economy_management_ui_control_key_root = 'admin-peruser/economy-management' -%}

              {%- set pref_economy_management_default_header_collapsed = true -%}

              {%- set pref_economy_management_primary_tint_mix_pct = 14 -%}

              {%- set pref_economy_management_show_header_background = true -%}

              {%- set pref_economy_management_show_header_thin_border = true -%}

              {%- set pref_points_precision = 'fixed_0' -%}


              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_peruser >>

              << template_snippets.admin_validation_missing_selector >>

              << template_snippets.admin_validation_invalid_selection >>

              {%- set selected_dashboard_helper = admin_selector_eid if admin_selector_eid not in ['', None, 'None'] else '' -%}
              {%- set has_selected_dashboard_helper = selected_dashboard_helper not in ['', None, 'None'] and states(selected_dashboard_helper) not in ['unknown', 'unavailable'] -%}
              {%- set selected_user_name = name if has_selected_dashboard_helper else '' -%}
              {%- set has_selected_user = has_selected_dashboard_helper -%}
              {%- set selected_user_id = state_attr(selected_dashboard_helper, 'user_id') if has_selected_dashboard_helper else '' -%}
              {%- set selected_user_ui_control = state_attr(selected_dashboard_helper, 'ui_control') | default({}, true) if has_selected_dashboard_helper else {} -%}
              {%- set ui_root = namespace(
                shared_admin=shared_admin_ui_control if shared_admin_ui_control is mapping else {},
                selected_user=selected_user_ui_control if selected_user_ui_control is mapping else {}
              ) -%}
              {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
              {%- set helper_sensor_entities = [selected_dashboard_helper] | expand if has_selected_dashboard_helper else [] -%}
              {%- set summary_helper = selected_dashboard_helper if has_selected_dashboard_helper else '' -%}

              {%- set pref_economy_management_ui_control_key_root = (pref_economy_management_ui_control_key_root | default('admin-peruser/economy-management') | string) -%}
              {%- set pref_economy_management_ui_control_key_root_segments = pref_economy_management_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_economy_management_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_economy_management_ui_control_key_root_segments = ['admin-peruser', 'economy-management'] -%}
              {%- endif -%}
              {%- set pref_economy_management_ui_control_key_root = pref_economy_management_ui_control_key_root_segments | join('/') -%}
              {%- set pref_economy_management_default_header_collapsed = (pref_economy_management_default_header_collapsed | default('true') | string | lower) == 'true' -%}
              {%- set pref_economy_management_primary_tint_mix_pct = pref_economy_management_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_economy_management_show_header_background = (pref_economy_management_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_economy_management_show_header_thin_border = (pref_economy_management_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- set pref_points_precision = pref_points_precision | default('fixed_0') | string | lower -%}
              {%- if pref_points_precision not in ['fixed_0', 'adaptive', 'fixed_1', 'fixed_2'] -%}
                {%- set pref_points_precision = 'fixed_0' -%}
              {%- endif -%}
              {%- if pref_economy_management_primary_tint_mix_pct < 0 -%}
                {%- set pref_economy_management_primary_tint_mix_pct = 0 -%}
              {%- elif pref_economy_management_primary_tint_mix_pct > 100 -%}
                {%- set pref_economy_management_primary_tint_mix_pct = 100 -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set ui = shared_admin_ui -%}
                {%- if summary_helper in ['', None, 'None'] -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard configuration error**\n\nCannot find any dashboard helper entities for this per-user admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set integration_entry_id = state_attr(shared_admin_helper_eid, 'integration_entry_id') if shared_admin_helper_eid not in ['', None, 'None'] else '' -%}
                {%- set ui_control_key_root = pref_economy_management_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set selected_user_ui_root = namespace(current=ui_root.selected_user if ui_root.selected_user is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if selected_user_ui_root.current is mapping -%}
                    {%- set selected_user_ui_root.current = selected_user_ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set selected_user_ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = selected_user_ui_root.current is mapping and 'header-collapse' in selected_user_ui_root.current -%}
                {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
                {%- set selected_core_sensors = state_attr(selected_dashboard_helper, 'core_sensors') or {} if has_selected_dashboard_helper else {} -%}
                {%- set points_sensor = selected_core_sensors.get('points_eid') if has_selected_dashboard_helper else '' -%}
                {%- set selected_gamification_enabled = state_attr(selected_dashboard_helper, 'gamification_enabled') | default(false, true) if has_selected_dashboard_helper else false -%}
                {%- set point_buttons = state_attr(selected_dashboard_helper, 'points_buttons') | default([], true) if has_selected_dashboard_helper else [] -%}
                {%- set bonus_list = state_attr(selected_dashboard_helper, 'bonuses') | default([], true) if has_selected_dashboard_helper else [] -%}
                {%- set penalty_list = state_attr(selected_dashboard_helper, 'penalties') | default([], true) if has_selected_dashboard_helper else [] -%}
                {%- set has_points_sensor = points_sensor not in ['', None, 'None'] and states(points_sensor) not in ['unknown', 'unavailable'] -%}
                {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if has_points_sensor else None) or 'Points' -%}
                {%- set points_icon = (state_attr(points_sensor, 'icon') if has_points_sensor else None) or 'mdi:star-outline' -%}
                {%- set points_total_display = states(points_sensor) if has_points_sensor and states(points_sensor) not in ['unknown', 'unavailable', 'None', ''] else '0' -%}
                {%- set header_collapsed = selected_user_ui_root.current['header-collapse'] if has_header_collapsed_override else pref_economy_management_default_header_collapsed -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set economy_label = ui.get('manage_for', 'Manage for') if has_selected_user else ui.get('select_user_first', 'err-select_user_first') -%}
                {%- set economy_label_html = (
