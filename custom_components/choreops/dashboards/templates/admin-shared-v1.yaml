                            'icon': [
                              {'width': '18px'},
                              {'color': 'var(--success-color)'}
                            ]
                          }
                        }
                      }
                    },
                    'styles': {
                      'card': [
                        {'padding': '10px 12px'},
                        {'border-radius': '14px'},
                        {'box-shadow': 'none'},
                        {'border': '1px solid color-mix(in srgb, var(--primary-color) 18%, var(--divider-color))'},
                        {'background-color': 'color-mix(in srgb, var(--primary-color) 6%, var(--card-background-color))'}
                      ],
                      'grid': [
                        {'grid-template-areas': '"i n pick set" "i l pick set"'},
                        {'grid-template-columns': '22px minmax(0, 1fr) min-content min-content'},
                        {'grid-template-rows': 'min-content min-content'},
                        {'column-gap': '10px'},
                        {'row-gap': '3px'},
                        {'align-items': 'center'}
                      ],
                      'icon': [
                        {'width': '18px'},
                        {'color': 'var(--primary-color)'}
                      ],
                      'name': [
                        {'justify-self': 'start'},
                        {'text-align': 'left'},
                        {'font-size': '12px'},
                        {'font-weight': '700'},
                        {'line-height': '1.2'}
                      ],
                      'label': [
                        {'justify-self': 'start'},
                        {'text-align': 'left'},
                        {'font-size': '11px'},
                        {'line-height': '1.25'},
                        {'color': 'var(--secondary-text-color)'},
                        {'white-space': 'normal'}
                      ],
                      'custom_fields': {
                        'pick': [
                          {'justify-self': 'end'},
                          {'align-self': 'center'}
                        ],
                        'set': [
                          {'justify-self': 'end'},
                          {'align-self': 'center'}
                        ]
                      }
                    }
                  } -%}
                  {%- set secondary_action_cards = [{
                    'type': 'custom:button-card',
                    'entity': selected_chore_sensor,
                    'icon': 'mdi:restore',
                    'name': ui.get('reset_overdue_status', 'err-reset_overdue_status'),
                    'show_name': True,
                    'show_icon': True,
                    'show_label': False,
                    'show_state': False,
                    'tap_action': {
                      'action': 'call-service',
                      'service': 'choreops.reset_overdue_chores',
                      'data': {
                        'config_entry_id': integration_entry_id,
                        'chore_name': selected_chore_display,
                        'user_name': user_name_for_service
                      }
                    },
                    'hold_action': {'action': 'more-info'},
                    'styles': {
                      'card': [
                        {'padding': '10px 12px'},
                        {'border-radius': '14px'},
                        {'box-shadow': 'none'},
                        {'border': '1px solid color-mix(in srgb, var(--warning-color) 20%, var(--divider-color))'},
                        {'background-color': 'color-mix(in srgb, var(--warning-color) 10%, var(--card-background-color))'}
                      ],
                      'grid': [
                        {'grid-template-areas': '"i n"'},
                        {'grid-template-columns': '20px minmax(0, 1fr)'},
                        {'column-gap': '8px'},
                        {'align-items': 'center'}
                      ],
                      'icon': [
                        {'width': '18px'},
                        {'color': 'var(--warning-color)'}
                      ],
                      'name': [
                        {'justify-self': 'start'},
                        {'font-size': '12px'},
                        {'font-weight': '700'},
                        {'line-height': '1.2'},
                        {'white-space': 'normal'},
                        {'text-align': 'left'}
                      ]
                    }
                  }] if show_selected_overdue_reset else [] -%}
                  {%- set has_action_cards = true -%}
                  {%- set action_buttons_html = {
                    'card': {
                      'type': 'vertical-stack',
                      'cards': ([{
                        'type': 'vertical-stack',
                        'cards': secondary_action_cards
                      }] if show_selected_overdue_reset else []) + [{
                        'type': 'grid',
                        'square': false,
                        'columns': 4,
                        'cards': primary_action_cards
                      }, date_picker_card]
                    }
                  } -%}
                  {%- set mechanics_html = "<div style='display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px;padding-top:2px;border-top:1px solid color-mix(in srgb, var(--divider-color) 78%, transparent);'>" -%}
                  {%- set mechanics_html = mechanics_html ~ "<div style='display:flex;flex-direction:column;gap:6px;'><div style='font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('rules', 'Rules') ~ "</div><div style='font-size:12px;line-height:1.45;color:var(--primary-text-color);'><strong>" ~ ui.get('pending_claim_action', 'Pending claim') ~ ":</strong> " ~ pending_claim_action_display ~ "<br><strong>" ~ ui.get('overdue_handling', 'Overdue') ~ ":</strong> " ~ overdue_handling_display ~ "<br><strong>" ~ ui.get('auto_approve', 'Auto-approve') ~ ":</strong> " ~ auto_approve_display ~ "</div></div>" -%}
                  {%- set mechanics_html = mechanics_html ~ "<div style='display:flex;flex-direction:column;gap:6px;'><div style='font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('window', 'Window') ~ "</div><div style='font-size:12px;line-height:1.45;color:var(--primary-text-color);'><strong>" ~ ui.get('due_window', 'Due window') ~ ":</strong> " ~ due_window_display ~ "<br><strong>" ~ ui.get('claim_lock', 'Claim lock') ~ ":</strong> " ~ claim_lock_display ~ "<br><strong>" ~ ui.get('applicable_days', 'Applicable Days') ~ ":</strong> " ~ (applicable_days_display if applicable_days_display != '' else ui.get('daily', 'Daily')) ~ "</div></div>" -%}
                  {%- set mechanics_html = mechanics_html ~ "</div>" -%}
                  {%- set stats_html = "<div style='display:flex;flex-wrap:wrap;justify-content:center;gap:8px 10px;padding-top:2px;border-top:1px solid color-mix(in srgb, var(--divider-color) 78%, transparent);'>" -%}
                  {%- set stats_html = stats_html ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid color-mix(in srgb, var(--divider-color) 88%, transparent);background:color-mix(in srgb, var(--secondary-background-color) 72%, var(--card-background-color));font-size:12px;font-weight:600;color:var(--primary-text-color);'>📌 " ~ ui.get('claims', 'err-claims') ~ ": " ~ claims_count ~ "</span>" -%}
                  {%- set stats_html = stats_html ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid color-mix(in srgb, var(--success-color) 14%, var(--divider-color));background:color-mix(in srgb, var(--success-color) 8%, var(--card-background-color));font-size:12px;font-weight:600;color:var(--primary-text-color);'>✅ " ~ ui.get('completed', 'err-completed') ~ ": " ~ completion_count ~ "</span>" -%}
                  {%- set stats_html = stats_html ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid color-mix(in srgb, var(--warning-color) 14%, var(--divider-color));background:color-mix(in srgb, var(--warning-color) 8%, var(--card-background-color));font-size:12px;font-weight:600;color:var(--primary-text-color);'>🔥 " ~ ui.get('streak', 'err-streak') ~ ": " ~ streak_count ~ "</span>" -%}
                  {%- set stats_html = stats_html ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid color-mix(in srgb, var(--divider-color) 88%, transparent);background:color-mix(in srgb, var(--secondary-background-color) 72%, var(--card-background-color));font-size:12px;font-weight:600;color:var(--primary-text-color);'>🕒 " ~ ui.get('last', 'err-last') ~ ": " ~ last_activity_display ~ "</span>" -%}
                  {%- set stats_html = stats_html ~ "</div>" -%}
                  {%- set context_summary = context_label ~ ': ' ~ context_value if context_label != '' and context_value != '' else '' -%}
                  {%- set overview_label = (
                    chore_description ~ ' • ' ~ context_summary
                    if chore_description != '' and overdue_missed_state != '' and context_summary != ''
                    else (
                      context_summary
                      if overdue_missed_state != '' and context_summary != ''
                      else chore_description
                    )
                  ) -%}
                  {%- set chore_overview_card = {
                    'type': 'custom:button-card',
                    'entity': selected_chore_sensor,
                    'show_name': True,
                    'show_label': overview_label != '',
                    'show_state': False,
                    'show_icon': True,
                    'icon': chore_icon,
                    'name': selected_chore_display,
                    'label': overview_label,
                    'tap_action': {'action': 'more-info'},
                    'styles': {
                      'card': [
                        {'padding': '14px 16px'},
                        {'border-radius': '16px'},
                        {'box-shadow': 'none'},
                        {'border': '1px solid color-mix(in srgb, ' ~ current_status_color ~ ' 20%, var(--divider-color))'},
                        {'border-left': '4px solid ' ~ current_status_color},
                        {'background-color': 'color-mix(in srgb, var(--secondary-background-color) 72%, var(--card-background-color))'}
                      ],
                      'grid': [
                        {'grid-template-areas': '"i n status" "i l status" "details details details" "actions actions actions" "rules rules rules" "stats stats stats"' if has_action_cards else '"i n status" "i l status" "details details details" "rules rules rules" "stats stats stats"'},
                        {'grid-template-columns': '32px minmax(140px, 1fr) auto'},
                        {'grid-template-rows': 'min-content min-content min-content min-content min-content min-content' if has_action_cards else 'min-content min-content min-content min-content min-content'},
                        {'column-gap': '14px'},
                        {'row-gap': '8px'},
                        {'align-items': 'start'}
                      ],
                      'icon': [
                        {'width': '24px'},
                        {'height': '24px'},
                        {'align-self': 'start'},
                        {'color': current_status_color}
                      ],
                      'name': [
                        {'justify-self': 'start'},
                        {'min-width': '0'},
                        {'width': '100%'},
                        {'text-align': 'left'},
                        {'font-size': '16px'},
                        {'font-weight': '600'},
                        {'line-height': '1.2'},
                        {'white-space': 'normal'}
                      ],
                      'label': [
                        {'justify-self': 'start'},
                        {'min-width': '0'},
                        {'width': '100%'},
                        {'text-align': 'left'},
                        {'font-size': '12px'},
                        {'line-height': '1.35'},
                        {'white-space': 'normal'},
                        {'color': 'var(--secondary-text-color)'}
                      ],
                      'custom_fields': {
                        'status': [
                          {'justify-self': 'end'},
                          {'align-self': 'start'},
                          {'text-align': 'right'}
                        ],
                        'details': [
                          {'width': '100%'},
                          {'min-width': '0'}
                        ],
                        'actions': [
                          {'width': '100%'},
                          {'min-width': '0'},
                          {'display': 'block' if has_action_cards else 'none'}
                        ],
                        'rules': [
                          {'width': '100%'},
                          {'min-width': '0'}
                        ],
                        'stats': [
                          {'width': '100%'},
                          {'padding-top': '4px'}
                        ]
                      }
                    },
                    'custom_fields': {
                      'status': status_pills,
                      'actions': action_buttons_html,
                      'rules': mechanics_html,
                      'stats': stats_html,
                      'details': detail_grid,
                    }
                  } -%}
                {%- endif -%}

              {#-- 6. Render Logic --#}

              {%- if has_selected_dashboard_helper -%}
                {{ management_summary_card }},
                {%- if not header_collapsed -%}
                  {%- if has_chore_selector and chore_select_card not in [none, None] -%}
                    {{ chore_select_card }},
                    {%- if has_selected_chore and chore_overview_card not in [none, None] -%}
                      {{ chore_overview_card }},
                    {%- endif -%}
                  {%- else -%}
                    {{ chore_selector_error_card }},
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
              {%- endif -%}

        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== ECONOMY MANAGEMENT ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_economy_management_ui_control_key_root = 'admin-shared/economy-management' -%}

              {%- set pref_economy_management_default_header_collapsed = true -%}

              {%- set pref_economy_management_primary_tint_mix_pct = 14 -%}

              {%- set pref_economy_management_show_header_background = true -%}

              {%- set pref_economy_management_show_header_thin_border = true -%}


              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_shared >>

              << template_snippets.admin_validation_missing_selector >>

              {%- set pref_economy_management_ui_control_key_root = (pref_economy_management_ui_control_key_root | default('admin-shared/economy-management') | string) -%}
              {%- set pref_economy_management_ui_control_key_root_segments = pref_economy_management_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_economy_management_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_economy_management_ui_control_key_root_segments = ['admin-shared', 'economy-management'] -%}
              {%- endif -%}
              {%- set pref_economy_management_ui_control_key_root = pref_economy_management_ui_control_key_root_segments | join('/') -%}
              {%- set pref_economy_management_default_header_collapsed = (pref_economy_management_default_header_collapsed | default('true') | string | lower) == 'true' -%}
              {%- set pref_economy_management_primary_tint_mix_pct = pref_economy_management_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_economy_management_show_header_background = (pref_economy_management_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_economy_management_show_header_thin_border = (pref_economy_management_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- if pref_economy_management_primary_tint_mix_pct < 0 -%}
                {%- set pref_economy_management_primary_tint_mix_pct = 0 -%}
              {%- elif pref_economy_management_primary_tint_mix_pct > 100 -%}
                {%- set pref_economy_management_primary_tint_mix_pct = 100 -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set helper_sensor_entities = integration_entities('choreops')
                    | select('search', '^sensor\\.')
                    | list
                    | expand
                    | selectattr('attributes.purpose', 'defined')
                    | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                    | selectattr('attributes.integration_entry_id', 'eq', entry_id)
                    | sort(attribute='attributes.user_name')
                    | list -%}
                {%- set summary_helper = helper_sensor_entities[0].entity_id if helper_sensor_entities | count > 0 else '' -%}
                {%- set ui = {} -%}
                {%- if summary_helper not in ['', None, 'None'] -%}
                  {%- set translation_sensor = (state_attr(summary_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                  {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                {%- else -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard configuration error**\n\nCannot find any dashboard helper entities for this shared admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set integration_entry_id = state_attr(summary_helper, 'integration_entry_id') if summary_helper not in ['', None, 'None'] else '' -%}
                {%- set dashboard_helper_user_id = state_attr(summary_helper, 'user_id') if summary_helper not in ['', None, 'None'] else '' -%}
                {%- set ui_control = state_attr(summary_helper, 'ui_control') | default({}, true) if summary_helper not in ['', None, 'None'] else {} -%}
                {%- set ui_control_key_root = pref_economy_management_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if ui_root.current is mapping -%}
                    {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = ui_root.current is mapping and 'header-collapse' in ui_root.current -%}
                {%- set selected_user_name = states(admin_selector_eid) if admin_selector_eid not in ['', None, 'None'] else '' -%}
                {%- set has_selected_user = selected_user_name not in ['None', 'none', '', 'unknown', 'unavailable'] -%}
                {%- set selected_helper_matches = helper_sensor_entities | selectattr('attributes.user_name', 'eq', selected_user_name) | list if has_selected_user else [] -%}
                {%- set selected_dashboard_helper = state_attr(admin_selector_eid, 'dashboard_helper_eid') if has_selected_user and admin_selector_eid not in ['', None, 'None'] else '' -%}
                {%- if selected_dashboard_helper in ['', None, 'None'] and selected_helper_matches | count > 0 -%}
                  {%- set selected_dashboard_helper = selected_helper_matches[0].entity_id -%}
                {%- endif -%}
                {%- set has_selected_dashboard_helper = selected_dashboard_helper not in ['', None, 'None'] and states(selected_dashboard_helper) not in ['unknown', 'unavailable'] -%}
                {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
                {%- set selected_core_sensors = state_attr(selected_dashboard_helper, 'core_sensors') or {} if has_selected_dashboard_helper else {} -%}
                {%- set points_sensor = selected_core_sensors.get('points_eid') if has_selected_dashboard_helper else '' -%}
                {%- set selected_translation_sensor = selected_dashboard_helpers.get('translation_sensor_eid') if has_selected_dashboard_helper else '' -%}
                {%- set ui = state_attr(selected_translation_sensor, 'ui_translations') if selected_translation_sensor else ui -%}
                {%- set selected_gamification_enabled = state_attr(selected_dashboard_helper, 'gamification_enabled') | default(false, true) if has_selected_dashboard_helper else false -%}
                {%- set has_points_sensor = points_sensor not in ['', None, 'None'] and states(points_sensor) not in ['unknown', 'unavailable'] -%}
                {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if has_points_sensor else None) or 'Points' -%}
                {%- set points_icon = (state_attr(points_sensor, 'icon') if has_points_sensor else None) or 'mdi:star-outline' -%}
                {%- set points_total_display = states(points_sensor) if has_points_sensor and states(points_sensor) not in ['unknown', 'unavailable', 'None', ''] else '0' -%}
                {%- set header_collapsed = (ui_root.current['header-collapse'] if has_header_collapsed_override else pref_economy_management_default_header_collapsed) | default(pref_economy_management_default_header_collapsed, true) -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set economy_label = (ui.get('viewing_selected_user', 'err-viewing_selected_user') ~ ': ' ~ selected_user_name) if has_selected_user else ui.get('select_user_first', 'err-select_user_first') -%}
                {%- set economy_label_html = (
                  "<span style='color:var(--secondary-text-color);'>" ~ ui.get('viewing_selected_user', 'err-viewing_selected_user') ~ ":</span> <span style='font-weight:700;color:var(--primary-text-color);'>" ~ (selected_user_name | e) ~ "</span>"
                  if has_selected_user
                  else economy_label
                ) -%}

                {#-- 5. Build Display --#}

                {%- set economy_summary_card = {
                  'type': 'custom:button-card',
                  'entity': points_sensor if has_points_sensor else selected_dashboard_helper,
                  'show_name': True,
                  'show_label': False,
                  'show_state': False,
                  'show_icon': True,
                  'icon': points_icon,
                  'name': points_label,
                  'label': economy_label,
                  'tap_action': ({
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': dashboard_helper_user_id,
                      'ui_control_action': 'update',
                      'key': ui_control_key_header_collapsed,
                      'value': false
                    }
                  } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': dashboard_helper_user_id,
                      'ui_control_action': 'remove',
                      'key': ui_control_key_header_collapsed
                    }
                  } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                    'action': 'none'
                  }),
                  'hold_action': {'action': 'more-info'} if has_points_sensor else {'action': 'none'},
                  'custom_fields': {
                    'subtitle': economy_label_html,
                    'target': "<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;max-width:200px;overflow:hidden;'><span style='display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:16px;font-weight:700;color:var(--primary-text-color);'>" ~ points_total_display ~ "</span><span style='display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--primary-color);'>" ~ ui.get('available', 'err-available') ~ "</span></div>",
                    'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                  },
                  'styles': {
                    'card': [
                      {'padding': '8px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_economy_management_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if header_collapsed and pref_economy_management_show_header_thin_border else 'none' if header_collapsed else ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_economy_management_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if pref_economy_management_show_header_thin_border else 'none'},
                      {'background-color': ('color-mix(in srgb, var(--primary-color) ' ~ pref_economy_management_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed and pref_economy_management_show_header_background else 'transparent' if header_collapsed else ('color-mix(in srgb, var(--primary-color) ' ~ pref_economy_management_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if pref_economy_management_show_header_background else 'transparent'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n target toggle" "i subtitle target toggle"'},
                      {'grid-template-columns': '32px minmax(150px, 1fr) minmax(0, auto) min-content'},
                      {'grid-template-rows': 'min-content min-content'},
                      {'column-gap': '14px'},
                      {'row-gap': '2px'},
                      {'align-items': 'center'}
                    ],
                    'icon': [
                      {'width': '24px'},
                      {'height': '24px'},
                      {'align-self': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'min-width': '0'},
                      {'width': '100%'},
                      {'text-align': 'left'},
                      {'font-size': '14px'},
                      {'font-weight': '700'},
                      {'line-height': '1.2'},
                      {'text-transform': 'uppercase'}
                    ],
                    'custom_fields': {
                      'subtitle': [
                        {'justify-self': 'start'},
                        {'min-width': '0'},
                        {'width': '100%'},
                        {'text-align': 'left'},
                        {'font-size': '12px'},
                        {'line-height': '1.35'},
                        {'color': 'var(--secondary-text-color)'},
                        {'white-space': 'normal'}
                      ],
                      'target': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'},
                        {'min-width': '0'},
                        {'max-width': '200px'},
                        {'text-align': 'right'}
                      ],
                      'toggle': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'}
                      ]
                    }
                  }
                } -%}

              {#-- 6. Render Logic --#}

              {%- if has_selected_dashboard_helper and selected_gamification_enabled -%}
                {{ economy_summary_card }},
              {%- endif -%}
              {%- endif -%}


        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== SYSTEM ADMINISTRATION ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>


              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_shared >>

              << template_snippets.admin_validation_missing_selector >>

              {%- if not skip_render -%}

                {%- set helper_sensor_entities = integration_entities('choreops')
                    | select('search', '^sensor\\.')
                    | list
                    | expand
                    | selectattr('attributes.purpose', 'defined')
                    | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                    | selectattr('attributes.integration_entry_id', 'eq', entry_id)
                    | sort(attribute='attributes.user_name')
                    | list -%}
                {%- set summary_helper = helper_sensor_entities[0].entity_id if helper_sensor_entities | count > 0 else '' -%}
                {%- set translation_sensor = (state_attr(summary_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') if summary_helper not in ['', None, 'None'] else '' -%}
                {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor not in ['', None, 'None'] else {} -%}

                {{ {
                  'type': 'custom:button-card',
                  'entity': admin_selector_eid,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:wrench-outline',
                  'name': ui.get('system_administration', 'err-system_administration'),
                  'label': ui.get('link_to_choreops_integration_configuration', 'err-link_to_choreops_integration_configuration'),
                  'tap_action': {
                    'action': 'url',
                    'url_path': '/config/integrations/integration/choreops'
                  },
                  'hold_action': {'action': 'more-info'},
                  "styles": {
                    "card": [
                      {"margin-top": "8px"},
                      {"padding": "14px 16px"},
                      {"border-radius": "16px"},
                      {"background-color": "var(--card-background-color)"},
                      {"border": "1px solid var(--divider-color)"}
                    ],
                    "grid": [
                      {"grid-template-areas": "'i n' 'i l'"},
                      {"grid-template-columns": "32px 1fr"},
                      {"align-items": "center"},
                      {"column-gap": "14px"}
                    ],
                    "icon": [
                      {"width": "24px"},
                      {"height": "24px"},
                      {"align-self": "center"},
                      {"color": "var(--primary-color)"}
                    ],
                    "name": [
                      {"justify-self": "start"},
                      {"font-size": "14px"},
                      {"font-weight": "700"},
                      {"line-height": "1.2"},
                      {"text-transform": "uppercase"},
                      {"letter-spacing": "0.05em"}
                    ],
                    "label": [
                      {"justify-self": "start"},
                      {"font-size": "12px"},
                      {"line-height": "1.35"},
                      {"white-space": "normal"},
                      {"color": "var(--secondary-text-color)"}
                    ]
                  }
                } }},
              {%- endif -%}
