                  {%- set selected_date_display = as_timestamp(states(dashboard_date_helper)) | timestamp_custom('%a, %b %d • %I:%M %p', true) if dashboard_date_helper not in ['', None, 'None'] and states(dashboard_date_helper) not in ['unknown', 'unavailable', 'None', ''] else ui.get('no_date_set', 'err-no_date_set') -%}
                  {%- set show_selected_overdue_reset = raw_chore_state in ['overdue', 'missed'] and selected_user_name not in ['', 'None', 'none', 'unknown', 'unavailable'] and integration_entry_id not in ['', None, 'None'] -%}
                  {%- set status_pills = "<div style='display:flex;flex-direction:column;align-items:flex-end;gap:6px;'>" -%}
                  {%- set status_pills = status_pills ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid color-mix(in srgb, " ~ current_status_color ~ " 18%, var(--divider-color));background:color-mix(in srgb, " ~ current_status_color ~ " 8%, var(--card-background-color));font-size:11px;font-weight:600;line-height:1;color:" ~ current_status_color ~ ";'>" ~ current_status_display ~ "</span>" -%}
                  {%- if global_status_display != current_status_display -%}
                    {%- set status_pills = status_pills ~ "<span style='display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid color-mix(in srgb, " ~ global_status_color ~ " 18%, var(--divider-color));background:color-mix(in srgb, " ~ global_status_color ~ " 8%, var(--card-background-color));font-size:11px;font-weight:600;line-height:1;color:" ~ global_status_color ~ ";'>" ~ global_status_display ~ "</span>" -%}
                  {%- endif -%}
                  {%- set status_pills = status_pills ~ "</div>" -%}
