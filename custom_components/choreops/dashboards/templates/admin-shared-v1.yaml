                        ]
                      }
                    },
                    {
                      'type': 'custom:button-card',
                      'entity': selected_chore_sensor,
                      'icon': 'mdi:calendar-remove',
                      'name': ui.get('clear_date', 'err-clear_date'),
                      'show_name': True,
                      'show_icon': True,
