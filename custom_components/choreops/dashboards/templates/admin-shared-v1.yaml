<#-- ============================================= --#>
<#-- ChoreOps Dashboard Template - ADMIN      --#>
<#-- Template Schema Version: 1                  --#>
<#-- ============================================= --#>
<#--                                             --#>
<#-- Admin dashboard: Shared approval board      --#>
<#-- Uses integration.entry_id injection for     --#>
<#-- instance-safe helper lookup                 --#>
<#--                                             --#>
<#-- Snippet tokens: template_snippets.admin_setup_shared,               --#>
<#-- template_snippets.admin_validation_missing_selector,                --#>
<#-- template_snippets.user_override_helper, template_snippets.meta_stamp --#>
<#-- Stamp format (canonical): META STAMP: {template_id} • {release} • {generated_at} --#>
<#-- Stamp placement: first line inside each card template block after card header comment --#>
<#--                                             --#>
<#-- All HA Jinja2 {{ }} syntax preserved       --#>
<#-- ============================================= --#>

views:
- title: ChoreOps Admin
  path: admin
  sections:
    - type: grid
      cards:
        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== APPROVAL BOARD ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_ui_control_key_root = 'admin-shared/approval-center' -%}

              {%- set pref_default_header_collapsed = false -%}

              {%- set pref_primary_tint_mix_pct = 14 -%}

              {%- set pref_show_header_background = true -%}

              {%- set pref_show_header_thin_border = true -%}

              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_shared >>

              << template_snippets.admin_validation_missing_selector >>

              {%- set pref_ui_control_key_root = (pref_ui_control_key_root | default('admin-shared/approval-center') | string) -%}
              {%- set pref_ui_control_key_root_segments = pref_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_ui_control_key_root_segments = ['admin-shared', 'approval-center'] -%}
              {%- endif -%}
              {%- set pref_ui_control_key_root = pref_ui_control_key_root_segments | join('/') -%}
              {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
              {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- if pref_primary_tint_mix_pct < 0 -%}
                {%- set pref_primary_tint_mix_pct = 0 -%}
              {%- elif pref_primary_tint_mix_pct > 100 -%}
                {%- set pref_primary_tint_mix_pct = 100 -%}
              {%- endif -%}
              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set helper_sensor_entities = integration_entities('choreops')
                    | select('search', '^sensor\\.')
                    | list
                    | expand
                    | selectattr('attributes.purpose', 'defined')
                    | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                    | selectattr('attributes.integration_entry_id', 'eq', entry_id)
                    | sort(attribute='attributes.user_name')
                    | list -%}
                {%- set ns = namespace(
                  lanes=[],
                  total_chore_pending=0,
                  total_reward_pending=0,
                  pending_user_count=0,
                  summary_helper=''
                ) -%}
                {%- if helper_sensor_entities | count > 0 -%}
                  {%- set ns.summary_helper = helper_sensor_entities[0].entity_id -%}
                {%- else -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard configuration error**\n\nCannot find any dashboard helper entities for this shared admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set ui = {} -%}
                {%- if ns.summary_helper not in ['', None, 'None'] -%}
                  {%- set translation_sensor = (state_attr(ns.summary_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                  {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                {%- endif -%}
                {%- set integration_entry_id = state_attr(ns.summary_helper, 'integration_entry_id') if ns.summary_helper not in ['', None, 'None'] else '' -%}
                {%- set dashboard_helper_user_id = state_attr(ns.summary_helper, 'user_id') if ns.summary_helper not in ['', None, 'None'] else '' -%}
                {%- set ui_control = state_attr(ns.summary_helper, 'ui_control') | default({}, true) if ns.summary_helper not in ['', None, 'None'] else {} -%}
                {%- set ui_control_key_root = pref_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if ui_root.current is mapping -%}
                    {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = ui_root.current is mapping and 'header-collapse' in ui_root.current -%}

                {#-- 5. Build Display --#}

                {%- for helper_state in helper_sensor_entities -%}
                {%- set helper_entity_id = helper_state.entity_id -%}
                {%- set helper_attrs = helper_state.attributes -%}
                {%- set helper_name = helper_attrs.user_name | default(helper_state.name, true) -%}
                {%- set dashboard_helpers = helper_attrs.dashboard_helpers | default({}, true) -%}
                {%- set translation_sensor = dashboard_helpers.get('translation_sensor_eid') -%}
                {%- set helper_ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else ui -%}
                {%- set pending_approvals = helper_attrs.pending_approvals | default({}, true) -%}
                {%- set pending_chore_data = pending_approvals.get('chores', []) | default([], true) -%}
                {%- set pending_reward_data = pending_approvals.get('rewards', []) | default([], true) -%}
                {%- set helper_chore_items = helper_attrs.chores | default([], true) -%}
                {%- set helper_reward_items = helper_attrs.rewards | default([], true) -%}
                {%- set chore_count = pending_chore_data | count -%}
                {%- set reward_count = pending_reward_data | count -%}
                {%- set total_count = chore_count + reward_count -%}
                {%- if total_count > 0 -%}
                  {%- set ns.total_chore_pending = ns.total_chore_pending + chore_count -%}
                  {%- set ns.total_reward_pending = ns.total_reward_pending + reward_count -%}
                  {%- set ns.pending_user_count = ns.pending_user_count + 1 -%}
                  {%- set combined_summary = "<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;'><span style='font-size:16px;font-weight:700;'>" ~ total_count ~ "</span><span style='margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ helper_ui.get('approvals', 'err-approvals') ~ "</span></div>" -%}
                  {%- set header_card = {
                    'type': 'custom:button-card',
                    'entity': helper_entity_id,
                    'show_name': True,
                    'show_label': False,
                    'show_state': False,
                    'show_icon': True,
                    'icon': 'mdi:account-circle',
                    'icon_color': '#A957FA',
                    'name': helper_name,
                    'tap_action': {'action': 'none'},
                    'hold_action': {'action': 'more-info'},
                    'custom_fields': {
                      'approval_count': combined_summary
                    },
                    'styles': {
                      'card': [
                        {'padding': '10px 2px 2px 2px'},
                        {'border-radius': '0'},
                        {'box-shadow': 'none'},
                        {'border': 'none'},
                        {'background': 'transparent'},
                        {'margin-top': '14px'},
                        {'margin-bottom': '4px'}
                      ],
                      'grid': [
                        {'grid-template-areas': '"i n approval_count" "i n approval_count"'},
                        {'grid-template-columns': '30px minmax(0, 1fr) auto'},
                        {'grid-template-rows': 'min-content min-content'},
                        {'column-gap': '12px'},
                        {'row-gap': '2px'},
                        {'align-items': 'center'}
                      ],
                      'name': [
                        {'justify-self': 'start'},
                        {'align-self': 'center'},
                        {'font-size': '22px'},
                        {'font-weight': '800'},
                        {'line-height': '1.2'}
                      ],
                      'icon': [
                        {'width': '20px'},
                        {'height': '20px'},
                        {'color': 'var(--primary-text-color)'},
                        {'align-self': 'center'}
                      ],
                      'custom_fields': {
                        'approval_count': [
                          {'justify-self': 'end'},
                          {'text-align': 'right'},
                          {'line-height': '1'},
                          {'white-space': 'nowrap'},
                          {'padding': '4px 0 0 0'}
                        ]
                      }
                    }
                  } -%}
                  {%- set row_ns = namespace(cards=[]) -%}
                  {%- for entry in pending_chore_data -%}
                    {%- set approve_eid = (entry.approve_button_eid if entry.approve_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set return_eid = (entry.disapprove_button_eid if entry.disapprove_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set chore_match = helper_chore_items | selectattr('name', 'eq', entry.chore_name) | list -%}
                    {%- set chore_eid = chore_match[0].eid if chore_match | count > 0 else '' -%}
                    {%- set item_icon = (state_attr(chore_eid, 'icon') if chore_eid not in ['', None, 'None'] else None) or 'mdi:broom' -%}
                    {%- set claimed_at_iso = state_attr(chore_eid, 'last_claimed') if chore_eid not in ['', None, 'None'] else None -%}
                    {%- set last_completed_iso = state_attr(chore_eid, 'last_completed') if chore_eid not in ['', None, 'None'] else None -%}
                    {%- set claimed_at_display = (as_timestamp(claimed_at_iso) | timestamp_custom('%Y-%m-%d %-I:%M%p', true)) if claimed_at_iso not in ['', None, 'None'] else '' -%}
                    {%- set last_completed_display = (as_timestamp(last_completed_iso) | timestamp_custom('%Y-%m-%d', true)) if last_completed_iso not in ['', None, 'None'] else '' -%}
                    {%- set meta_text = helper_ui.get('chore_claimed', 'err-chore_claimed') ~ ': ' ~ claimed_at_display if claimed_at_display != '' else helper_ui.get('chore', 'err-chore') -%}
                    {%- if last_completed_display != '' -%}
                      {%- set meta_text = meta_text ~ ' • ' ~ helper_ui.get('last', 'err-last') ~ ': ' ~ last_completed_display -%}
                    {%- endif -%}
                    {%- if approve_eid != '' or return_eid != '' -%}
                      {%- set row_ns.cards = row_ns.cards + [{
                        'type': 'custom:button-card',
                        'entity': approve_eid if approve_eid != '' else return_eid,
                        'show_name': False,
                        'show_icon': False,
                        'show_label': False,
                        'show_state': False,
                        'tap_action': {'action': 'none'},
                        'hold_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '9px 12px'},
                            {'border-radius': '14px'},
                            {'box-shadow': 'none'},
                            {'border': '1px solid color-mix(in srgb, #A957FA 14%, var(--divider-color))'},
                            {'background-color': 'var(--card-background-color)'},
                            {'border-left': '3px solid #A957FA'}
                          ],
                          'grid': [
                            {'grid-template-areas': '"kind title btn_return btn_approve" "kind meta btn_return btn_approve"'},
                            {'grid-template-columns': '36px minmax(0, 1fr) 42px 42px'},
                            {'grid-template-rows': 'min-content min-content'},
                            {'column-gap': '10px'},
                            {'row-gap': '2px'},
                            {'align-items': 'center'}
                          ],
                          'custom_fields': {
                            'kind': [
                              {'align-self': 'center'},
                              {'justify-self': 'center'}
                            ],
                            'title': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'line-height': '1.25'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'meta': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '11px'},
                              {'color': 'var(--secondary-text-color)'},
                              {'line-height': '1.2'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'btn_return': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ],
                            'btn_approve': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ]
                          }
                        },
                        'custom_fields': {
                          'kind': "<div style='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(169,87,250,0.08);border:1px solid rgba(169,87,250,0.24);'><ha-icon icon='" ~ item_icon ~ "' style='width:18px;height:18px;color:#A957FA;transform:translateY(-3px);'></ha-icon></div>",
                          'title': entry.chore_name | default('', true),
                          'meta': meta_text,
                          'btn_return': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': return_eid if return_eid != '' else approve_eid,
                              'icon': 'mdi:undo-variant',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': return_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(244, 67, 54, 0.08)'},
                                  {'border': '1px solid rgba(244, 67, 54, 0.28)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if return_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--error-color)'}
                                ]
                              }
                            }
                          },
                          'btn_approve': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': approve_eid if approve_eid != '' else return_eid,
                              'icon': 'mdi:check-bold',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': approve_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(76, 175, 80, 0.10)'},
                                  {'border': '1px solid rgba(76, 175, 80, 0.30)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if approve_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--success-color)'}
                                ]
                              }
                            }
                          }
                        }
                      }] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- for entry in pending_reward_data -%}
                    {%- set approve_eid = (entry.approve_button_eid if entry.approve_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set return_eid = (entry.disapprove_button_eid if entry.disapprove_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set reward_match = helper_reward_items | selectattr('name', 'eq', entry.reward_name) | list -%}
                    {%- set reward_eid = reward_match[0].eid if reward_match | count > 0 else '' -%}
                    {%- set item_icon = (state_attr(reward_eid, 'icon') if reward_eid not in ['', None, 'None'] else None) or 'mdi:gift-outline' -%}
                    {%- set requested_at_iso = state_attr(reward_eid, 'last_claimed') if reward_eid not in ['', None, 'None'] else None -%}
                    {%- set last_approved_iso = state_attr(reward_eid, 'last_approved') if reward_eid not in ['', None, 'None'] else None -%}
                    {%- set requested_at_display = (as_timestamp(requested_at_iso) | timestamp_custom('%Y-%m-%d %-I:%M%p', true)) if requested_at_iso not in ['', None, 'None'] else '' -%}
                    {%- set last_approved_display = (as_timestamp(last_approved_iso) | timestamp_custom('%Y-%m-%d', true)) if last_approved_iso not in ['', None, 'None'] else '' -%}
                    {%- set meta_text = helper_ui.get('reward_requested', 'err-reward_requested') ~ ': ' ~ requested_at_display if requested_at_display != '' else helper_ui.get('reward', 'err-reward') -%}
                    {%- if last_approved_display != '' -%}
                      {%- set meta_text = meta_text ~ ' • ' ~ helper_ui.get('last', 'err-last') ~ ': ' ~ last_approved_display -%}
                    {%- endif -%}
                    {%- if approve_eid != '' or return_eid != '' -%}
                      {%- set row_ns.cards = row_ns.cards + [{
                        'type': 'custom:button-card',
                        'entity': approve_eid if approve_eid != '' else return_eid,
                        'show_name': False,
                        'show_icon': False,
                        'show_label': False,
                        'show_state': False,
                        'tap_action': {'action': 'none'},
                        'hold_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '9px 12px'},
                            {'border-radius': '14px'},
                            {'box-shadow': 'none'},
                            {'border': '1px solid color-mix(in srgb, #A957FA 14%, var(--divider-color))'},
                            {'background-color': 'var(--card-background-color)'},
                            {'border-left': '3px solid #A957FA'}
                          ],
                          'grid': [
                            {'grid-template-areas': '"kind title btn_return btn_approve" "kind meta btn_return btn_approve"'},
                            {'grid-template-columns': '36px minmax(0, 1fr) 42px 42px'},
                            {'grid-template-rows': 'min-content min-content'},
                            {'column-gap': '10px'},
                            {'row-gap': '2px'},
                            {'align-items': 'center'}
                          ],
                          'custom_fields': {
                            'kind': [
                              {'align-self': 'center'},
                              {'justify-self': 'center'}
                            ],
                            'title': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'line-height': '1.25'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'meta': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '11px'},
                              {'color': 'var(--secondary-text-color)'},
                              {'line-height': '1.2'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'btn_return': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ],
                            'btn_approve': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ]
                          }
                        },
                        'custom_fields': {
                          'kind': "<div style='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(169,87,250,0.08);border:1px solid rgba(169,87,250,0.24);'><ha-icon icon='" ~ item_icon ~ "' style='width:18px;height:18px;color:#A957FA;transform:translateY(-3px);'></ha-icon></div>",
                          'title': entry.reward_name | default('', true),
                          'meta': meta_text,
                          'btn_return': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': return_eid if return_eid != '' else approve_eid,
                              'icon': 'mdi:undo-variant',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': return_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(244, 67, 54, 0.08)'},
                                  {'border': '1px solid rgba(244, 67, 54, 0.28)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if return_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--error-color)'}
                                ]
                              }
                            }
                          },
                          'btn_approve': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': approve_eid if approve_eid != '' else return_eid,
                              'icon': 'mdi:check-bold',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'data': {
                                  'entity_id': approve_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(76, 175, 80, 0.10)'},
                                  {'border': '1px solid rgba(76, 175, 80, 0.30)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if approve_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--success-color)'}
                                ]
                              }
                            }
                          }
                        }
                      }] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set lane_card = {
                    'type': 'vertical-stack',
                    'cards': [
                      header_card,
                      {
                        'type': 'grid',
                        'columns': 1,
                        'square': False,
                        'cards': row_ns.cards
                      }
                    ]
                  } -%}
                  {%- set ns.lanes = ns.lanes + [lane_card] -%}
                {%- endif -%}
                {%- endfor -%}

                {#-- 6. Render --#}

                {%- set total_pending = ns.total_chore_pending + ns.total_reward_pending -%}
                {%- set header_collapsed = ui_root.current['header-collapse'] if has_header_collapsed_override else (false if total_pending > 0 else pref_default_header_collapsed) -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set show_summary_count = header_collapsed or total_pending == 0 -%}
                {%- set collapsed_summary = "<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;'><span style='font-size:16px;font-weight:700;'>" ~ total_pending ~ "</span><span style='margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('approvals', 'err-approvals') ~ "</span></div>" -%}
              {%- set summary_card = {
                'type': 'custom:button-card',
                'entity': ns.summary_helper if ns.summary_helper not in ['', None, 'None'] else None,
                'show_name': True,
                'show_label': True,
                'show_state': False,
                'show_icon': True,
                'icon': 'mdi:clipboard-check-multiple-outline',
                'icon_color': '#A957FA',
                'name': ui.get('approval_center', 'err-approval_center'),
                'label': ui.get('review_chores_and_rewards_waiting_for_approval', 'err-review_chores_and_rewards_waiting_for_approval'),
                'tap_action': ({
                  'action': 'call-service',
                  'service': 'choreops.manage_ui_control',
                  'data': {
                    'config_entry_id': integration_entry_id,
                    'user_id': dashboard_helper_user_id,
                    'ui_control_action': 'remove',
                    'key': ui_control_key_header_collapsed
                  }
                } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                  'action': 'call-service',
                  'service': 'choreops.manage_ui_control',
                  'data': {
                    'config_entry_id': integration_entry_id,
                    'user_id': dashboard_helper_user_id,
                    'ui_control_action': 'update',
                    'key': ui_control_key_header_collapsed,
                    'value': true
                  }
                } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                  'action': 'none'
                }),
                'hold_action': {'action': 'more-info'} if ns.summary_helper not in ['', None, 'None'] else {'action': 'none'},
                'custom_fields': {
                  'approval_count': collapsed_summary,
                  'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                },
                'styles': {
                  'card': [
                    {'padding': '14px 16px'},
                    {'border-radius': '16px'},
                    {'box-shadow': 'none'},
                    {'border': ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if header_collapsed and pref_show_header_thin_border else 'none' if header_collapsed else '1px solid color-mix(in srgb, #A957FA 18%, var(--divider-color))'},
                    {'background-color': ('color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed and pref_show_header_background else 'transparent' if header_collapsed else 'color-mix(in srgb, var(--secondary-background-color) 72%, var(--card-background-color))'}
                  ],
                  'grid': [
                    {'grid-template-areas': '"i n approval_count toggle"' if show_summary_count else '"i n toggle" "i l toggle"'},
                    {'grid-template-columns': '32px minmax(0, 1fr) auto min-content' if show_summary_count else '32px minmax(0, 1fr) min-content'},
                    {'grid-template-rows': 'min-content' if show_summary_count else 'min-content min-content'},
                    {'column-gap': '14px'},
                    {'row-gap': '2px'},
                    {'align-items': 'center'}
                  ],
                  'name': [
                    {'justify-self': 'start'},
                    {'font-size': '14px'},
                    {'font-weight': '700'},
                    {'line-height': '1.2'},
                    {'text-transform': 'uppercase'}
                  ],
                  'label': [
                    {'display': 'none' if show_summary_count else 'block'},
                    {'justify-self': 'start'},
                    {'font-size': '12px'},
                    {'line-height': '1.35'},
                    {'white-space': 'normal'},
                    {'color': 'var(--secondary-text-color)'}
                  ],
                  'icon': [
                    {'width': '24px'},
                    {'height': '24px'},
                    {'align-self': 'center'}
                  ],
                  'custom_fields': {
                    'approval_count': [
                      {'justify-self': 'end'},
                      {'text-align': 'right'},
                      {'line-height': '1'},
                      {'white-space': 'nowrap'},
                      {'display': 'block' if show_summary_count else 'none'},
                      {'padding': '4px 0 0 0' if show_summary_count else '0'}
                    ],
                    'toggle': [
                      {'justify-self': 'end'},
                      {'align-self': 'center'}
                    ]
                  }
                }
              } -%}
              {{ summary_card }},
              {%- if header_collapsed -%}
              {%- else -%}
                {%- for lane in ns.lanes -%}
                  {{ lane }},
                {%- endfor -%}
              {%- endif -%}
              {%- endif -%}

        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== MANAGEMENT ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_selector_ui_control_key_root = 'admin-shared/admin-target-selector' -%}

              {%- set pref_selector_default_header_collapsed = true -%}

              {%- set pref_selector_primary_tint_mix_pct = 14 -%}

              {%- set pref_selector_show_header_background = true -%}

              {%- set pref_selector_show_header_thin_border = true -%}

              {%- set pref_selector_column_count = 3 -%}


              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_shared >>

              << template_snippets.admin_validation_missing_selector >>

              {%- set pref_selector_ui_control_key_root = (pref_selector_ui_control_key_root | default('admin-shared/admin-target-selector') | string) -%}
              {%- set pref_selector_ui_control_key_root_segments = pref_selector_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_selector_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_selector_ui_control_key_root_segments = ['admin-shared', 'admin-target-selector'] -%}
              {%- endif -%}
              {%- set pref_selector_ui_control_key_root = pref_selector_ui_control_key_root_segments | join('/') -%}
              {%- set pref_selector_default_header_collapsed = (pref_selector_default_header_collapsed | default('true') | string | lower) == 'true' -%}
              {%- set pref_selector_primary_tint_mix_pct = pref_selector_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_selector_show_header_background = (pref_selector_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_selector_show_header_thin_border = (pref_selector_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- if pref_selector_primary_tint_mix_pct < 0 -%}
                {%- set pref_selector_primary_tint_mix_pct = 0 -%}
              {%- elif pref_selector_primary_tint_mix_pct > 100 -%}
                {%- set pref_selector_primary_tint_mix_pct = 100 -%}
              {%- endif -%}
              {%- set pref_selector_column_count = pref_selector_column_count | int(default=3) -%}
              {%- if pref_selector_column_count < 1 -%}
                {%- set pref_selector_column_count = 1 -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set helper_sensor_entities = integration_entities('choreops')
                    | select('search', '^sensor\\.')
                    | list
                    | expand
                    | selectattr('attributes.purpose', 'defined')
                    | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                    | selectattr('attributes.integration_entry_id', 'eq', entry_id)
                    | sort(attribute='attributes.user_name')
                    | list -%}
                {%- set summary_helper = helper_sensor_entities[0].entity_id if helper_sensor_entities | count > 0 else '' -%}
                {%- set ui = {} -%}
                {%- if summary_helper not in ['', None, 'None'] -%}
                  {%- set translation_sensor = (state_attr(summary_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                  {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                {%- else -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard configuration error**\n\nCannot find any dashboard helper entities for this shared admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set integration_entry_id = state_attr(summary_helper, 'integration_entry_id') if summary_helper not in ['', None, 'None'] else '' -%}
                {%- set dashboard_helper_user_id = state_attr(summary_helper, 'user_id') if summary_helper not in ['', None, 'None'] else '' -%}
                {%- set ui_control = state_attr(summary_helper, 'ui_control') | default({}, true) if summary_helper not in ['', None, 'None'] else {} -%}
                {%- set ui_control_key_root = pref_selector_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if ui_root.current is mapping -%}
                    {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = ui_root.current is mapping and 'header-collapse' in ui_root.current -%}
                {%- set selected_user_name = states(admin_selector_eid) if admin_selector_eid not in ['', None, 'None'] else '' -%}
                {%- set has_selected_user = selected_user_name not in ['None', 'none', '', 'unknown', 'unavailable'] -%}
                {%- set selected_user_display = selected_user_name if has_selected_user else '' -%}
                {%- set selected_helper_matches = helper_sensor_entities | selectattr('attributes.user_name', 'eq', selected_user_name) | list if has_selected_user else [] -%}
                {%- set selected_dashboard_helper = state_attr(admin_selector_eid, 'dashboard_helper_eid') if has_selected_user and admin_selector_eid not in ['', None, 'None'] else '' -%}
                {%- if selected_dashboard_helper in ['', None, 'None'] and selected_helper_matches | count > 0 -%}
                  {%- set selected_dashboard_helper = selected_helper_matches[0].entity_id -%}
                {%- endif -%}
                {%- set selected_helper_chores = state_attr(selected_dashboard_helper, 'chores') | default([], true) if selected_dashboard_helper not in ['', None, 'None'] and states(selected_dashboard_helper) not in ['unknown', 'unavailable'] else [] -%}
                {%- set overdue_chore_count = selected_helper_chores | selectattr('state', 'eq', 'overdue') | list | count -%}
                {%- set show_reset_all_overdue_card = has_selected_user and overdue_chore_count > 0 and integration_entry_id not in ['', None, 'None'] -%}
                {%- set ns = namespace(chips=[]) -%}
                {%- set header_collapsed = ui_root.current['header-collapse'] if has_header_collapsed_override else pref_selector_default_header_collapsed -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set selector_label = ui.get('viewing_selected_user', 'err-viewing_selected_user') if has_selected_user else ui.get('choose_user_for_admin_actions', 'err-choose_user_for_admin_actions') -%}
                {%- set selector_status_label = ui.get('active', 'err-active') if has_selected_user else '' -%}
                {%- set selector_status_color = 'var(--primary-color)' if has_selected_user else 'var(--secondary-text-color)' -%}

                {#-- 5. Build Display --#}

                {%- set selector_summary_card = {
                  'type': 'custom:button-card',
                  'entity': admin_selector_eid,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:account-cog-outline',
                  'name': ui.get('management', 'err-management'),
                  'label': selector_label,
                  'tap_action': ({
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': dashboard_helper_user_id,
                      'ui_control_action': 'update',
                      'key': ui_control_key_header_collapsed,
                      'value': false
                    }
                  } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': dashboard_helper_user_id,
                      'ui_control_action': 'remove',
                      'key': ui_control_key_header_collapsed
                    }
                  } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                    'action': 'none'
                  }),
                  'hold_action': {'action': 'more-info'},
                  'custom_fields': {
                    'target': ("<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;'><span style='font-size:16px;font-weight:700;color:var(--primary-text-color);'>" ~ selected_user_display ~ "</span><span style='margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:" ~ selector_status_color ~ ";'>" ~ selector_status_label ~ "</span></div>") if has_selected_user else '',
                    'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                  },
                  'styles': {
                    'card': [
                      {'margin-top': '10px'},
                      {'padding': '14px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': 'none' if has_selected_user else ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_selector_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if header_collapsed and pref_selector_show_header_thin_border else 'none' if header_collapsed else ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_selector_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if pref_selector_show_header_thin_border else 'none'},
                      {'background-color': 'transparent' if has_selected_user else ('color-mix(in srgb, var(--primary-color) ' ~ pref_selector_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed and pref_selector_show_header_background else 'transparent' if header_collapsed else ('color-mix(in srgb, var(--primary-color) ' ~ pref_selector_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if pref_selector_show_header_background else 'transparent'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n target toggle" "i l target toggle"' if has_selected_user else '"i n toggle" "i l toggle"'},
                      {'grid-template-columns': '32px minmax(0, 1fr) auto min-content' if has_selected_user else '32px minmax(0, 1fr) min-content'},
                      {'grid-template-rows': 'min-content min-content'},
                      {'column-gap': '14px'},
                      {'row-gap': '2px'},
                      {'align-items': 'center'}
                    ],
                    'icon': [
                      {'width': '24px'},
                      {'height': '24px'},
                      {'align-self': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'text-align': 'left'},
                      {'font-size': '14px'},
                      {'font-weight': '700'},
                      {'line-height': '1.2'},
                      {'text-transform': 'uppercase'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'text-align': 'left'},
                      {'font-size': '12px'},
                      {'line-height': '1.35'},
                      {'color': 'var(--secondary-text-color)'},
                      {'white-space': 'normal'}
                    ],
                    'custom_fields': {
                      'target': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'},
                        {'text-align': 'right'},
                        {'display': 'block' if has_selected_user else 'none'}
                      ],
                      'toggle': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'}
                      ]
                    }
                  }
                } -%}

                {%- set none_chip = {
                  'type': 'custom:button-card',
                  'entity': admin_selector_eid,
                  'show_name': True,
                  'show_label': False,
                  'show_state': False,
                  'show_icon': False,
                  'name': ui.get('clear_selection', 'err-clear_selection'),
                  'tap_action': {'action': 'none'} if not has_selected_user else {
                    'action': 'multi-actions',
                    'actions': [
                      {
                        'action': 'call-service',
                        'service': 'select.select_option',
                        'data': {
                          'entity_id': admin_selector_eid,
                          'option': 'None'
                        }
                      },
                      {
                        'action': 'call-service',
                        'service': 'choreops.manage_ui_control',
                        'data': {
                          'config_entry_id': integration_entry_id,
                          'user_id': dashboard_helper_user_id,
                          'ui_control_action': 'remove',
                          'key': ui_control_key_header_collapsed
                        }
                      }
                    ]
                  },
                  'hold_action': {'action': 'more-info'},
                  'styles': {
                    'card': [
                      {'padding': '10px'},
                      {'border-radius': '12px'},
                      {'box-shadow': 'none'},
                      {'border': '2px solid var(--primary-color)' if not has_selected_user else '1px solid var(--divider-color)'},
                      {'background-color': 'rgba(var(--rgb-primary-color), 0.1)' if not has_selected_user else 'var(--card-background-color)'}
                    ],
                    'name': [
                      {'font-size': '13px'},
                      {'font-weight': '700'}
                    ]
                  }
                } -%}

                {%- for helper_state in helper_sensor_entities -%}
                  {%- set helper_name = helper_state.attributes.user_name | default(helper_state.name, true) -%}
                  {%- set chip_is_selected = helper_name == selected_user_name -%}
                  {%- set chip_card = {
                    'type': 'custom:button-card',
                    'entity': admin_selector_eid,
                    'show_name': True,
                    'show_label': False,
                    'show_state': False,
                    'show_icon': False,
                    'name': helper_name,
                    'tap_action': {'action': 'none'} if chip_is_selected else {
                      'action': 'multi-actions',
                      'actions': [
                        {
                          'action': 'call-service',
                          'service': 'select.select_option',
                          'data': {
                            'entity_id': admin_selector_eid,
                            'option': helper_name
                          }
                        },
                        {
                          'action': 'call-service',
                          'service': 'choreops.manage_ui_control',
                          'data': {
                            'config_entry_id': integration_entry_id,
                            'user_id': dashboard_helper_user_id,
                            'ui_control_action': 'remove',
                            'key': ui_control_key_header_collapsed
                          }
                        }
                      ]
                    },
                    'hold_action': {'action': 'more-info'},
                    'styles': {
                      'card': [
                        {'padding': '10px'},
                        {'border-radius': '12px'},
                        {'box-shadow': 'none'},
                        {'border': '2px solid var(--primary-color)' if chip_is_selected else '1px solid var(--divider-color)'},
                        {'background-color': 'rgba(var(--rgb-primary-color), 0.1)' if chip_is_selected else 'var(--card-background-color)'}
                      ],
                      'name': [
                        {'font-size': '13px'},
                        {'font-weight': '700'},
                        {'overflow': 'hidden'},
                        {'text-overflow': 'ellipsis'},
                        {'white-space': 'nowrap'}
                      ]
                    }
                  } -%}
                  {%- set ns.chips = ns.chips + [chip_card] -%}
                {%- endfor -%}

                {#-- 6. Render --#}

                {{ selector_summary_card }},
                {%- if header_collapsed -%}
                {%- else -%}
                {{ {
                  'type': 'grid',
                  'columns': pref_selector_column_count,
                  'square': False,
                  'cards': [none_chip] + ns.chips
                } }},
                {%- endif -%}
                {%- if show_reset_all_overdue_card -%}
                {{ {
                  'type': 'custom:button-card',
                  'entity': selected_dashboard_helper,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:restore-alert',
                  'name': ui.get('reset_all', 'err-reset_all'),
                  'label': selected_user_name ~ ' • ' ~ overdue_chore_count ~ ' ' ~ ui.get('overdue_chores', 'err-overdue_chores'),
                  'tap_action': {
                    'action': 'call-service',
                    'service': 'choreops.reset_overdue_chores',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_name': selected_user_name
                    }
                  },
                  'hold_action': {'action': 'more-info'},
                  'styles': {
                    'card': [
                      {'padding': '10px 14px'},
                      {'margin-top': '0px'},
                      {'border-radius': '14px'},
                      {'box-shadow': 'none'},
                      {'border': '1px solid color-mix(in srgb, var(--warning-color) 18%, var(--divider-color))'},
                      {'background-color': 'color-mix(in srgb, var(--warning-color) 8%, var(--card-background-color))'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n l"'},
                      {'grid-template-columns': '20px max-content 1fr'},
                      {'column-gap': '10px'},
                      {'align-items': 'center'}
                    ],
                    'icon': [
                      {'width': '18px'},
                      {'color': 'var(--warning-color)'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'font-size': '12px'},
                      {'font-weight': '700'},
                      {'line-height': '1.2'}
                    ],
                    'label': [
                      {'justify-self': 'end'},
                      {'font-size': '11px'},
                      {'font-weight': '600'},
                      {'color': 'var(--secondary-text-color)'},
                      {'text-align': 'right'}
                    ]
                  }
                } }},
                {%- endif -%}
              {%- endif -%}

        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== CHORE MANAGEMENT ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_chore_management_ui_control_key_root = 'admin-shared/chore-management' -%}

              {%- set pref_chore_management_default_header_collapsed = true -%}

              {%- set pref_chore_management_primary_tint_mix_pct = 14 -%}

              {%- set pref_chore_management_show_header_background = true -%}

              {%- set pref_chore_management_show_header_thin_border = true -%}

              {%- set pref_chore_selector_column_count = 3 -%}

              {%- set pref_chore_action_column_count = 4 -%}


              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_shared >>

              << template_snippets.admin_validation_missing_selector >>

              {%- set pref_chore_management_ui_control_key_root = (pref_chore_management_ui_control_key_root | default('admin-shared/chore-management') | string) -%}
              {%- set pref_chore_management_ui_control_key_root_segments = pref_chore_management_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_chore_management_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_chore_management_ui_control_key_root_segments = ['admin-shared', 'chore-management'] -%}
              {%- endif -%}
              {%- set pref_chore_management_ui_control_key_root = pref_chore_management_ui_control_key_root_segments | join('/') -%}
              {%- set pref_chore_management_default_header_collapsed = (pref_chore_management_default_header_collapsed | default('true') | string | lower) == 'true' -%}
              {%- set pref_chore_management_primary_tint_mix_pct = pref_chore_management_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_chore_management_show_header_background = (pref_chore_management_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_chore_management_show_header_thin_border = (pref_chore_management_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- set pref_chore_selector_column_count = pref_chore_selector_column_count | int(default=3) -%}
              {%- set pref_chore_action_column_count = pref_chore_action_column_count | int(default=4) -%}
              {%- if pref_chore_management_primary_tint_mix_pct < 0 -%}
                {%- set pref_chore_management_primary_tint_mix_pct = 0 -%}
              {%- elif pref_chore_management_primary_tint_mix_pct > 100 -%}
                {%- set pref_chore_management_primary_tint_mix_pct = 100 -%}
              {%- endif -%}
              {%- if pref_chore_selector_column_count < 1 -%}
                {%- set pref_chore_selector_column_count = 1 -%}
              {%- endif -%}
              {%- if pref_chore_action_column_count < 1 -%}
                {%- set pref_chore_action_column_count = 1 -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set helper_sensor_entities = integration_entities('choreops')
                    | select('search', '^sensor\\.')
                    | list
                    | expand
                    | selectattr('attributes.purpose', 'defined')
                    | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                    | selectattr('attributes.integration_entry_id', 'eq', entry_id)
                    | sort(attribute='attributes.user_name')
                    | list -%}
                {%- set summary_helper = helper_sensor_entities[0].entity_id if helper_sensor_entities | count > 0 else '' -%}
                {%- set ui = {} -%}
                {%- if summary_helper not in ['', None, 'None'] -%}
                  {%- set translation_sensor = (state_attr(summary_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                  {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                {%- else -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard configuration error**\n\nCannot find any dashboard helper entities for this shared admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set integration_entry_id = state_attr(summary_helper, 'integration_entry_id') if summary_helper not in ['', None, 'None'] else '' -%}
                {%- set ui_control_key_root = pref_chore_management_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set selected_user_name = states(admin_selector_eid) if admin_selector_eid not in ['', None, 'None'] else '' -%}
                {%- set has_selected_user = selected_user_name not in ['None', 'none', '', 'unknown', 'unavailable'] -%}
                {%- set selected_helper_matches = helper_sensor_entities | selectattr('attributes.user_name', 'eq', selected_user_name) | list if has_selected_user else [] -%}
                {%- set selected_dashboard_helper = state_attr(admin_selector_eid, 'dashboard_helper_eid') if has_selected_user and admin_selector_eid not in ['', None, 'None'] else '' -%}
                {%- if selected_dashboard_helper in ['', None, 'None'] and selected_helper_matches | count > 0 -%}
                  {%- set selected_dashboard_helper = selected_helper_matches[0].entity_id -%}
                {%- endif -%}
                {%- set has_selected_dashboard_helper = selected_dashboard_helper not in ['', None, 'None'] and states(selected_dashboard_helper) not in ['unknown', 'unavailable'] -%}
                {%- set ui_control_source = selected_dashboard_helper if has_selected_dashboard_helper else summary_helper -%}
                {%- set dashboard_helper_user_id = state_attr(ui_control_source, 'user_id') if ui_control_source not in ['', None, 'None'] else '' -%}
                {%- set ui_control = state_attr(ui_control_source, 'ui_control') | default({}, true) if ui_control_source not in ['', None, 'None'] else {} -%}
                {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if ui_root.current is mapping -%}
                    {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = ui_root.current is mapping and 'header-collapse' in ui_root.current -%}
                {%- set selected_dashboard_helpers = state_attr(selected_dashboard_helper, 'dashboard_helpers') or {} if has_selected_dashboard_helper else {} -%}
                {%- set selected_core_sensors = state_attr(selected_dashboard_helper, 'core_sensors') or {} if has_selected_dashboard_helper else {} -%}
                {%- set chore_select_entity = selected_dashboard_helpers.get('chore_select_eid') if has_selected_dashboard_helper else '' -%}
                {%- set dashboard_date_helper = selected_dashboard_helpers.get('date_helper_eid') if has_selected_dashboard_helper else '' -%}
                {%- set points_sensor = selected_core_sensors.get('points_eid') if has_selected_dashboard_helper else '' -%}
                {%- set selected_translation_sensor = selected_dashboard_helpers.get('translation_sensor_eid') if has_selected_dashboard_helper else '' -%}
                {%- set ui = state_attr(selected_translation_sensor, 'ui_translations') if selected_translation_sensor else ui -%}
                {%- set selected_chore_name = (states(chore_select_entity) | default('')) if chore_select_entity not in ['', None, 'None'] else '' -%}
                {%- set has_chore_selector = chore_select_entity not in ['', None, 'None'] -%}
                {%- set has_selected_chore = has_selected_dashboard_helper and has_chore_selector and selected_chore_name not in ['None', 'none', '', 'unknown', 'unavailable'] -%}
                {%- set selected_chore_display = selected_chore_name if has_selected_chore else '' -%}
                {%- set helper_chore_items = state_attr(selected_dashboard_helper, 'chores') | default([], true) if has_selected_dashboard_helper else [] -%}
                {%- set overdue_chore_items = helper_chore_items | selectattr('state', 'eq', 'overdue') | list if has_selected_dashboard_helper else [] -%}
                {%- set overdue_chore_count = overdue_chore_items | count -%}
                {%- set selected_chore_matches = helper_chore_items | selectattr('name', 'eq', selected_chore_name) | list if has_selected_chore else [] -%}
                {%- set selected_chore_sensor = selected_chore_matches[0].eid if selected_chore_matches | count > 0 else '' -%}
                {%- set has_selected_chore_sensor = selected_chore_sensor not in ['', None, 'None'] and states(selected_chore_sensor) not in ['unknown', 'unavailable'] -%}
                {%- set header_collapsed = (ui_root.current['header-collapse'] if has_header_collapsed_override else pref_chore_management_default_header_collapsed) | default(pref_chore_management_default_header_collapsed, true) -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set management_label = ui.get('viewing_selected_chore', 'err-viewing_selected_chore') if has_selected_chore else ui.get('choose_chore_for_admin_actions', 'err-choose_chore_for_admin_actions') if has_chore_selector else ui.get('chore_selector_unavailable', 'err-chore_selector_unavailable') if has_selected_dashboard_helper else ui.get('select_user_to_manage_chores_first', 'err-select_user_to_manage_chores_first') -%}
                {%- set management_label_html = (
                  "<span style='color:var(--secondary-text-color);'>" ~ management_label ~ ":</span> <span style='font-weight:700;color:var(--primary-text-color);'>" ~ (selected_user_name | e) ~ "</span>"
                  if has_selected_user
                  else management_label
                ) -%}
                {#-- 5. Build Display --#}

                {%- set management_summary_card = {
                  'type': 'custom:button-card',
                  'entity': chore_select_entity if chore_select_entity not in ['', None, 'None'] else summary_helper,
                  'show_name': True,
                  'show_label': False,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:clipboard-search-outline',
                  'name': ui.get('chores', 'err-chores'),
                  'label': management_label,
                  'tap_action': ({
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': dashboard_helper_user_id,
                      'ui_control_action': 'update',
                      'key': ui_control_key_header_collapsed,
                      'value': false
                    }
                  } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                    'action': 'call-service',
                    'service': 'choreops.manage_ui_control',
                    'data': {
                      'config_entry_id': integration_entry_id,
                      'user_id': dashboard_helper_user_id,
                      'ui_control_action': 'remove',
                      'key': ui_control_key_header_collapsed
                    }
                  } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                    'action': 'none'
                  }),
                  'hold_action': {'action': 'more-info'} if chore_select_entity not in ['', None, 'None'] else {'action': 'none'},
                  'custom_fields': {
                    'subtitle': management_label_html,
                    'target': ("<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;max-width:240px;overflow:hidden;'><span style='display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:16px;font-weight:700;color:var(--primary-text-color);'>" ~ selected_chore_display ~ "</span><span style='display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--primary-color);'>" ~ ui.get('active', 'err-active') ~ "</span></div>") if has_selected_chore else '',
                    'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                  },
                  'styles': {
                    'card': [
                      {'padding': '8px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_chore_management_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if header_collapsed and pref_chore_management_show_header_thin_border else 'none' if header_collapsed else ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_chore_management_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if has_selected_chore and pref_chore_management_show_header_thin_border else 'none' if has_selected_chore else '1px solid var(--divider-color)'},
                      {'background-color': ('color-mix(in srgb, var(--primary-color) ' ~ pref_chore_management_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed and pref_chore_management_show_header_background else 'transparent' if header_collapsed else ('color-mix(in srgb, var(--primary-color) ' ~ pref_chore_management_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if has_selected_chore and pref_chore_management_show_header_background else 'transparent'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n target toggle" "i subtitle target toggle"' if has_selected_chore else '"i n toggle" "i subtitle toggle"'},
                      {'grid-template-columns': '32px minmax(150px, 1fr) minmax(0, auto) min-content' if has_selected_chore else '32px minmax(0, 1fr) min-content'},
                      {'grid-template-rows': 'min-content min-content'},
                      {'column-gap': '14px'},
                      {'row-gap': '2px'},
                      {'align-items': 'center'}
                    ],
                    'icon': [
                      {'width': '24px'},
                      {'height': '24px'},
                      {'align-self': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'min-width': '0'},
                      {'width': '100%'},
                      {'text-align': 'left'},
                      {'font-size': '14px'},
                      {'font-weight': '700'},
                      {'line-height': '1.2'},
                      {'text-transform': 'uppercase'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'min-width': '0'},
                      {'width': '100%'},
                      {'text-align': 'left'},
                      {'font-size': '12px'},
                      {'line-height': '1.35'},
                      {'color': 'var(--secondary-text-color)'},
                      {'white-space': 'normal'}
                    ],
                    'custom_fields': {
                      'subtitle': [
                        {'justify-self': 'start'},
                        {'min-width': '0'},
                        {'width': '100%'},
                        {'text-align': 'left'},
                        {'font-size': '12px'},
                        {'line-height': '1.35'},
                        {'color': 'var(--secondary-text-color)'},
                        {'white-space': 'normal'}
                      ],
                      'target': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'},
                        {'min-width': '0'},
                        {'max-width': '240px'},
                        {'text-align': 'right'},
                        {'display': 'block' if has_selected_chore else 'none'}
                      ],
                      'toggle': [
                        {'justify-self': 'end'},
                        {'align-self': 'center'}
                      ]
                    }
                  }
                } -%}

                {%- set select_profile_card = {
                  'type': 'custom:button-card',
                  'entity': admin_selector_eid,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:account-arrow-up-outline',
                  'name': ui.get('select_user_first', 'err-select_user_first'),
                  'label': ui.get('select_user_to_manage_chores_first', 'err-select_user_to_manage_chores_first'),
                  'tap_action': {'action': 'more-info'},
                  'styles': {
                    'card': [
                      {'padding': '14px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': '1px solid var(--divider-color)'},
                      {'background-color': 'var(--card-background-color)'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n" "i l"'},
                      {'grid-template-columns': '32px minmax(0, 1fr)'},
                      {'column-gap': '12px'},
                      {'row-gap': '4px'},
                      {'align-items': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'font-size': '16px'},
                      {'font-weight': '700'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'text-align': 'left'},
                      {'font-size': '13px'},
                      {'line-height': '1.35'},
                      {'white-space': 'normal'},
                      {'color': 'var(--secondary-text-color)'}
                    ],
                    'icon': [
                      {'width': '22px'},
                      {'height': '22px'},
                      {'color': 'var(--primary-color)'}
                    ]
                  }
                } -%}

                {%- set select_chore_card = {
                  'type': 'custom:button-card',
                  'entity': chore_select_entity if chore_select_entity not in ['', None, 'None'] else selected_dashboard_helper,
                  'show_name': True,
                  'show_label': True,
                  'show_state': False,
                  'show_icon': True,
                  'icon': 'mdi:clipboard-text-search-outline',
                  'name': ui.get('select_chore_to_manage', 'err-select_chore_to_manage'),
                  'label': ui.get('choose_chore_for_admin_actions', 'err-choose_chore_for_admin_actions'),
                  'tap_action': {'action': 'more-info'} if chore_select_entity not in ['', None, 'None'] else {'action': 'none'},
                  'styles': {
                    'card': [
                      {'padding': '14px 16px'},
                      {'border-radius': '16px'},
                      {'box-shadow': 'none'},
                      {'border': '1px solid var(--divider-color)'},
                      {'background-color': 'var(--card-background-color)'}
                    ],
                    'grid': [
                      {'grid-template-areas': '"i n" "i l"'},
                      {'grid-template-columns': '32px minmax(0, 1fr)'},
                      {'column-gap': '12px'},
                      {'row-gap': '4px'},
                      {'align-items': 'center'}
                    ],
                    'name': [
                      {'justify-self': 'start'},
                      {'font-size': '16px'},
                      {'font-weight': '700'}
                    ],
                    'label': [
                      {'justify-self': 'start'},
                      {'text-align': 'left'},
                      {'font-size': '13px'},
                      {'line-height': '1.35'},
                      {'white-space': 'normal'},
                      {'color': 'var(--secondary-text-color)'}
                    ],
                    'icon': [
                      {'width': '22px'},
                      {'height': '22px'},
                      {'color': 'var(--primary-color)'}
                    ]
                  }
                } -%}

                {%- set chore_selector_error_card = {
                  'type': 'markdown',
                  'content': "⚠️ **Dashboard configuration error**\n\nThe selected profile does not expose a chore selector helper for this shared admin view.\n\nReopen the profile from the Management section or verify the ChoreOps dashboard helper entities are available for that user."
                } -%}
                {%- set chore_select_card = {
                  'type': 'entities',
                  'show_header_toggle': false,
                  'state_color': false,
                  'entities': [
                    {
                      'entity': chore_select_entity,
                      'name': ui.get('select_chore_to_manage', 'err-select_chore_to_manage')
                    }
                  ]
                } if has_chore_selector else none -%}
                {%- set status_map = {
                  'pending': ui.get('pending', 'err-pending'),
                  'due': ui.get('due', 'err-due'),
                  'claimed': ui.get('claimed', 'err-claimed'),
                  'claimed_in_part': ui.get('claimed_in_part', 'err-claimed_in_part'),
                  'completed': ui.get('completed', 'err-completed'),
                  'completed_in_part': ui.get('completed_in_part', 'err-completed_in_part'),
                  'overdue': ui.get('overdue', 'err-overdue'),
                  'waiting': ui.get('waiting', 'err-waiting'),
                  'missed': ui.get('missed', 'err-missed'),
                  'completed_by_other': ui.get('completed_by_other', 'err-completed_by_other'),
                  'not_my_turn': ui.get('not_my_turn', 'err-not_my_turn'),
                  'already_approved': ui.get('completed', 'err-completed'),
                  'pending_claim': ui.get('claimed', 'err-claimed'),
                  'missed_locked': ui.get('missed_locked', 'err-missed_locked'),
                  'blocked_completed_by_other': ui.get('completed_by_other', 'err-completed_by_other'),
                  'blocked_already_approved': ui.get('completed', 'err-completed'),
                  'blocked_pending_claim': ui.get('claimed', 'err-claimed'),
                  'blocked_waiting_window': ui.get('waiting', 'err-waiting'),
                  'blocked_not_my_turn': ui.get('not_my_turn', 'err-not_my_turn'),
                  'blocked_missed_locked': ui.get('missed_locked', 'err-missed_locked'),
                  'steal_available': ui.get('steal_available', 'err-steal_available')
                } -%}
                {%- set recurrence_map = {
                  'none': ui.get('none', 'err-none'),
                  'daily': ui.get('daily', 'err-daily'),
                  'daily_multi': ui.get('daily_multi', 'err-daily_multi'),
                  'weekly': ui.get('weekly', 'err-weekly'),
                  'biweekly': ui.get('biweekly', 'err-biweekly'),
                  'monthly': ui.get('monthly', 'err-monthly'),
                  'quarterly': ui.get('quarterly', 'err-quarterly'),
                  'yearly': ui.get('yearly', 'err-yearly'),
                  'custom': ui.get('custom', 'err-custom'),
                  'custom_from_complete': ui.get('custom_from_complete', 'err-custom_from_complete'),
                  'custom_1_week': ui.get('custom_1_week', 'err-custom_1_week'),
                  'custom_1_month': ui.get('custom_1_month', 'err-custom_1_month'),
                  'custom_1_quarter': ui.get('custom_1_quarter', 'err-custom_1_quarter'),
                  'custom_1_year': ui.get('custom_1_year', 'err-custom_1_year'),
                  'week_end': ui.get('week_end', 'err-week_end'),
                  'month_end': ui.get('month_end', 'err-month_end'),
                  'quarter_end': ui.get('quarter_end', 'err-quarter_end'),
                  'year_end': ui.get('year_end', 'err-year_end')
                } -%}
                {%- set approval_reset_map = {
                  'at_midnight_once': ui.get('at_midnight_once', 'err-at_midnight_once'),
                  'at_midnight_multi': ui.get('at_midnight_multi', 'err-at_midnight_multi'),
                  'at_due_date_once': ui.get('at_due_date_once', 'err-at_due_date_once'),
                  'at_due_date_multi': ui.get('at_due_date_multi', 'err-at_due_date_multi'),
                  'upon_completion': ui.get('upon_completion', 'err-upon_completion')
                } -%}
                {%- set status_color_map = {
                  'pending': 'var(--primary-text-color)',
                  'due': 'var(--warning-color)',
                  'claimed': '#a957fa',
                  'claimed_in_part': '#a957fa',
                  'pending_claim': '#a957fa',
                  'blocked_pending_claim': '#a957fa',
                  'completed': 'var(--success-color)',
                  'completed_in_part': 'var(--success-color)',
                  'overdue': 'var(--error-color)',
                  'missed': 'var(--error-color)',
                  'missed_locked': 'var(--error-color)',
                  'waiting': 'var(--disabled-text-color)',
                  'not_my_turn': 'var(--disabled-text-color)',
                  'completed_by_other': 'var(--disabled-text-color)',
                  'blocked_completed_by_other': 'var(--disabled-text-color)',
                  'blocked_already_approved': 'var(--disabled-text-color)',
                  'blocked_waiting_window': 'var(--disabled-text-color)',
                  'blocked_not_my_turn': 'var(--disabled-text-color)',
                  'blocked_missed_locked': 'var(--error-color)',
                  'steal_available': 'var(--warning-color)'
                } -%}
                {%- set chore_overview_card = none -%}
                {%- if has_selected_chore_sensor -%}
                  {%- set chore_attrs = states[selected_chore_sensor].attributes | default({}, true) -%}
                  {%- set raw_chore_state = states(selected_chore_sensor) | default('unknown', true) -%}
                  {%- set current_status_key = 'completed' if raw_chore_state in ['approved', 'already_approved'] else 'completed_in_part' if raw_chore_state == 'approved_in_part' else raw_chore_state -%}
                  {%- set claim_mode = chore_attrs.get('claim_mode') -%}
                  {%- set can_claim = chore_attrs.get('can_claim') -%}
                  {%- if claim_mode == 'steal_available' -%}
                    {%- set current_status_key = 'steal_available' -%}
                  {%- elif can_claim == false and claim_mode not in [None, 'None', ''] and current_status_key not in ['completed', 'completed_in_part'] -%}
                    {%- set current_status_key = claim_mode -%}
                  {%- endif -%}
                  {%- set raw_global_state = chore_attrs.get('global_state', raw_chore_state) -%}
                  {%- set global_status_key = 'completed' if raw_global_state in ['approved', 'already_approved'] else 'completed_in_part' if raw_global_state == 'approved_in_part' else raw_global_state -%}
                  {%- set current_status_display = status_map.get(current_status_key, current_status_key | title) -%}
                  {%- set global_status_display = status_map.get(global_status_key, global_status_key | title) -%}
                  {%- set current_status_color = status_color_map.get(current_status_key, 'var(--primary-text-color)') -%}
                  {%- set global_status_color = status_color_map.get(global_status_key, 'var(--primary-text-color)') -%}
                  {%- set completion_type_key = chore_attrs.get('completion_criteria', 'independent') -%}
                  {%- set completion_type_display = ui.get(completion_type_key, completion_type_key | title) -%}
                  {%- set chore_icon = chore_attrs.get('icon', 'mdi:broom') -%}
                  {%- set chore_value = chore_attrs.get('default_points', 0) | int(default=0) -%}
                  {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if points_sensor not in ['', None, 'None'] else None) or 'Points' -%}
                  {%- set recurrence_key = chore_attrs.get('recurring_frequency', 'none') -%}
                  {%- set recurrence_display = recurrence_map.get(recurrence_key, recurrence_key | title) -%}
                  {%- set approval_reset_display = approval_reset_map.get(chore_attrs.get('approval_reset_type', 'at_midnight_once'), chore_attrs.get('approval_reset_type', ui.get('unknown', 'err-unknown'))) -%}
                  {%- set pending_claim_action_map = {
                    'hold_pending': ui.get('hold_pending', 'Hold pending'),
                    'clear_pending': ui.get('clear_pending', 'Clear pending'),
                    'auto_approve_pending': ui.get('auto_approve_pending', 'Auto-approve pending')
                  } -%}
                  {%- set overdue_handling_map = {
                    'never_overdue': ui.get('never_overdue', 'Never overdue'),
                    'at_due_date': ui.get('at_due_date', 'At due date'),
                    'at_due_date_clear_immediate_on_late': ui.get('at_due_date_clear_immediate_on_late', 'Clear immediately when late'),
                    'at_due_date_clear_at_approval_reset': ui.get('at_due_date_clear_at_approval_reset', 'Clear at reset'),
                    'at_due_date_clear_and_mark_missed': ui.get('at_due_date_clear_and_mark_missed', 'Clear and mark missed'),
                    'at_due_date_mark_missed_and_lock': ui.get('at_due_date_mark_missed_and_lock', 'Mark missed and lock'),
                    'at_due_date_allow_steal': ui.get('at_due_date_allow_steal', 'Allow steal')
                  } -%}
                  {%- set due_dt_raw = chore_attrs.get('due_date') or chore_attrs.get('due_window_start') or chore_attrs.get('available_at') -%}
                  {%- set due_dt = as_datetime(due_dt_raw) if due_dt_raw not in [None, 'None', '', 'unknown', 'unavailable'] else none -%}
                  {%- set due_label = ui.get('available', 'err-available') if chore_attrs.get('available_at') not in [None, 'None', '', 'unknown', 'unavailable'] and chore_attrs.get('due_date') in [None, 'None', '', 'unknown', 'unavailable'] and chore_attrs.get('due_window_start') in [None, 'None', '', 'unknown', 'unavailable'] else ui.get('due_date', 'err-due_date') -%}
                  {%- set due_display = as_timestamp(due_dt) | timestamp_custom('%A, %b %d • %I:%M %p', true) if due_dt else ui.get('none', 'err-none') -%}
                  {%- set assigned_users = chore_attrs.get('assigned_user_names', []) | default([], true) -%}
                  {%- set claimed_by = chore_attrs.get('claimed_by', []) | default([], true) -%}
                  {%- set completed_by = chore_attrs.get('completed_by', []) | default([], true) -%}
                  {%- set progressed_users = (claimed_by + completed_by) | unique | list -%}
                  {%- set overdue_missed_ns = namespace(users=[]) -%}
                  {%- for assigned_user in assigned_users -%}
                    {%- if assigned_user not in progressed_users -%}
                      {%- set overdue_missed_ns.users = overdue_missed_ns.users + [assigned_user] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set overdue_missed_users = overdue_missed_ns.users -%}
                  {%- set turn_user_name = chore_attrs.get('turn_user_name') -%}
                  {%- set applicable_days = chore_attrs.get('applicable_days', []) | default([], true) -%}
                  {%- set day_name_map = {
                    '0': ui.get('mon_short', 'Mon'),
                    '1': ui.get('tue_short', 'Tue'),
                    '2': ui.get('wed_short', 'Wed'),
                    '3': ui.get('thu_short', 'Thu'),
                    '4': ui.get('fri_short', 'Fri'),
                    '5': ui.get('sat_short', 'Sat'),
                    '6': ui.get('sun_short', 'Sun'),
                    'mon': ui.get('mon_short', 'Mon'),
                    'tue': ui.get('tue_short', 'Tue'),
                    'wed': ui.get('wed_short', 'Wed'),
                    'thu': ui.get('thu_short', 'Thu'),
                    'fri': ui.get('fri_short', 'Fri'),
                    'sat': ui.get('sat_short', 'Sat'),
                    'sun': ui.get('sun_short', 'Sun'),
                    'monday': ui.get('mon_short', 'Mon'),
                    'tuesday': ui.get('tue_short', 'Tue'),
                    'wednesday': ui.get('wed_short', 'Wed'),
                    'thursday': ui.get('thu_short', 'Thu'),
                    'friday': ui.get('fri_short', 'Fri'),
                    'saturday': ui.get('sat_short', 'Sat'),
                    'sunday': ui.get('sun_short', 'Sun')
                  } -%}
                  {%- set days_ns = namespace(display='') -%}
                  {%- if applicable_days | count >= 7 -%}
                    {%- set applicable_days_display = ui.get('daily', 'Daily') -%}
                  {%- else -%}
                    {%- for raw_day in applicable_days -%}
                      {%- set day_key = (raw_day ~ '') | lower -%}
                      {%- set days_ns.display = days_ns.display ~ (', ' if days_ns.display != '' else '') ~ day_name_map.get(day_key, raw_day) -%}
                    {%- endfor -%}
                    {%- set applicable_days_display = days_ns.display -%}
                  {%- endif -%}
                  {%- set context_label = '' -%}
                  {%- set context_value = '' -%}
                  {%- set overdue_missed_state = raw_chore_state if raw_chore_state in ['overdue', 'missed'] else (raw_global_state if raw_global_state in ['overdue', 'missed'] else '') -%}
                  {%- set is_rotation_type = 'rotation' in completion_type_key -%}
                  {%- set is_shared_type = completion_type_key in ['shared_all', 'shared_first'] or is_rotation_type -%}
                  {%- if overdue_missed_state != '' -%}
                    {%- set context_label = ui.get(overdue_missed_state, 'err-' ~ overdue_missed_state) -%}
                    {%- if is_rotation_type and turn_user_name not in [None, 'None', '', 'unknown', 'unavailable'] -%}
                      {%- set context_value = turn_user_name -%}
                    {%- elif is_shared_type and overdue_missed_users | count > 0 -%}
                      {%- set context_value = overdue_missed_users | join(', ') -%}
                    {%- elif is_shared_type and assigned_users | count > 0 -%}
                      {%- set context_value = assigned_users | join(', ') -%}
                    {%- endif -%}
                  {%- elif completion_type_key == 'shared_all' and assigned_users | count > 0 -%}
                    {%- set context_label = ui.get('progress', 'err-progress') -%}
                    {%- set context_value = completed_by | count ~ '/' ~ assigned_users | count ~ ' ' ~ ui.get('done', 'err-done') -%}
                  {%- elif completion_type_key == 'shared_first' -%}
                    {%- if completed_by | count > 0 -%}
                      {%- set context_label = ui.get('completed_by', 'err-completed_by') -%}
                      {%- set context_value = completed_by | join(', ') -%}
                    {%- elif claimed_by | count > 0 -%}
                      {%- set context_label = ui.get('claimed', 'err-claimed') -%}
                      {%- set context_value = claimed_by | join(', ') -%}
                    {%- elif assigned_users | count > 0 -%}
                      {%- set context_label = ui.get('assigned_to', 'err-assigned_to') -%}
                      {%- set context_value = assigned_users | join(', ') -%}
                    {%- endif -%}
                  {%- elif assigned_users | count > 1 -%}
                    {%- set context_label = ui.get('assigned_to', 'err-assigned_to') -%}
                    {%- set context_value = assigned_users | join(', ') -%}
                  {%- endif -%}
                  {%- set chore_description = chore_attrs.get('description', '') | default('', true) -%}
                  {%- set chore_description = chore_description | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                  {%- set last_completed_raw = chore_attrs.get('last_completed') -%}
                  {%- set last_completed_dt = as_datetime(last_completed_raw) if last_completed_raw not in [None, 'None', '', 'unknown', 'unavailable'] else none -%}
                  {%- set last_completed_display = as_timestamp(last_completed_dt) | timestamp_custom('%b %d, %Y', true) if last_completed_dt else ui.get('never', 'err-never') -%}
                  {%- set streak_count = chore_attrs.get('chore_current_streak', 0) | int(default=0) -%}
                  {%- set completion_count = chore_attrs.get('chore_completed_count', 0) | int(default=0) -%}
                  {%- set claims_count = chore_attrs.get('chore_claims_count', 0) | int(default=0) -%}
                  {%- set last_claimed_raw = chore_attrs.get('last_claimed') -%}
                  {%- set last_claimed_dt = as_datetime(last_claimed_raw) if last_claimed_raw not in [None, 'None', '', 'unknown', 'unavailable'] else none -%}
                  {%- set last_activity_display = as_timestamp(last_claimed_dt) | timestamp_custom('%b %d', true) if last_claimed_dt else last_completed_display -%}
                  {%- set pending_claim_action_key = chore_attrs.get('approval_reset_pending_claim_action', 'hold_pending') -%}
                  {%- set pending_claim_action_display = pending_claim_action_map.get(pending_claim_action_key, pending_claim_action_key | replace('_', ' ') | title) -%}
                  {%- set overdue_handling_key = chore_attrs.get('overdue_handling_type', 'at_due_date') -%}
                  {%- set overdue_handling_display = overdue_handling_map.get(overdue_handling_key, overdue_handling_key | replace('_', ' ') | title) -%}
                  {%- set auto_approve_display = ui.get('true', 'True') if chore_attrs.get('auto_approve', false) else ui.get('false', 'False') -%}
                  {%- set due_window_offset = chore_attrs.get('chore_due_window_offset') -%}
                  {%- set due_window_display = due_window_offset if due_window_offset not in [None, 'None', '', 'unknown', 'unavailable'] else ui.get('none', 'err-none') -%}
                  {%- set claim_lock_display = ui.get('true', 'True') if chore_attrs.get('chore_claim_lock_until_window', false) else ui.get('false', 'False') -%}
