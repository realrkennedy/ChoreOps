    "custom_fields":
      {
        "badge_state": '[[[ const rawState = entity.state; const state = (rawState === ''approved'' || rawState === ''already_approved'') ? ''completed'' : (rawState === ''approved_in_part'' ? ''completed_in_part'' : rawState); let icon = ''''; if (state === ''claimed'' || state === ''claimed_in_part'') icon = ''mdi:check''; else if ([''completed'', ''completed_in_part''].includes(state)) icon = ''mdi:check-all''; else if (state === ''waiting'') icon = ''mdi:clock-outline''; else if ([''missed'', ''not_my_turn''].includes(state)) icon = ''mdi:lock-outline''; else if (state === ''completed_by_other'') icon = ''mdi:account-check-outline''; if (!icon) return ''''; return `<ha-icon icon="${icon}" style="width:16px;height:16px;transform:translateY(-4px);"></ha-icon>`; ]]]',
        "badge_type": '[[[ const type = entity.attributes.completion_criteria || ''independent''; let icon = ''''; if (type === ''shared_all'') icon = ''mdi:account-group''; else if (type === ''shared_first'') icon = ''mdi:flag-checkered''; else if (type.includes(''rotation'')) icon = ''mdi:account-sync''; if (!icon) return ''''; return `<ha-icon icon="${icon}" style="width:18px;height:18px;transform:translateY(-2px);"></ha-icon>`; ]]]',
        "reward": '[[[ const pointsEnabled = (typeof variables !== ''undefined'' && variables && (variables.gamification_enabled === true || variables.points_enabled === true)); if (!pointsEnabled) return ''''; const rawPoints = entity.attributes.default_points; const points = (rawPoints === undefined || rawPoints === null || rawPoints === '''') ? ''--'' : `${rawPoints}`; const pIcon = (typeof variables !== ''undefined'' && variables && typeof variables.points_icon === ''string'' && variables.points_icon.trim().length > 0) ? variables.points_icon : ''mdi:star''; const pLabel = (typeof variables !== ''undefined'' && variables && typeof variables.points_label === ''string'' && variables.points_label.trim().length > 0) ? variables.points_label : ''Points''; return `<ha-icon icon="${pIcon}" style="width:18px;height:18px;margin-right:4px;transform:translateY(-1px);"></ha-icon>${points} ${pLabel}`; ]]]',
        "description": "[[[ const prefEnabled = (typeof variables !== 'undefined' && variables && variables.pref_show_chore_description === false) ? false : true; const value = typeof entity.attributes.description === 'string' ? entity.attributes.description.trim() : ''; if (!prefEnabled || value.length === 0) return ''; const escaped = value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); return `<span>${escaped}</span>`; ]]]",
        "btn_undo":
          {
            "card":
              {
                "type": "custom:button-card",
                "entity": "[[[ return entity.entity_id; ]]]",
                "icon": "mdi:undo",
