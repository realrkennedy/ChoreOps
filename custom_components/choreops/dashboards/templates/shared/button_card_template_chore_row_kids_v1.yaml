                    "data":
                      {
                        "entity_id": "[[[ return entity.attributes.disapprove_button_eid; ]]]",
                      },
                  },
              },
          },
        "kid_status": '[[[ const labelSource = (typeof variables !== ''undefined'' && variables && typeof variables.ui_labels === ''object'') ? variables.ui_labels : ((typeof variables !== ''undefined'' && variables && typeof variables.state_map === ''object'') ? variables.state_map : null); const i18n = (key, fallback) => { const value = labelSource && typeof labelSource[key] === ''string'' ? labelSource[key].trim() : ''''; return value.length > 0 ? value : ((typeof fallback === ''string'' && fallback.startsWith(''err-'')) ? fallback : `err-${key}`); }; const rawState = entity.state; const state = rawState === ''approved_in_part'' ? ''completed_in_part'' : rawState; const label = i18n(state, `err-${state}`); const dateLabel = i18n(''date'', ((typeof variables !== ''undefined'' && variables && typeof variables.date_label === ''string'' && variables.date_label.trim().length > 0) ? variables.date_label : ''err-date'')); const streak = Number(entity.attributes.chore_current_streak || 0); const dueValue = entity.attributes.due_date || entity.attributes.due_window_start; const formatDateWithOrdinal = (value) => { if (!value) return ''''; const dt = new Date(value); if (Number.isNaN(dt.getTime())) return ''''; const day = dt.getDate(); const mod10 = day % 10; const mod100 = day % 100; let suffix = ''th''; if (mod10 === 1 && mod100 !== 11) suffix = ''st''; else if (mod10 === 2 && mod100 !== 12) suffix = ''nd''; else if (mod10 === 3 && mod100 !== 13) suffix = ''rd''; const month = dt.toLocaleString(undefined, { month: ''short'' }); const time = dt.toLocaleString(undefined, { hour: ''numeric'', minute: ''2-digit'' }); return `${month} ${day}${suffix}, ${time}`; }; const dueText = formatDateWithOrdinal(dueValue); const duePart = dueText ? `<span>${dateLabel}: ${dueText}</span>` : ''''; const streakPart = streak > 0 ? `<span><ha-icon icon="mdi:fire" style="width:12px;height:12px;color:var(--warning-color);margin:0 2px 0 0;transform:translateY(-1px);"></ha-icon><span style="color:var(--warning-color);">${streak}</span></span>` : ''''; const extraLine = (duePart || streakPart) ? `<br><span style="display:inline-flex;align-items:center;gap:8px;">${duePart}${streakPart}</span>` : ''''; return `${String(label).toUpperCase()}${extraLine}`; ]]]',
      },
  }
