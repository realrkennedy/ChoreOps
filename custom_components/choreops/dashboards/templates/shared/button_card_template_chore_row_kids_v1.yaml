              "border": "[[[ const rawState = entity.state; const state = (rawState === 'approved' || rawState === 'already_approved') ? 'completed' : (rawState === 'approved_in_part' ? 'completed_in_part' : rawState); if (['overdue', 'missed'].includes(state)) return '4px solid #ff4444'; if (state === 'due') return '4px solid #ff9800'; if (state === 'claimed' || state === 'claimed_in_part') return '4px solid #a957fa'; if (['completed', 'completed_in_part'].includes(state)) return '4px solid var(--success-color)'; return '4px solid transparent'; ]]]",
            },
