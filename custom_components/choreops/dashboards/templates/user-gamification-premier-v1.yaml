                    {%- set content_html = "<div style='display:flex;flex-direction:column;gap:0;width:100%;box-sizing:border-box;'><div style='display:flex;align-items:flex-start;gap:12px;padding-right:42px;box-sizing:border-box;'><div style='display:flex;align-items:center;gap:12px;min-width:0;flex:1;'><div style='width:52px;height:52px;border-radius:50%;background:color-mix(in srgb, var(--primary-color) 18%, var(--card-background-color));display:flex;align-items:center;justify-content:center;flex-shrink:0;'><ha-icon icon='" ~ highest_badge_icon ~ "' style='width:28px;height:28px;color:var(--primary-color);'></ha-icon></div><div style='min-width:0;'><div style='font-size:18px;font-weight:700;line-height:1.2;color:var(--primary-text-color);'>" ~ safe_name ~ "'s " ~ ui.get('showcase', 'err-showcase') ~ "</div>" ~ highest_badge_line ~ "</div></div></div><div style='display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:16px;'><div style='text-align:center;padding:10px 8px;border-radius:14px;background:color-mix(in srgb, var(--primary-color) 6%, var(--card-background-color));'><div style='font-size:11px;color:var(--secondary-text-color);line-height:1.2;'>" ~ ui.get('total_earned', 'err-total_earned') ~ "</div><div style='margin-top:4px;font-size:16px;font-weight:700;color:var(--primary-text-color);'>" ~ points_earned_all_time|string ~ "</div></div><div style='text-align:center;padding:10px 8px;border-radius:14px;background:color-mix(in srgb, var(--primary-color) 6%, var(--card-background-color));'><div style='font-size:11px;color:var(--secondary-text-color);line-height:1.2;'>" ~ ui.get('chores_completed', 'err-chores_completed') ~ "</div><div style='margin-top:4px;font-size:16px;font-weight:700;color:var(--primary-text-color);'>" ~ all_time_completed|string ~ "</div></div><div style='text-align:center;padding:10px 8px;border-radius:14px;background:color-mix(in srgb, var(--primary-color) 6%, var(--card-background-color));'><div style='font-size: