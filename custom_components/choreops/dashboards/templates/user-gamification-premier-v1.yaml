        - type: grid
          square: false
          columns: 1
          grid_options:
            columns: full
          cards:
            - type: custom:auto-entities
              card:
                square: false
                type: grid
                columns: 1
              card_param: cards
              filter:
                template: |-
                  {#-- ===== REWARDS CARD ===== --#}

                  << template_snippets.meta_stamp >>


                  {#-- 1. User Configuration --#}

                  << template_snippets.user_override_helper >>

                  {%- set pref_column_count = 1 -%}

                  {%- set pref_use_label_grouping = false -%}

                  {%- set pref_exclude_label_list = [] -%}  {#-- Example: ['junk_label', 'skip_this'] --#}

                  {%- set pref_label_display_order = [] -%}  {#-- Example: ['Toys', 'Snacks', 'Activities'] --#}

                  {%- set pref_sort_rewards = 'default' -%}  {#-- Options: 'default', 'name_asc', 'name_desc', 'cost_asc', 'cost_desc' --#}

                  {%- set pref_show_reward_description = true -%}

                  {%- set pref_default_header_collapsed = false -%}

                  {%- set pref_primary_tint_mix_pct = 14 -%}  {#-- Percent of var(--primary-color) mixed into the main Rewards header background when fill is enabled. Allowed: 0-100. --#}

                  {%- set pref_show_header_background = true -%}  {#-- Set to false to remove the main Rewards header background fill and leave it transparent. Allowed: true, false. --#}

                  {%- set pref_show_header_thin_border = true -%}  {#-- Set to false to remove the thin outer border line. Accent borders are unaffected. Allowed: true, false. --#}


                  {#-- Type coercion for preferences --#}
                  {%- set pref_column_count = pref_column_count | int(default=1) -%}
                  {%- set pref_use_label_grouping = (pref_use_label_grouping | default('false') | string | lower) == 'true' -%}
                  {%- set pref_exclude_label_list = pref_exclude_label_list if pref_exclude_label_list is iterable and pref_exclude_label_list is not string else [] -%}
                  {%- set pref_label_display_order = pref_label_display_order if pref_label_display_order is iterable and pref_label_display_order is not string else [] -%}
                  {%- set pref_show_reward_description = (pref_show_reward_description | default('true') | string | lower) == 'true' -%}
                  {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
                  {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
                  {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
                  {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
                  {%- if pref_primary_tint_mix_pct < 0 -%}
                    {%- set pref_primary_tint_mix_pct = 0 -%}
                  {%- elif pref_primary_tint_mix_pct > 100 -%}
                    {%- set pref_primary_tint_mix_pct = 100 -%}
                  {%- endif -%}

                  {#-- 2. Dynamic Lookups & Validations --#}

                  << template_snippets.user_setup >>

                  << template_snippets.user_validation >>

                  {%- if not skip_render -%}

                    {#-- 3. Initialize Variables --#}

                  {%- set ns = namespace(
                    all_labels=[],
                    label_order=[],
                    label_groups=[],
                    temp_label_rewards=[],
                    sorted_groups=[],
                    temp_list=[],
                    filtered_rewards=[],
                    group_cards=[]
                  ) -%}

                    {#-- 4. Collect Data --#}
                    {%- set core_sensors = state_attr(dashboard_helper, 'core_sensors') or {} -%}
                    {%- set points_sensor = core_sensors.get('points_eid') -%}
                    {%- set translation_sensor = (state_attr(dashboard_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                    {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                    {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if points_sensor else None) or 'Points' -%}
                    {%- set points_icon = (state_attr(points_sensor, 'icon') if points_sensor else None) or 'mdi:star-circle' -%}
                    {%- set gamification_enabled = state_attr(dashboard_helper, 'gamification_enabled') | default(false, true) -%}
                    {%- set reward_list = state_attr(dashboard_helper, 'rewards') | default([], true) -%}
                    {%- set current_points = (states(points_sensor) | int(default=0)) if points_sensor else 0 -%}
                    {%- set ui_control = state_attr(dashboard_helper, 'ui_control') | default({}, true) -%}
                    {%- set ui_control_key_root = 'gamification/rewards' -%}
                    {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header_collapse' -%}
                    {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                    {%- for segment in ui_control_key_root.split('/') -%}
                      {%- if ui_root.current is mapping -%}
                        {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                      {%- else -%}
                        {%- set ui_root.current = {} -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set header_collapsed = ui_root.current.get('header_collapse', pref_default_header_collapsed) if ui_root.current is mapping else pref_default_header_collapsed -%}
                    {%- set header_collapsed = header_collapsed | default(pref_default_header_collapsed, true) -%}
                    {%- set integration_entry_id = state_attr(dashboard_helper, 'integration_entry_id') -%}
                    {%- set dashboard_helper_user_id = state_attr(dashboard_helper, 'user_id') -%}

                    {#-- Apply label exclusion filter (works regardless of grouping setting) --#}
                    {%- if pref_exclude_label_list | length > 0 -%}
                      {%- for reward in reward_list -%}
                        {%- set reward_labels = reward.labels | default([], true) if reward is mapping else [] -%}
                        {%- set has_excluded = reward_labels | select('in', pref_exclude_label_list) | list | length > 0 -%}
                        {%- if not has_excluded -%}
                          {%- set ns.filtered_rewards = ns.filtered_rewards + [reward] -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {%- set reward_list = ns.filtered_rewards -%}
                    {%- endif -%}

                    {#-- 5. Build Display Groups --#}
                    {%- if pref_use_label_grouping and reward_list | length > 0 -%}
                      {%- for reward in reward_list -%}
                        {%- set reward_labels = reward.labels | default([], true) if reward is mapping else [] -%}
                        {%- if reward_labels | length == 0 -%}
                          {%- set ns.all_labels = ns.all_labels + ['-No Label-'] -%}
                        {%- else -%}
                          {%- set ns.all_labels = ns.all_labels + reward_labels -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {%- set ns.all_labels = ns.all_labels | unique | list | sort -%}

                      {%- if pref_label_display_order | length > 0 -%}
                        {%- set ns.label_order = pref_label_display_order -%}
                        {%- set remaining = ns.all_labels | reject('in', pref_label_display_order) | reject('eq', '-No Label-') | list -%}
                        {%- set ns.label_order = ns.label_order + remaining -%}
                        {%- if '-No Label-' in ns.all_labels and '-No Label-' not in pref_label_display_order -%}
                          {%- set ns.label_order = ns.label_order + ['-No Label-'] -%}
                        {%- endif -%}
                      {%- else -%}
                        {%- set ns.label_order = ns.all_labels | reject('eq', '-No Label-') | list -%}
                        {%- if '-No Label-' in ns.all_labels -%}
                          {%- set ns.label_order = ns.label_order + ['-No Label-'] -%}
                        {%- endif -%}
                      {%- endif -%}

                      {%- set ns.label_order = ns.label_order | reject('in', pref_exclude_label_list) | list -%}

                      {%- for label in ns.label_order -%}
                        {%- set ns.temp_label_rewards = [] -%}
                        {%- for reward in reward_list -%}
                          {%- set reward_labels = reward.labels | default([], true) if reward is mapping else [] -%}
                          {%- set reward_label_check = reward_labels if reward_labels | length > 0 else ['-No Label-'] -%}
                          {%- if label in reward_label_check -%}
                            {%- set ns.temp_label_rewards = ns.temp_label_rewards + [reward] -%}
                          {%- endif -%}
                        {%- endfor -%}
                        {%- if ns.temp_label_rewards | length > 0 -%}
                          {%- set ns.label_groups = ns.label_groups + [{'name': label, 'rewards': ns.temp_label_rewards, 'icon': 'mdi:gift'}] -%}
                        {%- endif -%}
                      {%- endfor -%}
                    {%- endif -%}

                    {%- if ns.label_groups | length == 0 and reward_list | length > 0 -%}
                      {%- set ns.label_groups = [{'name': ui.get('rewards', 'err-rewards'), 'rewards': reward_list, 'icon': 'mdi:gift'}] -%}
                    {%- endif -%}

                    {#-- Apply sorting to each group (ported from gamification rewards card) --#}
                    {%- if pref_sort_rewards != 'default' -%}
                      {%- set ns.sorted_groups = [] -%}
                      {%- for group in ns.label_groups -%}
                        {%- if pref_sort_rewards in ['name_asc', 'name_desc'] -%}
                          {%- set ns.temp_list = [] -%}
                          {%- for reward in group.rewards -%}
                            {%- set reward_name = (reward.name | default('zzz') | lower) if reward is mapping else 'zzz' -%}
                            {%- set ns.temp_list = ns.temp_list + [[reward_name, reward]] -%}
                          {%- endfor -%}
                          {%- set sorted_list = ns.temp_list | sort -%}
                          {%- if pref_sort_rewards == 'name_desc' -%}
                            {%- set sorted_list = sorted_list | reverse | list -%}
                          {%- endif -%}
                          {%- set sorted_rewards = sorted_list | map('last') | list -%}
                          {%- set ns.sorted_groups = ns.sorted_groups + [{'name': group.name, 'rewards': sorted_rewards, 'icon': group.icon}] -%}
                        {%- elif pref_sort_rewards in ['cost_asc', 'cost_desc'] -%}
                          {%- set ns.temp_list = [] -%}
                          {%- for reward in group.rewards -%}
                            {%- set reward_cost = (reward.cost | int(default=999999)) if reward is mapping else 999999 -%}
                            {%- set ns.temp_list = ns.temp_list + [[reward_cost, reward]] -%}
                          {%- endfor -%}
                          {%- set sorted_list = ns.temp_list | sort -%}
                          {%- if pref_sort_rewards == 'cost_desc' -%}
                            {%- set sorted_list = sorted_list | reverse | list -%}
                          {%- endif -%}
                          {%- set sorted_rewards = sorted_list | map('last') | list -%}
                          {%- set ns.sorted_groups = ns.sorted_groups + [{'name': group.name, 'rewards': sorted_rewards, 'icon': group.icon}] -%}
                        {%- else -%}
                          {%- set ns.sorted_groups = ns.sorted_groups + [group] -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {%- set ns.label_groups = ns.sorted_groups -%}
                    {%- endif -%}

                    {#-- 6. Render --#}
                    {%- if gamification_enabled -%}
                      {{
                        {
                          'type': 'custom:button-card',
                          'name': ui.get('rewards', 'err-rewards'),
                          'icon': 'mdi:gift-outline',
                          'show_name': true,
                          'show_icon': true,
                          'show_label': false,
                          'tap_action': ({
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'remove',
                              'key': ui_control_key_header_collapsed
                            }
                          } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'update',
                              'key': ui_control_key_header_collapsed,
                              'value': true
                            }
                          } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'none'
                          }),
                          'hold_action': {'action': 'none'},
                          'custom_fields': {
                            'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                          },
                          'styles': {
                            'card': [
                                {'background': ('color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed else 'transparent'},
                              {'box-shadow': 'none'},
                                {'border': '1px solid var(--divider-color)' if header_collapsed else 'none'},
                                {'border-left': '3px solid var(--primary-color)'},
                                {'border-bottom': '3px solid var(--primary-color)'},
                              {'border-radius': '10px'},
                              {'padding': '10px 12px'},
                              {'min-height': 'unset'},
                              {'margin-top': '5px'},
                              {'margin-bottom': '0px'}
                            ],
                            'grid': [
                              {'grid-template-areas': '"i n toggle"'},
                              {'grid-template-columns': 'min-content 1fr min-content'},
                              {'column-gap': '5px'},
                              {'align-items': 'center'}
                            ],
                            'icon': [
                              {'width': '18px'},
                              {'transform': 'translateY(-2px)'},
                              {'color': 'var(--primary-color)'}
                            ],
                            'name': [
                              {'justify-self': 'start'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'text-transform': 'uppercase'},
                              {'letter-spacing': '0.4px'},
                              {'color': 'var(--primary-text-color)'}
                            ],
                            'custom_fields': {
                              'toggle': [
                                {'justify-self': 'end'},
                                {'align-self': 'center'}
                              ]
                            }
                          }
                        }
                      }},

                      {%- if not header_collapsed -%}
                        {%- if ns.label_groups | length == 0 -%}
                          {{
                            {
                              'type': 'custom:button-card',
                              'name': ui.get('no_rewards', 'err-no_rewards'),
                              'icon': 'mdi:gift-off-outline',
                              'show_name': true,
                              'show_icon': true,
                              'tap_action': {'action': 'none'},
                              'styles': {
                                'card': [
                                  {'background': 'var(--secondary-background-color)'},
                                  {'box-shadow': 'none'},
                                  {'border': '1px solid var(--divider-color)'},
                                  {'border-radius': '12px'},
                                  {'padding': '10px 12px'}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n"'},
                                  {'grid-template-columns': 'min-content 1fr'},
                                  {'gap': '8px'},
                                  {'align-items': 'center'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '13px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--secondary-text-color)'}
                                ]
                              }
                            }
                          }},
                        {%- else -%}
                          {%- for group in ns.label_groups -%}
                            {%- set ns.group_cards = [] -%}
                            {%- set show_group_chip = (ns.label_groups | length > 1) or (group.name != ui.get('rewards', 'err-rewards')) -%}

                            {%- if show_group_chip -%}
                              {{
                                {
                                  'type': 'custom:button-card',
                                  'name': group.name,
                                  'icon': group.icon,
                                  'show_name': true,
                                  'show_icon': true,
                                  'tap_action': {'action': 'none'},
                                  'styles': {
                                    'card': [
                                      {'background': 'var(--secondary-background-color)'},
                                      {'box-shadow': 'none'},
                                      {'border': '2px solid var(--divider-color)'},
                                      {'border-radius': '6px'},
                                      {'padding': '6px 16px'},
                                      {'min-height': 'unset'},
                                      {'margin': '0px 0px 0px 0px'}
                                    ],
                                    'grid': [
                                      {'grid-template-areas': '"i n"'},
                                      {'grid-template-columns': 'min-content 1fr'},
                                      {'gap': '0px'},
                                      {'align-items': 'center'}
                                    ],
                                    'icon': [
                                      {'width': '18px'},
                                      {'color': 'var(--primary-color)'}
                                    ],
                                    'name': [
                                      {'justify-self': 'right'},
                                      {'font-size': '12px'},
                                      {'font-weight': '800'},
                                      {'text-transform': 'uppercase'},
                                      {'letter-spacing': '0.9px'},
                                      {'color': 'var(--primary-text-color)'}
                                    ]
                                  }
                                }
                              }},
                            {%- endif -%}

                            {%- for reward in group.rewards -%}
                              {%- set reward_name = reward.name if reward is mapping else 'Unknown' -%}
                              {%- set reward_cost = (reward.cost | int(default=0)) if reward is mapping else 0 -%}
                              {%- set reward_sensor_eid = reward.eid if reward is mapping else '' -%}
                              {%- set reward_icon = state_attr(reward_sensor_eid, 'icon') | default('mdi:gift', true) -%}
                              {%- set reward_description = state_attr(reward_sensor_eid, 'description') | default('', true) -%}
                              {%- set reward_description_clean = reward_description | string | trim -%}
                              {%- set reward_description_safe = reward_description_clean | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                              {%- set claim_button_eid = state_attr(reward_sensor_eid, 'claim_button_eid') | default('', true) -%}
                              {%- set approve_button_eid = state_attr(reward_sensor_eid, 'approve_button_eid') | default('', true) -%}
                              {%- set disapprove_button_eid = state_attr(reward_sensor_eid, 'disapprove_button_eid') | default('', true) -%}
                              {%- set reward_claimed_month = (state_attr(reward_sensor_eid, 'claimed_month') | int(default=0)) -%}
                              {%- set reward_claimed_all_time = (state_attr(reward_sensor_eid, 'claimed_all_time') | int(default=0)) -%}
                              {%- set reward_last_claimed = state_attr(reward_sensor_eid, 'last_claimed') | default('', true) -%}
                              {%- set reward_last_claimed_text = (as_timestamp(reward_last_claimed) | timestamp_custom('%b %d')) if reward_last_claimed not in ['', 'unknown', 'unavailable', none] else ui.get('never', 'err-never') -%}

                              {%- set reward_state = states(reward_sensor_eid) -%}
                              {%- set state_map = {
                                  'locked': ui.get('locked', 'err-locked'),
                                  'available': ui.get('available', 'err-available'),
                                  'requested': ui.get('requested', 'err-requested'),
                                  'approved': ui.get('approved', 'err-approved')
                              } -%}
                              {%- set reward_state_display = state_map.get(reward_state, reward_state) -%}

                              {%- set primary_button_eid = '' -%}
                              {%- set primary_button_icon = 'mdi:arrow-right' -%}
                              {%- set secondary_button_eid = '' -%}
                              {%- set primary_button_is_locked = false -%}
                              {%- if reward_state == 'requested' -%}
                                {%- set primary_button_eid = approve_button_eid or claim_button_eid -%}
                                {%- set primary_button_icon = 'mdi:check-bold' -%}
                                {%- set secondary_button_eid = disapprove_button_eid -%}
                              {%- elif reward_state == 'available' -%}
                                {%- set primary_button_eid = claim_button_eid -%}
                                {%- set primary_button_icon = 'mdi:arrow-right' -%}
                              {%- elif reward_state == 'locked' -%}
                                {%- set primary_button_icon = 'mdi:lock-outline' -%}
                                {%- set primary_button_is_locked = true -%}
                              {%- endif -%}

                              {%- set row_icon_color = (
                                '#a957fa' if reward_state == 'requested' else
                                'var(--primary-color)' if reward_state == 'available' else
                                'var(--success-color)' if reward_state == 'approved' else
                                  'var(--secondary-text-color)'
                              ) -%}
                              {%- set row_border_color = (
                                '#a957fa' if reward_state == 'requested' else
                                'var(--divider-color)' if reward_state == 'available' else
                                'var(--success-color)' if reward_state == 'approved' else
                                  'var(--divider-color)'
                              ) -%}
                              {%- set row_background = (
                                'color-mix(in srgb, #a957fa 10%, var(--card-background-color))' if reward_state == 'requested' else
                                'var(--card-background-color)' if reward_state in ['available', 'approved'] else
                                  'var(--secondary-background-color)'
                              ) -%}
                              {%- set reward_state_html = "<b style='color:" ~ row_icon_color ~ ";'>" ~ reward_state_display | upper ~ "</b> <span style='opacity:0.7;'>•</span> <span>" ~ ui.get('cost', 'err-cost') ~ ": " ~ reward_cost|string ~ " <ha-icon icon='" ~ points_icon ~ "' style='width:12px;height:12px;color:var(--secondary-text-color);transform:translateY(-1px);'></ha-icon></span>" -%}
                              {%- set reward_description_html = "<span>" ~ reward_description_safe ~ "</span>" -%}
                              {%- set reward_stats_html = "<span>" ~ ui.get('last', 'err-last') ~ ": " ~ reward_last_claimed_text ~ "</span> <span style='opacity:0.7;'>•</span> <span>" ~ reward_claimed_month|string ~ " " ~ ui.get('this_month', 'err-this_month') ~ "</span> <span style='opacity:0.7;'>•</span> <span>" ~ reward_claimed_all_time|string ~ " " ~ ui.get('total', 'err-total') ~ "</span>" -%}

                              {%- set ns.group_cards = ns.group_cards + [{
                                'type': 'custom:button-card',
                                'entity': reward_sensor_eid,
                                'name': reward_name,
                                'icon': reward_icon,
                                'show_name': true,
                                'show_label': false,
                                'show_icon': true,
                                'custom_fields': {
                                  'state': reward_state_html,
                                  'description': reward_description_html,
                                  'stats': reward_stats_html,
                                  'btn_secondary': {
                                    'card': {
                                      'type': 'custom:button-card',
                                      'show_name': false,
                                      'show_icon': true,
                                      'icon': 'mdi:undo-variant',
                                      'styles': {
                                        'card': [
                                          {'width': '30px'},
                                          {'height': '30px'},
                                          {'border-radius': '50%'},
                                          {'background-color': 'transparent'},
                                          {'border': '1px solid #a957fa'},
                                          {'box-shadow': 'none'}
                                        ],
                                        'icon': [
                                          {'width': '17px'},
                                          {'color': '#a957fa'}
                                        ]
                                      },
                                      'tap_action': ({ 'action': 'call-service', 'service': 'button.press', 'target': {'entity_id': secondary_button_eid } } if secondary_button_eid else { 'action': 'none' })
                                    }
                                  },
                                  'btn_primary': {
                                    'card': {
                                      'type': 'custom:button-card',
                                      'show_name': false,
                                      'show_icon': true,
                                      'icon': primary_button_icon,
                                      'styles': {
                                        'card': [
                                          {'width': '30px'},
                                          {'height': '30px'},
                                          {'border-radius': '50%'},
                                          {'background-color': 'transparent' if primary_button_is_locked else ('color-mix(in srgb, #a957fa 14%, var(--card-background-color))' if reward_state == 'requested' else 'transparent')},
                                          {'border': '1px solid var(--disabled-text-color)' if primary_button_is_locked else ('2px solid #a957fa' if reward_state == 'requested' else '2px solid var(--primary-color)')},
                                          {'box-shadow': 'none'}
                                        ],
                                        'icon': [
                                          {'width': '17px'},
                                          {'color': 'var(--disabled-text-color)' if primary_button_is_locked else 'var(--primary-text-color)'}
                                        ]
                                      },
                                      'tap_action': ({ 'action': 'call-service', 'service': 'button.press', 'target': {'entity_id': primary_button_eid } } if primary_button_eid and not primary_button_is_locked else { 'action': 'none' })
                                    }
                                  },
                                },
                                'tap_action': { 'action': 'more-info' },
                                'hold_action': { 'action': 'none' },
                                'styles': {
                                  'card': [
                                    {'background': row_background},
                                    {'box-shadow': 'none'},
                                    {'border': '1px solid ' ~ row_border_color},
                                    {'border-radius': '12px'},
                                    {'padding': '7px 10px'}
                                  ],
                                  'grid': [
                                    {'grid-template-areas': '"btn_secondary i btn_primary" "n n n" "state state state" "description description description" "stats stats stats"'},
                                    {'grid-template-columns': '30px 1fr 30px'},
                                    {'column-gap': '8px'},
                                    {'row-gap': '4px'},
                                    {'align-items': 'start'}
                                  ],
                                  'icon': [
                                    {'width': '30px'},
                                    {'justify-self': 'center'},
                                    {'align-self': 'start'},
                                    {'margin-top': '2px'},
                                    {'margin-bottom': '2px'},
                                    {'color': row_icon_color}
                                  ],
                                  'name': [
                                    {'justify-self': 'center'},
                                    {'text-align': 'center'},
                                    {'min-width': '0'},
                                    {'width': '100%'},
                                    {'font-size': '14px'},
                                    {'font-weight': '600'},
                                    {'line-height': '1.2'},
                                    {'overflow': 'hidden'},
                                    {'text-overflow': 'ellipsis'},
                                    {'white-space': 'nowrap'},
                                    {'color': 'var(--primary-text-color)'}
                                  ],
                                  'custom_fields': {
                                    'state': [
                                      {'justify-self': 'stretch'},
                                      {'text-align': 'center'},
                                      {'min-width': '0'},
                                      {'width': '100%'},
                                      {'font-size': '11px'},
                                      {'color': 'var(--secondary-text-color)'},
                                      {'line-height': '1.2'}
                                    ],
                                    'description': [
                                      {'justify-self': 'stretch'},
                                      {'text-align': 'center'},
                                      {'min-width': '0'},
                                      {'width': '100%'},
                                      {'font-size': '10px'},
                                      {'color': 'var(--secondary-text-color)'},
                                      {'line-height': '1.2'},
                                      {'display': 'block' if pref_show_reward_description and reward_description_clean | length > 0 else 'none'}
                                    ],
                                    'stats': [
                                      {'justify-self': 'stretch'},
                                      {'text-align': 'center'},
                                      {'min-width': '0'},
                                      {'width': '100%'},
                                      {'font-size': '10px'},
                                      {'color': 'var(--secondary-text-color)'},
                                      {'line-height': '1.2'}
                                    ],
                                    'btn_secondary': [
                                      {'width': '30px'},
                                      {'height': '30px'},
                                      {'align-self': 'start'},
                                      {'justify-self': 'start'},
                                      {'margin-top': '2px'},
                                      {'display': 'block'},
                                      {'visibility': 'visible' if secondary_button_eid not in ['', none] else 'hidden'},
                                      {'pointer-events': 'auto' if secondary_button_eid not in ['', none] else 'none'}
                                    ],
                                    'btn_primary': [
                                      {'width': '30px'},
                                      {'height': '30px'},
                                      {'align-self': 'start'},
                                      {'justify-self': 'end'},
                                      {'margin-top': '2px'},
                                      {'display': 'block'},
                                      {'visibility': 'visible' if primary_button_eid not in ['', none] or primary_button_is_locked else 'hidden'},
                                      {'pointer-events': 'auto' if primary_button_eid not in ['', none] or primary_button_is_locked else 'none'}
                                    ]
                                  }
                                }
                              }] -%}
                            {%- endfor -%}

                            {{
                              {
                                'type': 'grid',
                                'columns': 2,
                                'square': false,
                                'cards': ns.group_cards if ns.group_cards | length > 0 else [{
                                  'type': 'custom:button-card',
                                  'name': ui.get('no_rewards', 'err-no_rewards'),
                                  'icon': 'mdi:gift-off-outline',
                                  'show_name': true,
                                  'show_icon': true,
                                  'tap_action': {'action': 'none'},
                                  'styles': {
                                    'card': [
                                      {'background': 'var(--secondary-background-color)'},
                                      {'box-shadow': 'none'},
                                      {'border': '1px solid var(--divider-color)'},
                                      {'border-radius': '12px'},
                                      {'padding': '10px 12px'}
                                    ],
                                    'grid': [
                                      {'grid-template-areas': '"i n"'},
                                      {'grid-template-columns': 'min-content 1fr'},
                                      {'gap': '8px'},
                                      {'align-items': 'center'}
                                    ],
                                    'icon': [
                                      {'width': '18px'},
                                      {'color': 'var(--secondary-text-color)'}
                                    ],
                                    'name': [
                                      {'justify-self': 'start'},
                                      {'font-size': '13px'},
                                      {'font-weight': '600'},
                                      {'color': 'var(--secondary-text-color)'}
                                    ]
                                  }
                                }]
                              }
                            }},
                          {%- endfor -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}

        - type: grid
          square: false
          columns: 1
          grid_options:
            columns: full
          cards:
            - type: custom:auto-entities
              card:
                square: false
                type: grid
                columns: 1
              card_param: cards
              filter:
                template: |-
                  {#-- ===== CUMULATIVE BADGES CARD ===== --#}

                  << template_snippets.meta_stamp >>


                  {#-- 1. User Configuration --#}

                  << template_snippets.user_override_helper >>

                  {%- set pref_show_next_higher_badge = true -%}
                  {%- set pref_show_next_lower_badge = true -%}
                  {%- set pref_default_header_collapsed = false -%}
                  {%- set pref_primary_tint_mix_pct = 14 -%}  {#-- Percent of var(--primary-color) mixed into the main Cumulative header background when fill is enabled. Allowed: 0-100. --#}
                  {%- set pref_show_header_background = true -%}  {#-- Set to false to remove the main Cumulative header background fill and leave it transparent. Allowed: true, false. --#}
                  {%- set pref_show_header_thin_border = true -%}  {#-- Set to false to remove the thin outer border line. Accent borders are unaffected. Allowed: true, false. --#}


                  {#-- 2. Dynamic Lookups & Validations --#}

                  {%- set pref_show_next_higher_badge = (pref_show_next_higher_badge | default('true') | string | lower) == 'true' -%}
                  {%- set pref_show_next_lower_badge = (pref_show_next_lower_badge | default('true') | string | lower) == 'true' -%}
                  {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
                  {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
                  {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
                  {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
                  {%- if pref_primary_tint_mix_pct < 0 -%}
                    {%- set pref_primary_tint_mix_pct = 0 -%}
                  {%- elif pref_primary_tint_mix_pct > 100 -%}
                    {%- set pref_primary_tint_mix_pct = 100 -%}
                  {%- endif -%}

                  << template_snippets.user_setup >>

                  << template_snippets.user_validation >>

                  {%- if not skip_render -%}

                    {#-- 3. Initialize --#}
                    {%- set ns = namespace(
                      badges=[],
                      points_earned_all_time=0,
                      points_label='Points',
                      m_frequency='',
                      m_status='active',
                      m_cycle_pts=0,
                      m_end_date='',
                      m_grace_end='',
                      m_remaining=0,
                      m_required=0,
                      m_last_awarded='',
                      m_award_count=0,
                      points_to_next=0,
                      current_badge_eid='',
                      highest_earned_badge_eid='',
                      next_higher_badge_eid='',
                      next_lower_badge_eid='',
                      has_earned_any=false
                    ) -%}

                    {#-- 4. Collect Data --#}
                    {%- set core_sensors = state_attr(dashboard_helper, 'core_sensors') or {} -%}
                    {%- set points_sensor = core_sensors.get('points_eid') -%}
                    {%- set badges_sensor = core_sensors.get('badges_eid') -%}
                    {%- set translation_sensor = (state_attr(dashboard_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                    {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                    {%- set gamification_enabled = state_attr(dashboard_helper, 'gamification_enabled') | default(false, true) -%}
                    {%- set ns.points_earned_all_time = (state_attr(points_sensor, 'point_stat_points_earned_all_time') | int(default=0)) if points_sensor else 0 -%}
                    {%- set ns.points_label = (state_attr(points_sensor, 'unit_of_measurement') if points_sensor else None) or 'Points' -%}
                    {%- set points_icon = (state_attr(points_sensor, 'icon') if points_sensor else None) or 'mdi:star-circle' -%}
                    {%- set ui_control = state_attr(dashboard_helper, 'ui_control') | default({}, true) -%}
                    {%- set ui_control_key_root = 'gamification/cumulative' -%}
                    {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header_collapse' -%}
                    {%- set ui_control_key_settings_open = ui_control_key_root ~ '/settings_open' -%}
                    {%- set ui_control_key_show_next_higher_badge = ui_control_key_root ~ '/show_next_higher_badge' -%}
                    {%- set ui_control_key_show_next_lower_badge = ui_control_key_root ~ '/show_next_lower_badge' -%}
                    {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                    {%- for segment in ui_control_key_root.split('/') -%}
                      {%- if ui_root.current is mapping -%}
                        {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                      {%- else -%}
                        {%- set ui_root.current = {} -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set header_collapsed = ui_root.current.get('header_collapse', pref_default_header_collapsed) if ui_root.current is mapping else pref_default_header_collapsed -%}
                    {%- set header_collapsed = header_collapsed | default(pref_default_header_collapsed, true) -%}
                    {%- set settings_open = ui_root.current.get('settings_open', false) if ui_root.current is mapping else false -%}
                    {%- set settings_open = (settings_open | string | lower) == 'true' -%}
                    {%- set effective_show_next_higher_badge = ui_root.current.get('show_next_higher_badge', pref_show_next_higher_badge) if ui_root.current is mapping else pref_show_next_higher_badge -%}
                    {%- set effective_show_next_higher_badge = (effective_show_next_higher_badge | string | lower) == 'true' -%}
                    {%- set effective_show_next_lower_badge = ui_root.current.get('show_next_lower_badge', pref_show_next_lower_badge) if ui_root.current is mapping else pref_show_next_lower_badge -%}
                    {%- set effective_show_next_lower_badge = (effective_show_next_lower_badge | string | lower) == 'true' -%}
                    {%- set integration_entry_id = state_attr(dashboard_helper, 'integration_entry_id') -%}
                    {%- set dashboard_helper_user_id = state_attr(dashboard_helper, 'user_id') -%}

                    {%- if badges_sensor -%}
                      {%- set hb_attrs = states[badges_sensor].attributes | default({}, true) -%}
                      {%- set hb_reset_schedule = hb_attrs.get('reset_schedule') if hb_attrs.get('reset_schedule') is mapping else {} -%}
                      {%- set ns.points_to_next = hb_attrs.get('points_to_next_badge', 0) | int(default=0) -%}
                      {%- set ns.m_status = hb_attrs.get('badge_status', 'active') | default('active') -%}
                      {%- set ns.m_frequency = ((hb_attrs.get('recurring_frequency') or hb_reset_schedule.get('recurring_frequency') or '') | string | lower) -%}
                      {%- set ns.m_cycle_pts = hb_attrs.get('cycle_points', 0) | int(default=0) -%}
                      {%- set ns.m_end_date = (hb_attrs.get('maintenance_end_date') | default('', true) | string | regex_replace('T.*$', '')) -%}
                      {%- set ns.m_grace_end = (hb_attrs.get('maintenance_grace_end_date') | default('', true) | string | regex_replace('T.*$', '')) -%}
                      {%- set ns.m_required = hb_attrs.get('maintenance_points_required', 0) | int(default=0) -%}
                      {%- set ns.m_remaining = hb_attrs.get('maintenance_points_remaining', 0) | int(default=0) -%}
                      {%- set ns.m_last_awarded = hb_attrs.get('last_awarded_date') | default('', true) -%}
                      {%- set ns.m_award_count = hb_attrs.get('award_count', 0) | int(default=0) -%}
                      {%- set ns.current_badge_eid = hb_attrs.get('current_badge_eid') | default('', true) -%}
                      {%- set ns.highest_earned_badge_eid = hb_attrs.get('highest_earned_badge_eid') | default('', true) -%}
                      {%- set ns.next_higher_badge_eid = hb_attrs.get('next_higher_badge_eid') | default('', true) -%}
                      {%- set ns.next_lower_badge_eid = hb_attrs.get('next_lower_badge_eid') | default('', true) -%}
                      {%- set ns.has_earned_any = ns.current_badge_eid not in ['', 'None', 'unknown', 'unavailable', none] -%}

                      {%- set middle_badge_eid = ns.current_badge_eid -%}
                      {%- if ns.m_status == 'demoted' and ns.highest_earned_badge_eid not in ['', 'None', 'unknown', 'unavailable', none] -%}
                        {%- set middle_badge_eid = ns.highest_earned_badge_eid -%}
                      {%- endif -%}
                      {%- if ns.next_lower_badge_eid == middle_badge_eid -%}
                        {%- set ns.next_lower_badge_eid = '' -%}
                      {%- endif -%}

                      {%- set badge_entries = [
                        {'eid': middle_badge_eid, 'role': 'current', 'earned': true}
                      ] -%}
                      {%- if effective_show_next_higher_badge -%}
                        {%- set badge_entries = [
                          {'eid': ns.next_higher_badge_eid, 'role': 'next_higher', 'earned': false}
                        ] + badge_entries -%}
                      {%- endif -%}
                      {%- if effective_show_next_lower_badge -%}
                        {%- set badge_entries = badge_entries + [
                          {'eid': ns.next_lower_badge_eid, 'role': 'next_lower', 'earned': true}
                        ] -%}
                      {%- endif -%}

                      {%- for entry in badge_entries -%}
                        {%- set badge_eid = entry.eid -%}
                        {%- if badge_eid not in ['', 'None', 'unknown', 'unavailable', none] and states(badge_eid) not in ['unknown', 'unavailable'] -%}
                          {%- set badge_attrs = states[badge_eid].attributes | default({}, true) -%}
                          {%- set target_data = badge_attrs.get('target') if badge_attrs.get('target') is mapping else {} -%}
                          {%- set threshold_val = 0 -%}
                          {%- set maintenance_points = 0 -%}
                          {%- if target_data is mapping -%}
                            {%- set threshold_val = target_data.threshold_value | float(default=0) -%}
                            {%- set maintenance_points = target_data.maintenance_rules | int(default=0) -%}
                          {%- else -%}
                            {%- set threshold_val = badge_attrs.get('threshold_value', 0) | float(default=0) -%}
                          {%- endif -%}

                          {%- set awards_data = badge_attrs.get('awards') if badge_attrs.get('awards') is mapping else {} -%}
                          {%- set award_points_attr = badge_attrs.get('award_points', 0) | float(default=0) -%}
                          {%- set points_multiplier_attr = badge_attrs.get('points_multiplier', 0) | float(default=0) -%}
                          {%- set award_points = awards_data.get('award_points', award_points_attr) | float(default=award_points_attr) -%}
                          {%- set points_multiplier = awards_data.get('points_multiplier', points_multiplier_attr) | float(default=points_multiplier_attr) -%}
                          {%- set award_rewards = awards_data.get('rewards') if awards_data.get('rewards') is iterable and awards_data.get('rewards') is not string else [] -%}
                          {%- set award_bonuses = awards_data.get('bonuses') if awards_data.get('bonuses') is iterable and awards_data.get('bonuses') is not string else [] -%}
                          {%- set award_penalties = awards_data.get('penalties') if awards_data.get('penalties') is iterable and awards_data.get('penalties') is not string else [] -%}

                          {%- set raw_earned = badge_attrs.get('assignees_earned') -%}
                          {%- set earned_list = [] -%}
                          {%- if raw_earned is string -%}
                            {%- set earned_list = [raw_earned] -%}
                          {%- elif raw_earned is iterable and raw_earned is not string and raw_earned is not none -%}
                            {%- set earned_list = raw_earned -%}
                          {%- endif -%}

                          {%- set badge_info = {
                            'entity_id': badge_eid,
                            'name': ((badge_attrs.get('badge_name') or badge_attrs.get('friendly_name') or '') | string) | regex_replace('^Badge - ', ''),
                            'icon': badge_attrs.get('icon') | default('mdi:medal-outline', true),
                            'description': (badge_attrs.get('description') or '') | string,
                            'last_awarded': (badge_attrs.get('last_awarded_date') or '') | string,
                            'threshold': threshold_val | int,
                            'award_points': award_points,
                            'points_multiplier': points_multiplier,
                            'award_rewards': award_rewards,
                            'award_bonuses': award_bonuses,
                            'award_penalties': award_penalties,
                            'assignees_earned': earned_list,
                            'maintenance': maintenance_points,
                            'role': entry.role,
                            'earned': entry.earned
                          } -%}
                          {%- set ns.badges = ns.badges + [badge_info] -%}
                        {%- endif -%}
                      {%- endfor -%}
                    {%- endif -%}

                    {#-- 5. Render --#}
                    {%- if gamification_enabled -%}
                      {{
                        {
                          'type': 'custom:button-card',
                          'name': ui.get('ranks', 'err-ranks'),
                          'icon': 'mdi:medal-outline',
                          'show_name': true,
                          'show_icon': true,
                          'tap_action': ({
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'remove',
                              'key': ui_control_key_header_collapsed
                            }
                          } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'update',
                              'key': ui_control_key_header_collapsed,
                              'value': true
                            }
                          } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'none'
                          }),
                          'hold_action': {'action': 'none'},
                          'custom_fields': {
                            'gear': {
                              'card': {
                                'type': 'custom:button-card',
                                'icon': 'mdi:cog-outline',
                                'show_name': false,
                                'show_icon': true,
                                'tap_action': ({
                                  'action': 'call-service',
                                  'service': 'choreops.manage_ui_control',
                                  'data': {
                                    'config_entry_id': integration_entry_id,
                                    'user_id': dashboard_helper_user_id,
                                    'ui_control_action': 'remove',
                                    'key': ui_control_key_settings_open
                                  }
                                } if settings_open and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                                  'action': 'call-service',
                                  'service': 'choreops.manage_ui_control',
                                  'data': {
                                    'config_entry_id': integration_entry_id,
                                    'user_id': dashboard_helper_user_id,
                                    'ui_control_action': 'update',
                                    'key': ui_control_key_settings_open,
                                    'value': true
                                  }
                                } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                                  'action': 'none'
                                }),
                                'hold_action': {'action': 'none'},
                                'styles': {
                                  'card': [
                                    {'width': '30px'},
                                    {'height': '30px'},
                                    {'border-radius': '50%'},
                                    {'background': ('color-mix(in srgb, var(--primary-color) 12%, var(--card-background-color))') if settings_open else 'transparent'},
                                    {'border': '1px solid var(--divider-color)'},
                                    {'box-shadow': 'none'}
                                  ],
                                  'icon': [
                                    {'width': '16px'},
                                    {'color': 'var(--primary-color)'}
                                  ]
                                }
                              }
                            },
                            'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                          },
                          'styles': {
                            'card': [
                              {'background': ('color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed else 'transparent'},
                              {'box-shadow': 'none'},
                              {'border': '1px solid var(--divider-color)' if header_collapsed else 'none'},
                              {'border-left': '3px solid var(--primary-color)'},
                              {'border-bottom': '3px solid var(--primary-color)'},
                              {'border-radius': '10px'},
                              {'padding': '10px 12px'},
                              {'min-height': 'unset'},
                              {'margin-top': '5px'},
                              {'margin-bottom': '0px'}
                            ],
                            'grid': [
                              {'grid-template-areas': '"i n gear toggle"'},
                              {'grid-template-columns': 'min-content 1fr min-content min-content'},
                              {'column-gap': '5px'},
                              {'align-items': 'center'}
                            ],
                            'icon': [
                              {'width': '18px'},
                              {'transform': 'translateY(-2px)'},
                              {'color': 'var(--primary-color)'}
                            ],
                            'name': [
                              {'justify-self': 'start'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'text-transform': 'uppercase'},
                              {'letter-spacing': '0.4px'},
                              {'color': 'var(--primary-text-color)'}
                            ],
                            'custom_fields': {
                              'gear': [
                                {'justify-self': 'end'},
                                {'align-self': 'center'},
                                {'display': 'none' if header_collapsed else 'block'}
                              ],
                              'toggle': [
                                {'justify-self': 'end'},
                                {'align-self': 'center'}
                              ]
                            }
                          }
                        }
                      }},

                      {%- if not header_collapsed -%}
                        {%- if settings_open -%}
                          {{
                            {
                              'type': 'vertical-stack',
                              'cards': [
                                {
                                  'type': 'custom:button-card',
                                  'name': ui.get('configure', 'err-configure'),
                                  'icon': 'mdi:tune-variant',
                                  'show_name': true,
                                  'show_icon': true,
                                  'tap_action': {'action': 'none'},
                                  'styles': {
                                    'card': [
                                      {'background': 'var(--secondary-background-color)'},
                                      {'box-shadow': 'none'},
                                      {'border': '1px solid var(--divider-color)'},
                                      {'border-radius': '12px 12px 0 0'},
                                      {'padding': '8px 12px 6px 12px'}
                                    ],
                                    'grid': [
                                      {'grid-template-areas': '"i n"'},
                                      {'grid-template-columns': 'min-content 1fr'},
                                      {'column-gap': '6px'},
                                      {'align-items': 'center'}
                                    ],
                                    'icon': [
                                      {'width': '16px'},
                                      {'color': 'var(--primary-color)'}
                                    ],
                                    'name': [
                                      {'justify-self': 'start'},
                                      {'font-size': '12px'},
                                      {'font-weight': '700'},
                                      {'text-transform': 'uppercase'},
                                      {'letter-spacing': '0.6px'},
                                      {'color': 'var(--primary-text-color)'}
                                    ]
                                  }
                                },
                                {
                                  'type': 'grid',
                                  'columns': 2,
                                  'square': false,
                                  'cards': [
                                    {
                                      'type': 'custom:button-card',
                                      'name': ui.get('hide_next_higher_badge', 'err-hide_next_higher_badge') if effective_show_next_higher_badge else ui.get('show_next_higher_badge', 'err-show_next_higher_badge'),
                                      'icon': 'mdi:arrow-up-bold-circle' if effective_show_next_higher_badge else 'mdi:arrow-up-bold-circle-outline',
                                      'show_name': true,
                                      'show_icon': true,
                                      'tap_action': ({
                                        'action': 'call-service',
                                        'service': 'choreops.manage_ui_control',
                                        'data': {
                                          'config_entry_id': integration_entry_id,
                                          'user_id': dashboard_helper_user_id,
                                          'ui_control_action': 'remove',
                                          'key': ui_control_key_show_next_higher_badge
                                        }
                                      } if (not effective_show_next_higher_badge) == pref_show_next_higher_badge and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                                        'action': 'call-service',
                                        'service': 'choreops.manage_ui_control',
                                        'data': {
                                          'config_entry_id': integration_entry_id,
                                          'user_id': dashboard_helper_user_id,
                                          'ui_control_action': 'update',
                                          'key': ui_control_key_show_next_higher_badge,
                                          'value': (not effective_show_next_higher_badge)
                                        }
                                      } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                                        'action': 'none'
                                      }),
                                      'styles': {
                                        'card': [
                                          {'background': ('color-mix(in srgb, var(--primary-color) 14%, var(--card-background-color))') if effective_show_next_higher_badge else 'var(--card-background-color)'},
                                          {'box-shadow': 'none'},
                                          {'border': '1px solid var(--primary-color)' if effective_show_next_higher_badge else '1px solid var(--divider-color)'},
                                          {'border-radius': '0 0 0 12px'},
                                          {'padding': '10px 8px'}
                                        ],
                                        'grid': [
                                          {'grid-template-areas': '"i" "n"'},
                                          {'grid-template-columns': '1fr'},
                                          {'row-gap': '4px'}
                                        ],
                                        'icon': [
                                          {'width': '18px'},
                                          {'color': 'var(--primary-color)'}
                                        ],
                                        'name': [
                                          {'font-size': '12px'},
                                          {'font-weight': '700'},
                                          {'color': 'var(--primary-text-color)'},
                                          {'white-space': 'normal'},
                                          {'line-height': '1.2'}
                                        ]
                                      }
                                    },
                                    {
                                      'type': 'custom:button-card',
                                      'name': ui.get('hide_next_lower_badge', 'err-hide_next_lower_badge') if effective_show_next_lower_badge else ui.get('show_next_lower_badge', 'err-show_next_lower_badge'),
                                      'icon': 'mdi:arrow-down-bold-circle' if effective_show_next_lower_badge else 'mdi:arrow-down-bold-circle-outline',
                                      'show_name': true,
                                      'show_icon': true,
                                      'tap_action': ({
                                        'action': 'call-service',
                                        'service': 'choreops.manage_ui_control',
                                        'data': {
                                          'config_entry_id': integration_entry_id,
                                          'user_id': dashboard_helper_user_id,
                                          'ui_control_action': 'remove',
                                          'key': ui_control_key_show_next_lower_badge
                                        }
                                      } if (not effective_show_next_lower_badge) == pref_show_next_lower_badge and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                                        'action': 'call-service',
                                        'service': 'choreops.manage_ui_control',
                                        'data': {
                                          'config_entry_id': integration_entry_id,
                                          'user_id': dashboard_helper_user_id,
                                          'ui_control_action': 'update',
                                          'key': ui_control_key_show_next_lower_badge,
                                          'value': (not effective_show_next_lower_badge)
                                        }
                                      } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                                        'action': 'none'
                                      }),
                                      'styles': {
                                        'card': [
                                          {'background': ('color-mix(in srgb, var(--primary-color) 14%, var(--card-background-color))') if effective_show_next_lower_badge else 'var(--card-background-color)'},
                                          {'box-shadow': 'none'},
                                          {'border': '1px solid var(--primary-color)' if effective_show_next_lower_badge else '1px solid var(--divider-color)'},
                                          {'border-radius': '0 0 12px 0'},
                                          {'padding': '10px 8px'}
                                        ],
                                        'grid': [
                                          {'grid-template-areas': '"i" "n"'},
                                          {'grid-template-columns': '1fr'},
                                          {'row-gap': '4px'}
                                        ],
                                        'icon': [
                                          {'width': '18px'},
                                          {'color': 'var(--primary-color)'}
                                        ],
                                        'name': [
                                          {'font-size': '12px'},
                                          {'font-weight': '700'},
                                          {'color': 'var(--primary-text-color)'},
                                          {'white-space': 'normal'},
                                          {'line-height': '1.2'}
                                        ]
                                      }
                                    }
                                  ]
                                }
                              ]
                            }
                          }},
                        {%- endif -%}
                        {%- if ns.badges | length == 0 -%}
                          {{
                            {
                              'type': 'custom:button-card',
                              'name': ui.get('no_badges_found', 'err-no_badges_found'),
                              'label': ui.get('cumulative_badge_setup_prompt', 'err-cumulative_badge_setup_prompt'),
                              'icon': 'mdi:medal-outline',
                              'show_name': true,
                              'show_icon': true,
                              'show_label': true,
                              'tap_action': {'action': 'none'},
                              'styles': {
                                'card': [
                                  {'background': 'var(--secondary-background-color)'},
                                  {'box-shadow': 'none'},
                                  {'border': '1px solid var(--divider-color)'},
                                  {'border-radius': '12px'},
                                  {'padding': '10px 12px'}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n" "i l"'},
                                  {'grid-template-columns': 'min-content 1fr'},
                                  {'gap': '8px'},
                                  {'align-items': 'center'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '13px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'label': [
                                  {'justify-self': 'start'},
                                  {'font-size': '11px'},
                                  {'line-height': '1.3'},
                                  {'color': 'var(--secondary-text-color)'},
                                  {'white-space': 'normal'}
                                ]
                              }
                            }
                          }},
                        {%- else -%}
                          {%- for badge in ns.badges -%}
                          {%- set is_current = badge.role == 'current' -%}
                          {%- set is_target = badge.role == 'next_higher' -%}
                          {%- set req_pts = ns.m_required if ns.m_required > 0 else badge.maintenance -%}
                          {%- set badge_desc = badge.description | trim -%}
                          {%- set badge_desc_safe = badge_desc | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                          {%- set earned_names = badge.assignees_earned | default([], true) -%}
                          {%- set awards_inline_parts = [] -%}
                          {%- set effective_multiplier = badge.points_multiplier | float(default=0) -%}
                          {%- set effective_points = badge.award_points | float(default=0) -%}
                          {%- set bonus_count = badge.award_bonuses | length -%}
                          {%- set reward_count = badge.award_rewards | length -%}

                          {%- if effective_multiplier > 0 -%}
                            {%- set awards_inline_parts = awards_inline_parts + ["x" ~ ('%.2f' | format(effective_multiplier) | regex_replace('\.?0+$', ''))] -%}
                          {%- endif -%}
                          {%- if effective_points > 0 -%}
                            {%- set awards_inline_parts = awards_inline_parts + [('%.1f' | format(effective_points)) ~ " <ha-icon icon='" ~ points_icon ~ "' style='width:12px;height:12px;color:var(--primary-color);transform:translateY(-1px);'></ha-icon>"] -%}
                          {%- endif -%}
                          {%- if bonus_count > 0 -%}
                            {%- set awards_inline_parts = awards_inline_parts + [ui.get('bonus', 'err-bonus') ~ (" x" ~ bonus_count|string if bonus_count > 1 else "")] -%}
                          {%- endif -%}
                          {%- if reward_count > 0 -%}
                            {%- set awards_inline_parts = awards_inline_parts + [ui.get('reward', 'err-reward') ~ (" x" ~ reward_count|string if reward_count > 1 else "")] -%}
                          {%- endif -%}
                          {%- set awards_inline = awards_inline_parts | join(" <span style='opacity:0.7;'>•</span> ") -%}

                          {%- set status_text = ("✅ " ~ ui.get('earned', 'err-earned')) if badge.earned else ("🔒 " ~ ui.get('future_goal', 'err-future_goal')) -%}
                          {%- set status_color = 'var(--success-color)' if badge.earned else 'var(--secondary-text-color)' -%}
                          {%- set current_state_label = ui.get('active', 'err-active') if ns.m_status == 'active' else (ui.get('demoted', 'err-demoted') if ns.m_status == 'demoted' else ui.get('grace_period', 'err-grace_period')) -%}
                          {%- set current_state_color = 'var(--success-color)' if ns.m_status == 'active' else ('var(--error-color)' if ns.m_status == 'demoted' else 'var(--warning-color)') -%}
                          {%- if is_current -%}
                            {%- set details_html = "<b style='color:" ~ current_state_color ~ ";'>🛡️ " ~ ui.get('current_status', 'err-current_status') ~ ": " ~ current_state_label | upper ~ "</b>" -%}
                            {%- set details_html = details_html ~ "<br><span>🎯 " ~ ui.get('threshold', 'err-threshold') ~ ": " ~ badge.threshold|string ~ " " ~ ns.points_label ~ "</span>" -%}
                          {%- else -%}
                            {%- set details_html = "<b style='color:" ~ status_color ~ ";'>" ~ status_text | upper ~ "</b> <span style='opacity:0.7;'>•</span> <span>🎯 " ~ ui.get('threshold', 'err-threshold') ~ ": " ~ badge.threshold|string ~ " " ~ ns.points_label ~ "</span>" -%}
                          {%- endif -%}
                          {%- if awards_inline | length > 0 -%}
                            {%- set details_html = details_html ~ "<br><span style='display:inline-block;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:700;color:var(--primary-text-color);'>💎 " ~ ui.get('awards', 'err-awards') ~ ": " ~ awards_inline ~ "</span>" -%}
                          {%- endif -%}
                          {%- set description_html = "<span>" ~ badge_desc_safe ~ "</span>" -%}

                          {%- set progress_html = '' -%}
                          {%- if is_current and req_pts > 0 -%}
                            {%- set pct = (ns.m_cycle_pts / req_pts * 100) | round(0) | int -%}
                            {%- if pct > 100 -%}{%- set pct = 100 -%}{%- endif -%}
                            {%- if pct < 0 -%}{%- set pct = 0 -%}{%- endif -%}
                            {%- set bar_color = 'var(--warning-color)' if ns.m_status == 'grace' else ('var(--success-color)' if ns.m_remaining <= 0 else ('var(--warning-color)' if ns.m_status == 'demoted' else 'var(--primary-color)')) -%}
                            {%- set current_multiplier = (state_attr(points_sensor, 'points_multiplier') | float(default=0)) if points_sensor else 0 -%}
                            {%- set highest_multiplier = 0 -%}
                            {%- set hb_awards = hb_attrs.get('awards') if hb_attrs is mapping else none -%}
                            {%- if hb_awards is mapping -%}
                              {%- set highest_multiplier = hb_awards.get('points_multiplier', 0) | float(default=0) -%}
                            {%- endif -%}
                            {%- if highest_multiplier <= 0 and ns.highest_earned_badge_eid not in ['', 'None', 'unknown', 'unavailable', none] -%}
                              {%- set highest_awards = state_attr(ns.highest_earned_badge_eid, 'awards') -%}
                              {%- if highest_awards is mapping -%}
                                {%- set highest_multiplier = highest_awards.get('points_multiplier', 0) | float(default=0) -%}
                              {%- endif -%}
                            {%- endif -%}
                            {%- set demoted_multiplier_header_note = '' -%}
                            {%- if ns.m_status == 'demoted' and current_multiplier > 0 and highest_multiplier > 0 and current_multiplier < highest_multiplier -%}
                              {%- set current_multiplier_text = '%.2f' | format(current_multiplier) | regex_replace('\.?0+$', '') -%}
                              {%- set highest_multiplier_text = '%.2f' | format(highest_multiplier) | regex_replace('\.?0+$', '') -%}
                              {%- set demoted_multiplier_header_note = " <span style='color:var(--error-color);font-weight:700;'>• x" ~ current_multiplier_text ~ " " ~ ui.get('multiplier', 'err-multiplier') ~ "</span>" -%}
                            {%- endif -%}
                            {%- set maint_end_short = (as_timestamp(ns.m_end_date ~ 'T12:00:00') | timestamp_custom('%b %d')) if ns.m_end_date not in ['', none] else '' -%}
                            {%- set maint_grace_short = (as_timestamp(ns.m_grace_end ~ 'T12:00:00') | timestamp_custom('%b %d')) if ns.m_grace_end not in ['', none] else '' -%}
                            {%- set maint_recurrence = ("↻ " ~ ui.get(ns.m_frequency, ns.m_frequency | replace('_', ' ') | title)) if ns.m_frequency not in ['', 'none'] else ui.get('cumulative', 'err-cumulative') -%}
                            {%- set maint_due_or_grace = '' -%}
                            {%- if ns.m_status == 'grace' and maint_grace_short | length > 0 -%}
                              {%- set maint_due_or_grace = ui.get('grace_period', 'err-grace_period') ~ ': ' ~ maint_grace_short -%}
                            {%- elif maint_end_short | length > 0 -%}
                              {%- set maint_due_or_grace = ui.get('due', 'err-due') ~ ': ' ~ maint_end_short -%}
                            {%- endif -%}
                            {%- set maintenance_notes = [] -%}
                            {%- if ns.m_status == 'grace' -%}
                              {%- set maintenance_notes = maintenance_notes + ["<span style='color:var(--warning-color);font-weight:700;'>• " ~ ui.get('grace_period', 'err-grace_period') ~ "</span>"] -%}
                            {%- elif ns.m_status == 'demoted' -%}
                              {%- set maintenance_notes = maintenance_notes + ["<span style='color:var(--error-color);font-weight:700;'>• " ~ ui.get('demoted', 'err-demoted') ~ "</span>"] -%}
                            {%- endif -%}
                            {%- set maintenance_note_html = maintenance_notes | join(' ') -%}
                            {%- set maint_need_text = ui.get('need', 'err-need') ~ ": " ~ ns.m_remaining|string ~ " " ~ ns.points_label -%}
                            {%- set maint_need_color = 'var(--warning-color)' if ns.m_status == 'grace' else ('var(--success-color)' if ns.m_remaining <= 0 else 'var(--secondary-text-color)') -%}
                            {%- set progress_html = "<div style='margin-top:2px;padding:8px 10px;border-radius:8px;background:var(--secondary-background-color);border:1px solid var(--divider-color);'><div style='display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;'><span><ha-icon icon='mdi:shield-sync' style='width:14px;height:14px;color:" ~ bar_color ~ ";transform:translateY(-1px);'></ha-icon> " ~ ui.get('maintenance', 'err-maintenance') ~ " " ~ maintenance_note_html ~ demoted_multiplier_header_note ~ "</span><span style='font-weight:600;'>" ~ ns.m_cycle_pts|string ~ "/" ~ req_pts|string ~ "</span></div><div style='margin-top:6px;display:flex;align-items:center;gap:6px;'><div style='flex:1;height:6px;background:var(--divider-color);border-radius:999px;overflow:hidden;'><div style='width:" ~ pct|string ~ "%;height:100%;background:" ~ bar_color ~ ";border-radius:999px;'></div></div><span style='font-size:10px;color:var(--secondary-text-color);line-height:1;'>" ~ pct|string ~ "%</span></div><div style='margin-top:6px;font-size:10px;color:var(--secondary-text-color);display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;'><span>" ~ maint_recurrence ~ "</span><span style='font-weight:600;color:" ~ maint_need_color ~ ";text-align:center;white-space:nowrap;'>" ~ maint_need_text ~ "</span><span style='font-weight:600;color:" ~ ('var(--warning-color)' if ns.m_status == 'grace' else 'var(--secondary-text-color)') ~ ";text-align:right;'>" ~ maint_due_or_grace ~ "</span></div></div>" -%}
                          {%- elif is_target and badge.threshold > 0 -%}
                            {%- set pts_to_unlock = ns.points_to_next if ns.has_earned_any else (((badge.threshold - ns.points_earned_all_time) | float(default=0) | round(0, 'ceil')) | int) -%}
                            {%- if pts_to_unlock < 0 -%}{%- set pts_to_unlock = 0 -%}{%- endif -%}
                            {%- set current_prog = badge.threshold - pts_to_unlock -%}
                            {%- if current_prog < 0 -%}{%- set current_prog = 0 -%}{%- endif -%}
                            {%- set pct = (current_prog / badge.threshold * 100) | round(0) | int -%}
                            {%- if pct > 100 -%}{%- set pct = 100 -%}{%- endif -%}
                            {%- set progress_html = "<div style='margin-top:2px;padding:8px 10px;border-radius:8px;background:var(--secondary-background-color);border:1px solid var(--divider-color);'><div style='display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;'><span><ha-icon icon='mdi:rocket-launch' style='width:14px;height:14px;color:var(--primary-color);transform:translateY(-1px);'></ha-icon> " ~ ui.get('to_unlock', 'err-to_unlock') ~ "</span><span style='font-weight:600;'>" ~ current_prog|string ~ "/" ~ badge.threshold|string ~ "</span></div><div style='margin-top:6px;display:flex;align-items:center;gap:6px;'><div style='flex:1;height:6px;background:var(--divider-color);border-radius:999px;overflow:hidden;'><div style='width:" ~ pct|string ~ "%;height:100%;background:var(--primary-color);border-radius:999px;'></div></div><span style='font-size:10px;color:var(--secondary-text-color);line-height:1;'>" ~ pct|string ~ "%</span></div><div style='margin-top:6px;font-size:10px;color:var(--secondary-text-color);display:flex;justify-content:space-between;gap:8px;align-items:center;'><span><ha-icon icon='" ~ points_icon ~ "' style='width:12px;height:12px;color:var(--primary-color);transform:translateY(-1px);'></ha-icon> " ~ ui.get('total_earned', 'err-total_earned') ~ ": " ~ ns.points_earned_all_time|string ~ " " ~ ns.points_label ~ "</span><span style='font-weight:600;'>🔥 " ~ ui.get('need', 'err-need') ~ ": " ~ pts_to_unlock|string ~ " " ~ ns.points_label ~ "</span></div></div>" -%}
                          {%- endif -%}

                          {%- set stats_parts = [] -%}
                          {%- set badge_last_earned = (ns.m_last_awarded if is_current and ns.m_last_awarded else badge.last_awarded) | regex_replace('T.*$', '') -%}
                          {%- if badge.earned -%}
                            {%- set stats_parts = stats_parts + ["🕒 " ~ ui.get('last_earned', 'err-last_earned') ~ ": " ~ (badge_last_earned if badge_last_earned else ui.get('never', 'err-never'))] -%}
                          {%- endif -%}
                          {%- if is_current -%}
                            {%- set stats_parts = stats_parts + ["🥇 " ~ ui.get('earned_count', 'err-earned_count') ~ ": " ~ ns.m_award_count|string] -%}
                          {%- endif -%}
                          {%- set stats_html = stats_parts | join(" <span style='opacity:0.7;'>•</span> ") -%}

                          {{
                            {
                              'type': 'custom:button-card',
                              'entity': badge.entity_id,
                              'name': badge.name,
                              'icon': badge.icon,
                              'show_name': true,
                              'show_icon': true,
                              'show_label': false,
                              'tap_action': {'action': 'more-info'},
                              'custom_fields': {
                                'details': details_html,
                                'description': description_html,
                                'progress': progress_html,
                                'stats': stats_html
                              },
                              'styles': {
                                'card': [
                                  {'padding': '12px 14px'},
                                  {'border-radius': '14px'},
                                  {'background-color': 'var(--card-background-color)'},
                                  {'border': ('1px solid var(--warning-color)' if ns.m_status in ['grace', 'demoted'] else '1px solid var(--success-color)') if is_current else '1px solid var(--divider-color)'},
                                  {'opacity': '0.72' if not badge.earned else '1.0'},
                                  {'box-shadow': '0 2px 6px rgba(0,0,0,0.08)' if is_current else 'none'}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n" "i details" "i description" "progress progress" "stats stats"'},
                                  {'grid-template-columns': '44px 1fr'},
                                  {'row-gap': '4px'},
                                  {'column-gap': '10px'}
                                ],
                                'icon': [
                                  {'width': '38px'},
                                  {'height': '38px'},
                                  {'color': ('var(--warning-color)' if ns.m_status in ['grace', 'demoted'] else 'var(--success-color)') if is_current else 'var(--secondary-text-color)'}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '16px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--primary-text-color)'}
                                ],
                                'custom_fields': {
                                  'details': [
                                    {'justify-self': 'start'},
                                    {'font-size': '12px'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'}
                                  ],
                                  'description': [
                                    {'justify-self': 'start'},
                                    {'font-size': '11px'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'},
                                    {'display': 'block' if badge_desc | length > 0 else 'none'}
                                  ],
                                  'progress': [
                                    {'width': '100%'},
                                    {'text-align': 'left'},
                                    {'display': 'block' if progress_html | length > 0 else 'none'}
                                  ],
                                  'stats': [
                                    {'justify-self': 'start'},
                                    {'font-size': '11px'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'},
                                    {'display': 'block' if stats_html | length > 0 else 'none'},
                                    {'margin-top': '2px'}
                                  ]
                                }
                              }
                            }
                          }},
                          {%- endfor -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}

        - type: grid
          square: false
          columns: 1
          grid_options:
            columns: full
          cards:
            - type: custom:auto-entities
              card:
                square: false
                type: grid
                columns: 1
              card_param: cards
              filter:
                template: |-
                  {#-- ===== PERIODIC BADGES CARD ===== --#}

                  << template_snippets.meta_stamp >>


                  {#-- 1. User Configuration --#}

                  << template_snippets.user_override_helper >>

                  {%- set pref_default_header_collapsed = false -%}
                  {%- set pref_primary_tint_mix_pct = 14 -%}  {#-- Percent of var(--primary-color) mixed into the main Periodic header background when fill is enabled. Allowed: 0-100. --#}
                  {%- set pref_show_header_background = true -%}  {#-- Set to false to remove the main Periodic header background fill and leave it transparent. Allowed: true, false. --#}
                  {%- set pref_show_header_thin_border = true -%}  {#-- Set to false to remove the thin outer border line. Accent borders are unaffected. Allowed: true, false. --#}


                  {#-- 2. Dynamic Lookups & Validations --#}

                  {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
                  {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
                  {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
                  {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
                  {%- if pref_primary_tint_mix_pct < 0 -%}
                    {%- set pref_primary_tint_mix_pct = 0 -%}
                  {%- elif pref_primary_tint_mix_pct > 100 -%}
                    {%- set pref_primary_tint_mix_pct = 100 -%}
                  {%- endif -%}

                  << template_snippets.user_setup >>

                  << template_snippets.user_validation >>

                  {%- if not skip_render -%}

                    {#-- 3. Initialize --#}
                    {%- set ns = namespace(
                      badges=[]
                    ) -%}

                    {#-- 4. Collect Data --#}
                    {%- set core_sensors = state_attr(dashboard_helper, 'core_sensors') or {} -%}
                    {%- set points_sensor = core_sensors.get('points_eid') -%}
                    {%- set points_icon = (state_attr(points_sensor, 'icon') if points_sensor else None) or 'mdi:star-circle' -%}
                    {%- set translation_sensor = (state_attr(dashboard_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                    {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                    {%- set gamification_enabled = state_attr(dashboard_helper, 'gamification_enabled') | default(false, true) -%}
                    {%- set ui_control = state_attr(dashboard_helper, 'ui_control') | default({}, true) -%}
                    {%- set ui_control_key_root = 'gamification/periodic' -%}
                    {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header_collapse' -%}
                    {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                    {%- for segment in ui_control_key_root.split('/') -%}
                      {%- if ui_root.current is mapping -%}
                        {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                      {%- else -%}
                        {%- set ui_root.current = {} -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set header_collapsed = ui_root.current.get('header_collapse', pref_default_header_collapsed) if ui_root.current is mapping else pref_default_header_collapsed -%}
                    {%- set header_collapsed = header_collapsed | default(pref_default_header_collapsed, true) -%}
                    {%- set integration_entry_id = state_attr(dashboard_helper, 'integration_entry_id') -%}
                    {%- set dashboard_helper_user_id = state_attr(dashboard_helper, 'user_id') -%}
                    {%- set badge_list = state_attr(dashboard_helper, 'badges') | default([], true) -%}

                    {%- for badge in badge_list -%}
                      {%- if badge is not mapping -%}
                        {%- continue -%}
                      {%- endif -%}
                      {%- set badge_eid = badge.get('eid') -%}
                      {%- set badge_type = (badge.get('badge_type') | string | lower) -%}
                      {%- if badge_type not in ['periodic', 'daily', 'special_occasion'] -%}
                        {%- continue -%}
                      {%- endif -%}
                      {%- if badge_eid in ['', 'None', 'unknown', 'unavailable', none] -%}
                        {%- continue -%}
                      {%- endif -%}

                      {%- set badge_attrs = states[badge_eid].attributes | default({}, true) -%}
                      {%- set badge_name = (badge_attrs.get('badge_name') or badge.get('name') or state_attr(badge_eid, 'friendly_name') or '') | string -%}
                      {%- set badge_description = (badge_attrs.get('description') or '') | string -%}
                      {%- set badge_status = (badge_attrs.get('status') or badge.get('status') or 'in_progress') | string | lower -%}
                      {%- set badge_progress = states(badge_eid) | float(default=0) -%}
                      {%- set badge_threshold = badge_attrs.get('threshold_value', 0) | int(default=0) -%}
                      {%- set badge_target_type = (badge_attrs.get('target_type') or '') | string -%}
                      {%- set badge_reset_schedule = badge_attrs.get('reset_schedule') if badge_attrs.get('reset_schedule') is mapping else {} -%}
                      {%- set badge_frequency = (badge_attrs.get('recurring_frequency') or badge_reset_schedule.get('recurring_frequency') or '') | string | lower -%}
                      {%- set badge_award_count = badge_attrs.get('award_count', 0) | int(default=0) -%}
                      {%- set badge_last_awarded = (badge_attrs.get('last_awarded_date') or '') | string -%}
                      {%- set badge_target = badge_attrs.get('target') if badge_attrs.get('target') is mapping else {} -%}
                      {%- set badge_start_date = ((badge_attrs.get('start_date') or badge_reset_schedule.get('start_date') or '') | string) -%}
                      {%- set badge_end_date = ((badge_attrs.get('end_date') or badge_reset_schedule.get('end_date') or '') | string) -%}
                      {%- set badge_awards = badge_attrs.get('awards') if badge_attrs.get('awards') is mapping else {} -%}
                      {%- set badge_award_points = badge_awards.get('award_points', 0) | float(default=0) -%}
                      {%- set badge_points_multiplier = badge_awards.get('points_multiplier', 0) | float(default=0) -%}
                      {%- set badge_award_rewards = badge_awards.get('rewards') if badge_awards.get('rewards') is iterable and badge_awards.get('rewards') is not string else [] -%}
                      {%- set badge_award_bonuses = badge_awards.get('bonuses') if badge_awards.get('bonuses') is iterable and badge_awards.get('bonuses') is not string else [] -%}
                      {%- set badge_award_penalties = badge_awards.get('penalties') if badge_awards.get('penalties') is iterable and badge_awards.get('penalties') is not string else [] -%}

                      {%- set ns.badges = ns.badges + [{
                        'entity_id': badge_eid,
                        'name': badge_name,
                        'icon': (badge_attrs.get('icon') or 'mdi:medal-outline') | string,
                        'description': badge_description,
                        'status': badge_status,
                        'progress': badge_progress,
                        'threshold': badge_threshold,
                        'target': badge_target,
                        'target_type': badge_target_type,
                        'frequency': badge_frequency,
                        'reset_schedule': badge_reset_schedule,
                        'start_date': badge_start_date,
                        'end_date': badge_end_date,
                        'award_count': badge_award_count,
                        'last_awarded': badge_last_awarded,
                        'awards': badge_awards,
                        'award_points': badge_award_points,
                        'points_multiplier': badge_points_multiplier,
                        'award_rewards': badge_award_rewards,
                        'award_bonuses': badge_award_bonuses,
                        'award_penalties': badge_award_penalties,
                        'system_badge_eid': (badge_attrs.get('system_badge_eid') or '') | string,
                        'badge_type': badge_type,
                      }] -%}
                    {%- endfor -%}

                    {%- set sorted_badges = ns.badges | sort(attribute='name') -%}

                    {#-- 5. Render --#}
                    {%- if gamification_enabled -%}
                      {{
                        {
                          'type': 'custom:button-card',
                          'name': ui.get('quests', 'err-quests'),
                          'icon': 'mdi:calendar-refresh-outline',
                          'show_name': true,
                          'show_icon': true,
                          'tap_action': ({
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'remove',
                              'key': ui_control_key_header_collapsed
                            }
                          } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'update',
                              'key': ui_control_key_header_collapsed,
                              'value': true
                            }
                          } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'none'
                          }),
                          'hold_action': {'action': 'none'},
                          'custom_fields': {
                            'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                          },
                          'styles': {
                            'card': [
                              {'background': ('color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed else 'transparent'},
                              {'box-shadow': 'none'},
                              {'border': '1px solid var(--divider-color)' if header_collapsed else 'none'},
                              {'border-left': '3px solid var(--primary-color)'},
                              {'border-bottom': '3px solid var(--primary-color)'},
                              {'border-radius': '10px'},
                              {'padding': '10px 12px'},
                              {'min-height': 'unset'},
                              {'margin-top': '5px'},
                              {'margin-bottom': '0px'}
                            ],
                            'grid': [
                              {'grid-template-areas': '"i n toggle"'},
                              {'grid-template-columns': 'min-content 1fr min-content'},
                              {'column-gap': '5px'},
                              {'align-items': 'center'}
                            ],
                            'icon': [
                              {'width': '18px'},
                              {'transform': 'translateY(-2px)'},
                              {'color': 'var(--primary-color)'}
                            ],
                            'name': [
                              {'justify-self': 'start'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'text-transform': 'uppercase'},
                              {'letter-spacing': '0.4px'},
                              {'color': 'var(--primary-text-color)'}
                            ],
                            'custom_fields': {
                              'toggle': [
                                {'justify-self': 'end'},
                                {'align-self': 'center'}
                              ]
                            }
                          }
                        }
                      }},

                      {%- if not header_collapsed -%}
                        {%- if sorted_badges | length == 0 -%}
                          {{
                            {
                              'type': 'custom:button-card',
                              'name': ui.get('no_periodic_badges_found', 'err-no_periodic_badges_found'),
                              'label': ui.get('periodic_badge_setup_prompt', 'err-periodic_badge_setup_prompt'),
                              'icon': 'mdi:medal-outline',
                              'show_name': true,
                              'show_icon': true,
                              'show_label': true,
                              'tap_action': {'action': 'none'},
                              'styles': {
                                'card': [
                                  {'background': 'var(--secondary-background-color)'},
                                  {'box-shadow': 'none'},
                                  {'border': '1px solid var(--divider-color)'},
                                  {'border-radius': '12px'},
                                  {'padding': '10px 12px'}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n" "i l"'},
                                  {'grid-template-columns': 'min-content 1fr'},
                                  {'gap': '8px'},
                                  {'align-items': 'center'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '13px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'label': [
                                  {'justify-self': 'start'},
                                  {'font-size': '11px'},
                                  {'line-height': '1.3'},
                                  {'color': 'var(--secondary-text-color)'},
                                  {'white-space': 'normal'}
                                ]
                              }
                            }
                          }},
                        {%- else -%}
                          {%- for badge in sorted_badges -%}
                          {%- set progress_raw = badge.progress | float(default=0) -%}
                          {%- set progress_clamped = 0 if progress_raw < 0 else (100 if progress_raw > 100 else progress_raw) -%}
                          {%- set status_raw = badge.status | lower -%}
                          {%- set status_label = ui.get(status_raw, status_raw | replace('_', ' ') | title) -%}
                          {%- set status_color = 'var(--success-color)' if status_raw in ['earned', 'completed'] else ('var(--warning-color)' if status_raw in ['locked', 'inactive'] else 'var(--primary-color)') -%}
                          {%- set type_label = ui.get(badge.badge_type, badge.badge_type | replace('_', ' ') | title) -%}
                          {%- set frequency_label = ui.get(badge.frequency, badge.frequency | replace('_', ' ') | title) if badge.frequency not in ['', 'none'] else '' -%}
                          {%- set last_earned_date = badge.last_awarded | regex_replace('T.*$', '') if badge.last_awarded | length > 0 else '' -%}
                          {%- set badge_start_date_clean = badge.start_date | regex_replace('T.*$', '') if badge.start_date | length > 0 else '' -%}
                          {%- set badge_end_date_clean = badge.end_date | regex_replace('T.*$', '') if badge.end_date | length > 0 else '' -%}
                          {%- set current_date = now().strftime('%Y-%m-%d') -%}
                          {%- set show_progress_window = badge_start_date_clean | length > 0 and badge_end_date_clean | length > 0 and current_date >= badge_start_date_clean and current_date <= badge_end_date_clean -%}

                          {%- set awards_parts = [] -%}
                          {%- set penalties_parts = [] -%}
                          {%- if badge.points_multiplier > 0 -%}
                            {%- set awards_parts = awards_parts + ['x' ~ ('%.2f' | format(badge.points_multiplier) | regex_replace('\.?0+$', ''))] -%}
                          {%- endif -%}
                          {%- if badge.award_points > 0 -%}
                            {%- set awards_parts = awards_parts + [('%.1f' | format(badge.award_points)) ~ " <ha-icon icon='" ~ points_icon ~ "' style='width:12px;height:12px;color:var(--primary-color);transform:translateY(-2px);'></ha-icon>"] -%}
                          {%- endif -%}

                          {%- set bonus_count = badge.award_bonuses | length -%}
                          {%- if bonus_count > 0 -%}
                            {%- set awards_parts = awards_parts + ["<span style='display:inline-flex;align-items:center;gap:3px;transform:translateY(-1px);'>✨ " ~ ui.get('bonus', 'err-bonus') ~ (' x' ~ bonus_count|string if bonus_count > 1 else '') ~ "</span>"] -%}
                          {%- endif -%}

                          {%- set reward_count = badge.award_rewards | length -%}
                          {%- if reward_count > 0 -%}
                            {%- set awards_parts = awards_parts + ["<span style='display:inline-flex;align-items:center;gap:3px;transform:translateY(-1px);'>🎁 " ~ ui.get('reward', 'err-reward') ~ (' x' ~ reward_count|string if reward_count > 1 else '') ~ "</span>"] -%}
                          {%- endif -%}

                          {%- for penalty_item in badge.award_penalties -%}
                            {%- if penalty_item is mapping -%}
                              {%- set penalty_name = (penalty_item.get('name') or '') | string | trim -%}
                              {%- set penalties_parts = penalties_parts + [penalty_name if penalty_name | length > 0 else ui.get('penalty', 'err-penalty')] -%}
                            {%- endif -%}
                          {%- endfor -%}

                          {%- if penalties_parts | length == 0 and badge.award_penalties | length > 0 -%}
                            {%- set penalty_count = badge.award_penalties | length -%}
                            {%- set penalties_parts = penalties_parts + [ui.get('penalty', 'err-penalty') ~ (" x" ~ penalty_count|string if penalty_count > 1 else '')] -%}
                          {%- endif -%}

                          {%- set awards_line = awards_parts | join(" <span style='opacity:0.7;'>•</span> ") -%}
                          {%- set penalties_line = penalties_parts | join(" <span style='opacity:0.7;'>•</span> ") -%}

                          {%- set details_line = '' -%}
                          {%- if badge.description | trim | length > 0 -%}
                            {%- set details_line = badge.description | trim | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                          {%- elif badge.threshold > 0 -%}
                            {%- set details_line = ui.get('threshold', 'err-threshold') ~ ': ' ~ badge.threshold|string ~ (' • ' ~ badge.target_type if badge.target_type | length > 0 else '') -%}
                          {%- endif -%}
                          {%- if awards_line | length > 0 -%}
                            {%- set details_line = details_line ~ ("<br>" if details_line | length > 0 else "") ~ "<span style='display:inline-block;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:700;color:var(--primary-text-color);'><ha-icon icon='mdi:diamond-stone' style='width:12px;height:12px;color:var(--primary-color);transform:translateY(-1px);'></ha-icon> " ~ ui.get('awards', 'err-awards') ~ ": " ~ awards_line ~ "</span>" -%}
                          {%- endif -%}
                          {%- if penalties_line | length > 0 and badge.end_date | length > 0 -%}
                            {%- set details_line = details_line ~ ("<br>" if details_line | length > 0 else "") ~ "<span style='display:inline-block;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:600;color:var(--secondary-text-color);'>⏳ " ~ ui.get('if_missed', 'err-if_missed') ~ ": " ~ penalties_line ~ "</span>" -%}
                          {%- endif -%}

                          {%- set periodic_dates = '' -%}
                          {%- if badge_start_date_clean | length > 0 and badge_end_date_clean | length > 0 -%}
                            {%- if badge_start_date_clean == badge_end_date_clean -%}
                              {%- set periodic_dates = badge_end_date_clean -%}
                            {%- else -%}
                              {%- set periodic_dates = badge_start_date_clean ~ ' → ' ~ badge_end_date_clean -%}
                            {%- endif -%}
                          {%- elif badge_start_date_clean | length > 0 -%}
                            {%- set periodic_dates = ui.get('start_date', 'err-start_date') ~ ': ' ~ badge_start_date_clean -%}
                          {%- elif badge_end_date_clean | length > 0 -%}
                            {%- set periodic_dates = ui.get('end_date', 'err-end_date') ~ ': ' ~ badge_end_date_clean -%}
                          {%- endif -%}
                          {%- set progress_html = "<div style='margin-top:2px;padding:8px 10px;border-radius:8px;background:var(--secondary-background-color);border:1px solid var(--divider-color);'><div style='display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;'><span><ha-icon icon='mdi:progress-clock' style='width:14px;height:14px;color:" ~ status_color ~ ";transform:translateY(-1px);'></ha-icon> " ~ status_label ~ "</span><span style='font-weight:600;'>" ~ ('%.1f' | format(progress_raw)) ~ "%</span></div><div style='margin-top:6px;display:flex;align-items:center;gap:6px;'><div style='flex:1;height:6px;background:var(--divider-color);border-radius:999px;overflow:hidden;'><div style='width:" ~ ('%.1f' | format(progress_clamped)) ~ "%;height:100%;background:" ~ status_color ~ ";border-radius:999px;'></div></div><span style='font-size:10px;color:var(--secondary-text-color);line-height:1;'>" ~ ('%.0f' | format(progress_clamped)) ~ "%</span></div><div style='margin-top:6px;font-size:10px;color:var(--secondary-text-color);display:flex;justify-content:space-between;gap:8px;'><span>" ~ ("↻ " ~ frequency_label if frequency_label | length > 0 else type_label) ~ "</span><span style='font-weight:600;'>" ~ periodic_dates ~ "</span></div></div>" if show_progress_window else '' -%}
                          {%- set footer_date_html = periodic_dates if progress_html | length == 0 and periodic_dates | length > 0 else '' -%}

                          {%- set stats_parts = [] -%}
                          {%- if last_earned_date | length > 0 -%}
                            {%- set stats_parts = stats_parts + ["🕒 " ~ ui.get('last_earned', 'err-last_earned') ~ ": " ~ last_earned_date] -%}
                          {%- endif -%}
                          {%- if badge.award_count > 0 -%}
                            {%- set stats_parts = stats_parts + ["🥇 " ~ ui.get('earned_count', 'err-earned_count') ~ ": " ~ badge.award_count|string] -%}
                          {%- endif -%}
                          {%- set stats_left_html = stats_parts | join(" <span style='opacity:0.7;'>•</span> ") -%}
                          {%- set stats_html = '' -%}
                          {%- if stats_left_html | length > 0 or footer_date_html | length > 0 -%}
                            {%- set stats_html = "<div style='display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;column-gap:8px;width:100%;'><span style='min-width:0;display:block;'>" ~ stats_left_html ~ "</span><span style='display:block;font-size:10px;font-weight:600;color:var(--secondary-text-color);text-align:right;white-space:nowrap;justify-self:end;'>" ~ footer_date_html ~ "</span></div>" -%}
                          {%- endif -%}

                          {{
                            {
                              'type': 'custom:button-card',
                              'entity': badge.entity_id,
                              'name': badge.name,
                              'icon': badge.icon,
                              'show_name': true,
                              'show_icon': true,
                              'show_label': false,
                              'tap_action': {'action': 'more-info'},
                              'custom_fields': {
                                'details': details_line,
                                'progress': progress_html,
                                'stats': stats_html
                              },
                              'styles': {
                                'card': [
                                  {'padding': '12px 14px'},
                                  {'border-radius': '14px'},
                                  {'background-color': 'var(--card-background-color)'},
                                  {'border': ('1px solid var(--success-color)' if status_raw in ['earned', 'completed'] else '1px solid var(--divider-color)')},
                                  {'box-shadow': ('0 2px 6px rgba(0,0,0,0.08)' if status_raw in ['earned', 'completed'] else 'none')}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n" "i details" "progress progress" "stats stats"'},
                                  {'grid-template-columns': '44px 1fr'},
                                  {'row-gap': '4px'},
                                  {'column-gap': '10px'}
                                ],
                                'icon': [
                                  {'width': '38px'},
                                  {'height': '38px'},
                                  {'color': status_color}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '16px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--primary-text-color)'}
                                ],
                                'custom_fields': {
                                  'details': [
                                    {'justify-self': 'start'},
                                    {'font-size': '11px'},
                                    {'font-weight': '600'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'},
                                    {'display': 'block' if details_line | length > 0 else 'none'}
                                  ],
                                  'progress': [
                                    {'width': '100%'},
                                    {'text-align': 'left'},
                                    {'display': 'block' if progress_html | length > 0 else 'none'}
                                  ],
                                  'stats': [
                                    {'justify-self': 'stretch'},
                                    {'width': '100%'},
                                    {'font-size': '11px'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'},
                                    {'display': 'block' if stats_html | length > 0 else 'none'},
                                    {'margin-top': '2px'}
                                  ]
                                }
                              }
                            }
                          }},
                          {%- endfor -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}

        - type: grid
          square: false
          columns: 1
          grid_options:
            columns: full
          cards:
            - type: custom:auto-entities
              card:
                square: false
                type: grid
                columns: 1
              card_param: cards
              filter:
                template: |-
                  {#-- ===== ACHIEVEMENTS CARD ===== --#}

                  << template_snippets.meta_stamp >>


                  {#-- 1. User Configuration --#}

                  << template_snippets.user_override_helper >>

                  {%- set pref_default_header_collapsed = false -%}
                  {%- set pref_primary_tint_mix_pct = 14 -%}  {#-- Percent of var(--primary-color) mixed into the main Achievements header background when fill is enabled. Allowed: 0-100. --#}
                  {%- set pref_show_header_background = true -%}  {#-- Set to false to remove the main Achievements header background fill and leave it transparent. Allowed: true, false. --#}
                  {%- set pref_show_header_thin_border = true -%}  {#-- Set to false to remove the thin outer border line. Accent borders are unaffected. Allowed: true, false. --#}


                  {#-- 2. Dynamic Lookups & Validations --#}

                  {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
                  {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
                  {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
                  {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
                  {%- if pref_primary_tint_mix_pct < 0 -%}
                    {%- set pref_primary_tint_mix_pct = 0 -%}
                  {%- elif pref_primary_tint_mix_pct > 100 -%}
                    {%- set pref_primary_tint_mix_pct = 100 -%}
                  {%- endif -%}

                  << template_snippets.user_setup >>

                  << template_snippets.user_validation >>

                  {%- if not skip_render -%}

                    {#-- 3. Initialize --#}
                    {%- set ns = namespace(
                      achievements=[]
                    ) -%}

                    {#-- 4. Collect Data --#}
                    {%- set core_sensors = state_attr(dashboard_helper, 'core_sensors') or {} -%}
                    {%- set points_sensor = core_sensors.get('points_eid') -%}
                    {%- set points_icon = (state_attr(points_sensor, 'icon') if points_sensor else None) or 'mdi:star-circle' -%}
                    {%- set translation_sensor = (state_attr(dashboard_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                    {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                    {%- set gamification_enabled = state_attr(dashboard_helper, 'gamification_enabled') | default(false, true) -%}
                    {%- set ui_control = state_attr(dashboard_helper, 'ui_control') | default({}, true) -%}
                    {%- set ui_control_key_root = 'gamification/achievements' -%}
                    {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header_collapse' -%}
                    {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                    {%- for segment in ui_control_key_root.split('/') -%}
                      {%- if ui_root.current is mapping -%}
                        {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                      {%- else -%}
                        {%- set ui_root.current = {} -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set header_collapsed = ui_root.current.get('header_collapse', pref_default_header_collapsed) if ui_root.current is mapping else pref_default_header_collapsed -%}
                    {%- set header_collapsed = header_collapsed | default(pref_default_header_collapsed, true) -%}
                    {%- set integration_entry_id = state_attr(dashboard_helper, 'integration_entry_id') -%}
                    {%- set dashboard_helper_user_id = state_attr(dashboard_helper, 'user_id') -%}
                    {%- set achievement_list = state_attr(dashboard_helper, 'achievements') | default([], true) -%}

                    {%- for achievement in achievement_list -%}
                      {%- set achievement_eid = achievement.get('eid') if achievement is mapping else achievement -%}
                      {%- if achievement_eid in ['', 'None', 'unknown', 'unavailable', none] -%}
                        {%- continue -%}
                      {%- endif -%}

                      {%- set achievement_attrs = states[achievement_eid].attributes | default({}, true) -%}
                      {%- set achievement_name = (achievement_attrs.get('achievement_name') or (achievement.get('name') if achievement is mapping else none) or state_attr(achievement_eid, 'friendly_name') or '') | string -%}
                      {%- set assigned_raw = achievement_attrs.get('assigned_user_names', achievement_attrs.get('assigned_assignees')) -%}
                      {%- set assigned_users = [] -%}
                      {%- if assigned_raw is string -%}
                        {%- set assigned_users = [assigned_raw] -%}
                      {%- elif assigned_raw is iterable and assigned_raw is not string and assigned_raw is not none -%}
                        {%- set assigned_users = assigned_raw | list -%}
                      {%- endif -%}
                      {%- set awarded_raw = achievement_attrs.get('awarded', false) -%}
                      {%- set awarded = awarded_raw if awarded_raw is boolean else (awarded_raw | string | lower) == 'true' -%}
                      {%- set target_value = achievement_attrs.get('target_value', 0) | int(default=0) -%}
                      {%- set raw_progress = achievement_attrs.get('raw_progress', 0) | float(default=0) -%}
                      {%- set progress_clamped = raw_progress if raw_progress >= 0 else 0 -%}
                      {%- if target_value > 0 and progress_clamped > target_value -%}
                        {%- set progress_clamped = target_value -%}
                      {%- endif -%}
                      {%- set progress_pct = ((progress_clamped / target_value) * 100) | round(1) if target_value > 0 else 0 -%}

                      {%- set ns.achievements = ns.achievements + [{
                        'entity_id': achievement_eid,
                        'name': achievement_name,
                        'icon': (achievement_attrs.get('icon') or 'mdi:trophy') | string,
                        'description': (achievement_attrs.get('description') or '') | string,
                        'criteria': (achievement_attrs.get('criteria') or '') | string,
                        'type': (achievement_attrs.get('type') or '') | string | lower,
                        'associated_chore': (achievement_attrs.get('associated_chore') or '') | string,
                        'target_value': target_value,
                        'raw_progress': raw_progress,
                        'progress_clamped': progress_clamped,
                        'progress_pct': progress_pct,
                        'reward_points': achievement_attrs.get('reward_points', 0) | float(default=0),
                        'assigned_users': assigned_users,
                        'awarded': awarded,
                      }] -%}
                    {%- endfor -%}

                    {%- set sorted_achievements = ns.achievements | sort(attribute='name') -%}

                    {#-- 5. Render --#}
                    {%- if gamification_enabled -%}
                      {{
                        {
                          'type': 'custom:button-card',
                          'name': ui.get('achievements', 'err-achievements'),
                          'icon': 'mdi:trophy',
                          'show_name': true,
                          'show_icon': true,
                          'tap_action': ({
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'remove',
                              'key': ui_control_key_header_collapsed
                            }
                          } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'call-service',
                            'service': 'choreops.manage_ui_control',
                            'data': {
                              'config_entry_id': integration_entry_id,
                              'user_id': dashboard_helper_user_id,
                              'ui_control_action': 'update',
                              'key': ui_control_key_header_collapsed,
                              'value': true
                            }
                          } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                            'action': 'none'
                          }),
                          'hold_action': {'action': 'none'},
                          'custom_fields': {
                            'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                          },
                          'styles': {
                            'card': [
                              {'background': ('color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed else 'transparent'},
                              {'box-shadow': 'none'},
                              {'border': '1px solid var(--divider-color)' if header_collapsed else 'none'},
                              {'border-left': '3px solid var(--primary-color)'},
                              {'border-bottom': '3px solid var(--primary-color)'},
                              {'border-radius': '10px'},
                              {'padding': '10px 12px'},
                              {'min-height': 'unset'},
                              {'margin-top': '5px'},
                              {'margin-bottom': '0px'}
                            ],
                            'grid': [
                              {'grid-template-areas': '"i n toggle"'},
                              {'grid-template-columns': 'min-content 1fr min-content'},
                              {'column-gap': '5px'},
                              {'align-items': 'center'}
                            ],
                            'icon': [
                              {'width': '18px'},
                              {'transform': 'translateY(-2px)'},
                              {'color': 'var(--primary-color)'}
                            ],
                            'name': [
                              {'justify-self': 'start'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'text-transform': 'uppercase'},
                              {'letter-spacing': '0.4px'},
                              {'color': 'var(--primary-text-color)'}
                            ],
                            'custom_fields': {
                              'toggle': [
                                {'justify-self': 'end'},
                                {'align-self': 'center'}
                              ]
                            }
                          }
                        }
                      }},

                      {%- if not header_collapsed -%}
                        {%- if sorted_achievements | length == 0 -%}
                          {{
                            {
                              'type': 'custom:button-card',
                              'name': ui.get('no_achievements_found', 'err-no_achievements_found'),
                              'label': ui.get('start_achievement_prompt', 'err-start_achievement_prompt'),
                              'icon': 'mdi:trophy',
                              'show_name': true,
                              'show_icon': true,
                              'show_label': true,
                              'tap_action': {'action': 'none'},
                              'styles': {
                                'card': [
                                  {'background': 'var(--secondary-background-color)'},
                                  {'box-shadow': 'none'},
                                  {'border': '1px solid var(--divider-color)'},
                                  {'border-radius': '12px'},
                                  {'padding': '10px 12px'}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n" "i l"'},
                                  {'grid-template-columns': 'min-content 1fr'},
                                  {'gap': '8px'},
                                  {'align-items': 'center'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '13px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--secondary-text-color)'}
                                ],
                                'label': [
                                  {'justify-self': 'start'},
                                  {'font-size': '11px'},
                                  {'line-height': '1.3'},
                                  {'color': 'var(--secondary-text-color)'},
                                  {'white-space': 'normal'}
                                ]
                              }
                            }
                          }},
                        {%- else -%}
                          {%- for achievement in sorted_achievements -%}
                          {%- set status_label = ui.get('earned', 'err-earned') if achievement.awarded else ui.get('in_progress', 'err-in_progress') -%}
                          {%- set status_color = 'var(--success-color)' if achievement.awarded else 'var(--primary-color)' -%}
                          {%- set type_label =
                            ui.get('streak', 'err-streak') if achievement.type == 'chore_streak'
                            else ui.get('per_day_goal', 'err-per_day_goal') if achievement.type == 'daily_minimum'
                            else ui.get('total_chores', 'err-total_chores') if achievement.type in ['total_within_window', 'total_chores']
                            else ui.get(achievement.type, achievement.type | replace('_', ' ') | title)
                          -%}
                          {%- set description_safe = achievement.description | trim | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                          {%- set criteria_safe = achievement.criteria | trim | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                          {%- set chore_safe = achievement.associated_chore | trim | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}
                          {%- set assigned_safe = achievement.assigned_users | join(', ') | replace('&', '&amp;') | replace('<', '&lt;') | replace('>', '&gt;') -%}

                          {%- set details_line = '' -%}
                          {%- if description_safe | length > 0 -%}
                            {%- set details_line = description_safe -%}
                          {%- endif -%}
                          {%- if criteria_safe | length > 0 -%}
                            {%- set details_line = details_line ~ ('<br>' if details_line | length > 0 else '') ~ "<span style='font-size:11px;line-height:1.3;'>📌 " ~ ui.get('criteria', 'err-criteria') ~ ": " ~ criteria_safe ~ "</span>" -%}
                          {%- endif -%}
                          {%- if achievement.reward_points > 0 -%}
                            {%- set reward_text = ('%.1f' | format(achievement.reward_points)) | regex_replace('\.?0+$', '') -%}
                            {%- set details_line = details_line ~ ('<br>' if details_line | length > 0 else '') ~ "<span style='display:inline-block;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:700;color:var(--primary-text-color);'><ha-icon icon='mdi:diamond-stone' style='width:12px;height:12px;color:var(--primary-color);transform:translateY(-1px);'></ha-icon> " ~ ui.get('reward', 'err-reward') ~ ": " ~ reward_text ~ " <ha-icon icon='" ~ points_icon ~ "' style='width:12px;height:12px;color:var(--primary-color);transform:translateY(-2px);'></ha-icon></span>" -%}
                          {%- endif -%}

                          {%- set status_row = "<b style='color:" ~ status_color ~ ";'>" ~ ('✅ ' if achievement.awarded else '⏳ ') ~ status_label | upper ~ "</b>" -%}
                          {%- set goal_text = '' -%}
                          {%- if achievement.target_value > 0 -%}
                            {%- set goal_text = ui.get('goal', 'err-goal') ~ ': ' ~ achievement.target_value|string ~ ' • ' ~ type_label -%}
                          {%- elif type_label | length > 0 -%}
                            {%- set goal_text = type_label -%}
                          {%- endif -%}
                          {%- if goal_text | length > 0 -%}
                            {%- set status_row = status_row ~ " <span style='opacity:0.7;'>•</span> <span>🎯 " ~ goal_text ~ "</span>" -%}
                          {%- endif -%}

                          {%- set progress_html = '' -%}
                          {%- if not achievement.awarded and achievement.target_value > 0 -%}
                            {%- set progress_pct = achievement.progress_pct | float(default=0) -%}
                            {%- if progress_pct < 0 -%}{%- set progress_pct = 0 -%}{%- endif -%}
                            {%- if progress_pct > 100 -%}{%- set progress_pct = 100 -%}{%- endif -%}
                            {%- set progress_display = ('%.0f' | format(progress_pct)) -%}
                            {%- set progress_html = "<div style='margin-top:2px;padding:8px 10px;border-radius:8px;background:var(--secondary-background-color);border:1px solid var(--divider-color);'><div style='display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;'><span><ha-icon icon='mdi:trophy' style='width:14px;height:14px;color:" ~ status_color ~ ";transform:translateY(-1px);'></ha-icon> " ~ ui.get('progress', 'err-progress') ~ "</span><span style='font-weight:600;'>" ~ (achievement.progress_clamped | round(0) | int | string) ~ "/" ~ achievement.target_value|string ~ "</span></div><div style='margin-top:6px;display:flex;align-items:center;gap:6px;'><div style='flex:1;height:6px;background:var(--divider-color);border-radius:999px;overflow:hidden;'><div style='width:" ~ progress_display ~ "%;height:100%;background:" ~ status_color ~ ";border-radius:999px;'></div></div><span style='font-size:10px;color:var(--secondary-text-color);line-height:1;'>" ~ progress_display ~ "%</span></div></div>" -%}
                          {%- endif -%}

                          {%- set stats_left = '' -%}
                          {%- if chore_safe | length > 0 -%}
                            {%- set stats_left = "🛠 " ~ ui.get('related_chore', 'err-related_chore') ~ ": " ~ chore_safe -%}
                          {%- elif criteria_safe | length > 0 and details_line | length == 0 -%}
                            {%- set stats_left = "📌 " ~ ui.get('criteria', 'err-criteria') ~ ": " ~ criteria_safe -%}
                          {%- endif -%}
                          {%- set stats_right = status_label -%}
                          {%- set stats_html = '' -%}
                          {%- if stats_left | length > 0 or stats_right | length > 0 -%}
                            {%- set stats_html = "<div style='display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;column-gap:8px;width:100%;'><span style='min-width:0;display:block;white-space:normal;'>" ~ stats_left ~ "</span><span style='display:block;font-size:10px;font-weight:700;color:" ~ status_color ~ ";text-align:right;white-space:nowrap;justify-self:end;'>" ~ stats_right ~ "</span></div>" -%}
                          {%- endif -%}

                          {{
                            {
                              'type': 'custom:button-card',
                              'entity': achievement.entity_id,
                              'name': achievement.name,
                              'icon': achievement.icon,
                              'show_name': true,
                              'show_icon': true,
                              'show_label': false,
                              'tap_action': {'action': 'more-info'},
                              'custom_fields': {
                                'details': status_row ~ ('<br>' ~ details_line if details_line | length > 0 else ''),
                                'progress': progress_html,
                                'stats': stats_html
                              },
                              'styles': {
                                'card': [
                                  {'padding': '12px 14px'},
                                  {'border-radius': '14px'},
                                  {'background-color': 'var(--card-background-color)'},
                                  {'border': ('1px solid var(--success-color)' if achievement.awarded else '1px solid var(--divider-color)')},
                                  {'box-shadow': ('0 2px 6px rgba(0,0,0,0.08)' if achievement.awarded else 'none')}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n" "i details" "progress progress" "stats stats"'},
                                  {'grid-template-columns': '44px 1fr'},
                                  {'row-gap': '4px'},
                                  {'column-gap': '10px'}
                                ],
                                'icon': [
                                  {'width': '38px'},
                                  {'height': '38px'},
                                  {'color': status_color}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-size': '16px'},
                                  {'font-weight': '600'},
                                  {'color': 'var(--primary-text-color)'}
                                ],
                                'custom_fields': {
                                  'details': [
                                    {'justify-self': 'start'},
                                    {'font-size': '11px'},
                                    {'font-weight': '600'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'},
                                    {'display': 'block'}
                                  ],
                                  'progress': [
                                    {'width': '100%'},
                                    {'text-align': 'left'},
                                    {'display': 'block' if progress_html | length > 0 else 'none'}
                                  ],
                                  'stats': [
                                    {'justify-self': 'stretch'},
                                    {'width': '100%'},
                                    {'font-size': '11px'},
                                    {'color': 'var(--secondary-text-color)'},
                                    {'text-align': 'left'},
                                    {'white-space': 'normal'},
                                    {'line-height': '1.3'},
                                    {'display': 'block' if stats_html | length > 0 else 'none'},
                                    {'margin-top': '2px'}
                                  ]
                                }
                              }
                            }
                          }},
                          {%- endfor -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}
