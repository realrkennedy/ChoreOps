# Test Scenario: UX States (dashboard driver coverage)
# =============================================================================
# Purpose: Fast dashboard UX validation with coded chore names and optional
# post-load state seeding (claim/approve/redeem) to avoid manual clicking.
#
# Naming convention:
#   UX-<category>-<id> | <human summary>
#
# Categories used:
#   ROT  = rotation_simple behavior
#   SF   = shared_first behavior
#   SA   = shared_all behavior
#   IND  = independent behavior
#   OVD  = overdue handling behavior
#   DUE  = due date window behavior
#   WAIT = waiting lock behavior
# =============================================================================

system:
  points_label: "UX Points"
  points_icon: "mdi:monitor-dashboard"

assignees:
  - name: "Zoë"
    dashboard_language: "en"
    mobile_notify_service: ""

  - name: "Max!"
    dashboard_language: "en"
    mobile_notify_service: ""

  - name: "Lila"
    dashboard_language: "en"
    mobile_notify_service: ""

approvers:
  - name: "Môm Astrid Stârblüm"
    dashboard_language: "en"
    mobile_notify_service: ""

  - name: "Dad Leo"
    dashboard_language: "en"
    mobile_notify_service: ""

chores:
  - name: "UX-ROT-001 | Rotation Pending Baseline"
    assigned_to: ["Zoë", "Max!", "Lila"]
    points: 11
    icon: "mdi:rotate-3d"
    completion_criteria: "rotation_simple"
    recurring_frequency: "daily"

  - name: "UX-ROT-002 | Rotation Claimed"
    assigned_to: ["Zoë", "Max!", "Lila"]
    points: 12
    icon: "mdi:rotate-right"
    completion_criteria: "rotation_simple"
    recurring_frequency: "daily"

  - name: "UX-ROT-003 | Rotation Approved"
    assigned_to: ["Zoë", "Max!", "Lila"]
    points: 13
    icon: "mdi:rotate-orbit"
    completion_criteria: "rotation_simple"
    recurring_frequency: "daily"

  - name: "UX-SF-001 | Shared First Claimed"
    assigned_to: ["Zoë", "Max!", "Lila"]
    points: 9
    icon: "mdi:flag-checkered"
    completion_criteria: "shared_first"
    recurring_frequency: "daily"

  - name: "UX-SA-001 | Shared All Partial Claims"
    assigned_to: ["Zoë", "Max!", "Lila"]
    points: 10
    icon: "mdi:account-group"
    completion_criteria: "shared_all"
    recurring_frequency: "daily"

  - name: "UX-SA-002 | Shared All Partial Approval"
    assigned_to: ["Zoë", "Max!", "Lila"]
    points: 10
    icon: "mdi:account-group-outline"
    completion_criteria: "shared_all"
    recurring_frequency: "daily"

  - name: "UX-IND-001 | Independent Pending"
    assigned_to: ["Lila"]
    points: 8
    icon: "mdi:account"
    completion_criteria: "independent"
    recurring_frequency: "daily"

  - name: "UX-OVD-001 | Overdue At Due Date"
    assigned_to: ["Zoë"]
    points: 15
    icon: "mdi:clock-alert"
    completion_criteria: "independent"
    recurring_frequency: "none"
    approval_reset_type: "at_midnight_once"
    overdue_handling_type: "at_due_date"
    approval_reset_pending_claim_action: "clear_pending"
    due_date: "now+2m"

  - name: "UX-OVD-FAST-001 | Overdue In ~1 Minute"
    assigned_to: ["Max!"]
    points: 12
    icon: "mdi:clock-alert-outline"
    completion_criteria: "independent"
    recurring_frequency: "none"
    approval_reset_type: "at_midnight_once"
    overdue_handling_type: "at_due_date"
    approval_reset_pending_claim_action: "clear_pending"
    due_date: "now+1m"

  - name: "UX-WAIT-001 | Waiting Due Window Locked"
    assigned_to: ["Max!"]
    points: 14
    icon: "mdi:clock-outline"
    completion_criteria: "independent"
    recurring_frequency: "none"
    approval_reset_type: "at_midnight_once"
    overdue_handling_type: "at_due_date"
    approval_reset_pending_claim_action: "clear_pending"
    chore_due_window_offset: "1h"
    chore_claim_lock_until_window: true
    due_date: "now+6h"

  - name: "UX-DUE-001 | Due Window Open"
    assigned_to: ["Lila"]
    points: 16
    icon: "mdi:clock-fast"
    completion_criteria: "independent"
    recurring_frequency: "none"
    approval_reset_type: "at_midnight_once"
    overdue_handling_type: "at_due_date"
    approval_reset_pending_claim_action: "clear_pending"
    chore_due_window_offset: "1h"
    chore_claim_lock_until_window: true
    due_date: "now+20m"

  - name: "UX-DUE-002 | Due Next Week"
    assigned_to: ["Lila"]
    points: 16
    icon: "mdi:calendar-week"
    completion_criteria: "independent"
    recurring_frequency: "none"
    approval_reset_type: "at_midnight_once"
    overdue_handling_type: "at_due_date"
    approval_reset_pending_claim_action: "clear_pending"
    due_date: "now+7d"

rewards:
  - name: "UX-RWD-001 | Pending Redeem"
    description: "Used to seed pending reward state"
    cost: 40
    icon: "mdi:gift"

bonuses:
  - name: "UX-BON-001 | Manual Bonus Driver"
    description: "Used to test bonus cards and ledger"
    points: 6
    icon: "mdi:plus-circle"

penalties:
  - name: "UX-PEN-001 | Manual Penalty Driver"
    description: "Used to test penalty cards and ledger"
    points: -4
    icon: "mdi:minus-circle"

state_seed_actions:
  - service: "claim_chore"
    data:
      user_name: "Zoë"
      chore_name: "UX-ROT-002 | Rotation Claimed"

  - service: "claim_chore"
    data:
      user_name: "Zoë"
      chore_name: "UX-ROT-003 | Rotation Approved"

  - service: "approve_chore"
    data:
      approver_name: "Môm Astrid Stârblüm"
      user_name: "Zoë"
      chore_name: "UX-ROT-003 | Rotation Approved"

  - service: "claim_chore"
    data:
      user_name: "Max!"
      chore_name: "UX-SF-001 | Shared First Claimed"

  - service: "claim_chore"
    data:
      user_name: "Zoë"
      chore_name: "UX-SA-001 | Shared All Partial Claims"

  - service: "claim_chore"
    data:
      user_name: "Zoë"
      chore_name: "UX-SA-002 | Shared All Partial Approval"

  - service: "approve_chore"
    data:
      approver_name: "Dad Leo"
      user_name: "Zoë"
      chore_name: "UX-SA-002 | Shared All Partial Approval"

  - service: "manual_adjust_points"
    data:
      approver_name: "Dad Leo"
      user_name: "Zoë"
      amount: 100
      reason: "UX state seed - reward redeem precondition"

  - service: "redeem_reward"
    data:
      approver_name: "Môm Astrid Stârblüm"
      user_name: "Zoë"
      reward_name: "UX-RWD-001 | Pending Redeem"

  - service: "apply_bonus"
    data:
      approver_name: "Dad Leo"
      user_name: "Max!"
      bonus_name: "UX-BON-001 | Manual Bonus Driver"

  - service: "apply_penalty"
    data:
      approver_name: "Dad Leo"
      user_name: "Lila"
      penalty_name: "UX-PEN-001 | Manual Penalty Driver"
